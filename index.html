<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Digital Life Spotlight Generator</title>

<!-- React + Babel (in-browser JSX, no build step) -->
<script crossorigin="anonymous" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin="anonymous" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin="anonymous" integrity="sha384-fsMuX1qrlL2OwY1g8apML4JcSv2aYFaMXKQIjzX+OOveqSCCdmIMjwNQRoralXGe" src="https://unpkg.com/@babel/standalone@8.0.3/babel.min.js"></script>

<!-- pptxgenjs (PowerPoint export, ~155KB) and pdf.js (PDF text extraction, ~73KB) are
     heavy and only needed on user action, so they're lazy-loaded on demand via
     loadScript() below — keeping ~228KB off the initial render path. -->


<style>
  /* Wesley primary typeface — Graphik (self-hosted from ./fonts/). Available weights are
     Regular (400), Medium (500) and Semibold (600); the app's 700/800 headings map onto
     Semibold via the 600–800 range so the whole UI stays in the Graphik family rather than
     mixing in the fallback. If the files are missing the stack degrades to Segoe UI. */
  @font-face { font-family: "Graphik"; font-weight: 400;     font-style: normal; font-display: swap; src: url("fonts/Graphik-Regular.woff2") format("woff2"); }
  @font-face { font-family: "Graphik"; font-weight: 400;     font-style: italic; font-display: swap; src: url("fonts/Graphik-RegularItalic.woff2") format("woff2"); }
  @font-face { font-family: "Graphik"; font-weight: 500;     font-style: normal; font-display: swap; src: url("fonts/Graphik-Medium.woff2") format("woff2"); }
  @font-face { font-family: "Graphik"; font-weight: 500;     font-style: italic; font-display: swap; src: url("fonts/Graphik-MediumItalic.woff2") format("woff2"); }
  @font-face { font-family: "Graphik"; font-weight: 600 800; font-style: normal; font-display: swap; src: url("fonts/Graphik-Semibold.woff2") format("woff2"); }
  @font-face { font-family: "Graphik"; font-weight: 600 800; font-style: italic; font-display: swap; src: url("fonts/Graphik-SemiboldItalic.woff2") format("woff2"); }

  /* Secondary brand typeface — Avenir Black, for large DISPLAY headlines only (Wesley hierarchy:
     Graphik primary, Avenir Black secondary, Arial tertiary). Self-hosted from ./fonts/; drop in
     Avenir-Black.woff2. If absent, display headings fall back to Graphik, then Arial. */
  @font-face { font-family: "Avenir Black"; font-weight: 400 900; font-style: normal; font-display: swap; src: url("fonts/Avenir-Black.woff2") format("woff2"); }

  :root {
    /* Neutrals */
    --ink: #2b2536;
    --muted: #574f63;         /* darkened for AA at small sizes */
    --line: #e7e1ef;
    --bg: #f6f2fb;
    --panel: #ffffff;
    --beige: #e6e2dd;         /* Wesley neutral (calm wash) */

    /* Wesley purple family — the dominant, interactive voice */
    --accent: #4f2759;        /* Wesley Purple (canonical brand) */
    --accent-deep: #3d1d45;   /* hover / pressed purple */
    --accent-soft: #e9deeb;   /* Wesley Light Purple — chips, focus glow, tints */
    --purple-grey: #cec3cf;   /* Wesley Grey Purple — inactive borders/dividers */
    --wash: #f4eef8;          /* faint purple surface wash (hover / notes) */

    /* Wesley gold — rare emphasis */
    --accent-2: #c59f40;      /* Wesley Gold (secondary) */
    --accent-2-ink: #6a5018;  /* readable gold for text on light (AA on gold-soft) */
    --gold-soft: #e4d1a1;     /* Wesley Light Gold — emphasis wash */

    /* Semantic states — Wesley Interface "traffic-light" + Highlighter bg + AA-verified ink */
    --good: #58c337; --good-bg: #cfe9d3; --good-ink: #4d5142;
    --warn: #f0a54f; --warn-bg: #ffdab5; --warn-ink: #8a4b12;
    --bad:  #e83534; --bad-bg:  #fdafbd; --bad-ink:  #8f1d2e;
    --info: #7ca3ff; --info-bg: #cbdaff; --info-ink: #4242a1;

    /* Band identity — Wesley Secondary spectrum, categorical (never interactive) */
    --band-pyp: #7ca3ff; --band-pyp-bg: #cbdaff; --band-pyp-ink: #4242a1;
    --band-myp: #86c791; --band-myp-bg: #cfe9d3; --band-myp-ink: #636656;
    --band-middle: #86c791; --band-middle-bg: #cfe9d3; --band-middle-ink: #636656;
    --band-senior: #dfab57; --band-senior-bg: #ffedbc; --band-senior-ink: #7a5012;

    /* Typography — Wesley three-tier: Graphik primary, Avenir Black secondary (display
       headlines only), Arial tertiary fallback. */
    --font-body: "Graphik", Arial, sans-serif;
    --font-display: "Avenir Black", "Graphik", Arial, sans-serif;

    --radius: 14px;
    --shadow: 0 6px 24px rgba(60,40,90,.10);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-body);
    color: var(--ink);
    background: linear-gradient(160deg, #f6f2fb 0%, #ffffff 100%);
    min-height: 100vh;
  }
  header.app {
    padding: 18px 26px;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,.7);
    backdrop-filter: blur(6px);
    position: sticky; top: 0; z-index: 5;
  }
  header.app .logo {
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--accent);
    display: grid; place-items: center; color: #fff;
    box-shadow: var(--shadow);
  }
  header.app .logo svg { width: 22px; height: 22px; }
  header.app h1 { font-size: 19px; margin: 0; }
  header.app .appver { margin-left: auto; align-self: center; font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; letter-spacing: .02em; }
  header.app p { margin: 2px 0 0; font-size: 12.5px; color: var(--muted); }

  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 22px;
    padding: 22px 26px 60px;
    max-width: 1500px; margin: 0 auto;
  }
  @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .panel.input { padding: 18px; align-self: start; position: sticky; top: 88px; }
  @media (max-width: 980px) { .panel.input { position: static; } }

  .group { margin-bottom: 16px; }
  .group > label.cap {
    display: block; font-size: 11.5px; letter-spacing: .04em; text-transform: uppercase;
    color: var(--muted); font-weight: 700; margin-bottom: 6px;
  }
  input[type=text], input[type=password], textarea, select {
    width: 100%; padding: 9px 11px; border: 1px solid var(--line); border-radius: 10px;
    font: inherit; color: var(--ink); background: #fff; outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  input::placeholder, textarea::placeholder { color: var(--muted); opacity: 1; }
  textarea { resize: vertical; min-height: 88px; line-height: 1.45; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.4; }

  .modes { display: flex; gap: 6px; background: var(--bg); padding: 5px; border-radius: 12px; }
  .modes button {
    flex: 1; padding: 9px 6px; border: 0; border-radius: 10px; background: transparent;
    font: inherit; font-weight: 600; color: var(--muted); cursor: pointer; transition: .15s;
  }
  .modes button.active { background: #fff; color: var(--accent); box-shadow: var(--shadow); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .filebox {
    width: 100%; display: block; font: inherit; color: inherit;
    border: 1.5px dashed var(--line); border-radius: 12px; padding: 14px; text-align: center;
    background: var(--bg); cursor: pointer; transition: .15s;
  }
  .filebox:hover { border-color: var(--accent); background: var(--accent-soft); }
  .filebox .big { font-size: 26px; }
  .filebox .small { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .thumb { max-width: 100%; max-height: 160px; border-radius: 10px; margin-top: 8px; box-shadow: var(--shadow); }
  .media-strip { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
  .media-thumb { width: 120px; border: 1px solid var(--line); border-radius: 10px; padding: 6px; background: #fff; position: relative; }
  .media-thumb > img { width: 100%; height: 70px; object-fit: contain; border-radius: 6px; background: var(--wash); }
  .media-thumb .vtag { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,.55); color: #fff; border-radius: 6px; padding: 1px 4px; display: inline-flex; }
  .media-thumb-tools { display: flex; align-items: center; gap: 2px; margin-top: 4px; }
  .media-thumb-tools .ord { font-size: 11px; color: var(--muted); min-width: 14px; text-align: center; }
  .media-thumb-tools .iconbtn { flex: 0 0 auto; }
  .media-thumb-tools .iconbtn:disabled { opacity: .35; cursor: not-allowed; }
  .media-text { width: 100%; margin-top: 4px; font: inherit; font-size: 11px; resize: vertical; border: 1px solid var(--line); border-radius: 6px; padding: 4px; }

  .btn {
    width: 100%; padding: 12px; border: 0; border-radius: 12px; font: inherit; font-weight: 700;
    cursor: pointer; transition: .15s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn.primary { background: var(--accent); color: #fff; box-shadow: var(--shadow); }
  .btn.primary:hover { background: var(--accent-deep); }
  .btn.primary:disabled { opacity: .55; cursor: not-allowed; }
  .btn.ghost { background: #fff; border: 1px solid var(--line); color: var(--ink); }
  .btn.ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn.ghost:disabled { opacity: .5; cursor: not-allowed; }
  .btn:focus-visible, .iconbtn:focus-visible, .addbtn:focus-visible,
  .modes button:focus-visible, .filebox:focus-visible {
    outline: none; box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow);
  }

  .alert { padding: 11px 13px; border-radius: 10px; font-size: 13px; margin-top: 12px; line-height: 1.45; }
  .alert.bad { background: var(--bad-bg); color: var(--bad-ink); border: 1px solid var(--bad); }
  .alert.info { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--purple-grey); }
  .alert pre { white-space: pre-wrap; word-break: break-word; margin: 6px 0 0; font-size: 11.5px; }

  /* Preview slides */
  .slides { display: flex; flex-direction: column; gap: 18px; }
  .slide {
    background: #fff; border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
  }
  .slide .bar { height: 6px; background: var(--accent); }
  .slide .body { padding: 18px 20px; }
  /* Functional slide wayfinding label (replaces the retired uppercase .kicker eyebrow).
     The 3 preview slides are a real ordered sequence, so a small numbered badge earns its place. */
  .slide-tag { display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 600; color: var(--ink); margin-bottom: 2px; flex-wrap: wrap; }
  .slide-tag .n { flex: 0 0 auto; display: grid; place-items: center; width: 18px; height: 18px; border-radius: 6px; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; }
  .slide-tag .aside { color: var(--muted); font-weight: 400; }
  .slide-head { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
  .slide-head .slide-tag { margin-bottom: 0; }
  .regen { margin-left: auto; flex: 0 0 auto; display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--line); background: #fff; color: var(--accent); border-radius: 999px; padding: 4px 11px; font: inherit; font-size: 12px; font-weight: 600; cursor: pointer; transition: .15s; white-space: nowrap; }
  .regen:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-soft); }
  .regen:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-soft); }
  .regen:disabled { opacity: .5; cursor: not-allowed; }
  .routine-pick { margin: 6px 0 8px; }
  .routine-pick select { width: auto; min-width: 240px; max-width: 100%; }
  .slide h3 { margin: 4px 0 2px; font-size: 16px; }
  .editable {
    border: 1px solid transparent; border-radius: 8px; padding: 6px 8px; margin: -2px -8px 6px;
    width: calc(100% + 16px); font: inherit; color: var(--ink); background: transparent; display: block;
  }
  .editable:hover { background: var(--wash); }
  .editable:focus { background: #fff; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); outline: none; }
  textarea.editable { resize: vertical; line-height: 1.5; }
  .titlebig { font-size: 22px; font-weight: 800; font-family: var(--font-display); }
  .meta-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
  .chip { background: var(--accent-soft); color: var(--accent); padding: 4px 11px; border-radius: 999px; font-size: 12.5px; font-weight: 600; }
  .chip.gold { background: var(--gold-soft); color: var(--accent-2-ink); }
  /* Band identity — categorical, never an interactive cue */
  .chip.band-pyp    { background: var(--band-pyp-bg);    color: var(--band-pyp-ink); }
  .chip.band-myp    { background: var(--band-myp-bg);    color: var(--band-myp-ink); }
  .chip.band-middle { background: var(--band-middle-bg); color: var(--band-middle-ink); }
  .chip.band-senior { background: var(--band-senior-bg); color: var(--band-senior-ink); }
  .advisory-ctl { margin: 10px 0; }
  .advisory-check { display: inline-flex; align-items: center; gap: 8px; font-weight: 600; cursor: pointer; }
  .advisory-check input { width: 16px; height: 16px; }
  .advisory-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .advisory-chip { border: 1px solid var(--line, #E7E1EF); background: transparent; color: inherit;
    border-radius: 999px; padding: 5px 12px; font-size: 13px; cursor: pointer; }
  .advisory-chip.on { background: var(--accent, #4F2759); color: #fff; border-color: var(--accent, #4F2759); }
  .advisory-chip:focus-visible { outline: 2px solid var(--accent, #4F2759); outline-offset: 2px; }
  @media (prefers-reduced-motion: no-preference) { .advisory-chip { transition: background .15s, color .15s; } }
  .advisory-card { background: #2B281F; color: #FFFFFF; border-radius: 12px; overflow: hidden; }
  .advisory-warnhead { background: #F0A54F; color: #2B281F; font-weight: 800; font-size: 18px; letter-spacing: .08em; padding: 11px 22px; display: flex; align-items: center; gap: 9px; }
  .advisory-tri { font-size: 20px; line-height: 1; }
  .advisory-body { padding: 16px 22px 18px; }
  .advisory-line { font-size: 16px; margin: 0 0 10px; }
  .advisory-reassure { font-size: 14px; font-style: italic; opacity: .92; margin: 0; }
  .band-dot { display: inline-block; width: 8px; height: 8px; border-radius: 999px; margin-right: 5px; vertical-align: middle; }
  .band-dot.band-pyp    { background: var(--band-pyp); }
  .band-dot.band-myp    { background: var(--band-myp); }
  .band-dot.band-middle { background: var(--band-middle); }
  .band-dot.band-senior { background: var(--band-senior); }
  /* Band deck tabs — switch the previewed/edited deck when several bands generated */
  .band-tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .band-tab { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; border: 1px solid var(--line); border-radius: 999px; background: var(--panel); font-weight: 600; cursor: pointer; }
  .band-tab.on { border-color: var(--accent); color: var(--accent); }

  .band-multi { display: flex; flex-direction: column; gap: 8px; }
  .band-opt { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); }
  .band-opt.on { border-color: var(--accent-soft); background: var(--wash); }
  .band-check { display: flex; align-items: center; gap: 8px; font-weight: 600; cursor: pointer; }
  .band-opt select { width: auto; min-width: 130px; }

  .theme-picks { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
  .theme-picks .pick { border: 1px solid transparent; background: var(--bg); color: var(--ink); border-radius: 999px; padding: 3px 10px; font: inherit; font-size: 12px; cursor: pointer; transition: .15s; }
  .theme-picks .pick.tint-0 { background: var(--warn-bg);   color: var(--warn-ink); }
  .theme-picks .pick.tint-1 { background: var(--good-bg);   color: var(--good-ink); }
  .theme-picks .pick.tint-2 { background: var(--info-bg);   color: var(--info-ink); }
  .theme-picks .pick.tint-3 { background: var(--bad-bg);    color: var(--bad-ink); }
  .theme-picks .pick.tint-4 { background: var(--gold-soft); color: var(--accent-2-ink); }
  .theme-picks .pick:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .theme-picks .pick.on { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .theme-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .theme-edit-toggle { background: none; border: 0; color: var(--accent); font: inherit; font-size: 12px; cursor: pointer; padding: 2px 4px; }
  .theme-edit-toggle:hover { text-decoration: underline; }
  .pick-wrap { display: inline-flex; align-items: center; }
  .pick-wrap .pick-x { margin-left: -4px; border: 0; background: transparent; color: var(--muted); font-size: 14px; line-height: 1; cursor: pointer; padding: 0 5px; border-radius: 999px; }
  .pick-wrap .pick-x:hover { color: var(--bad-ink); background: var(--bad-bg); }
  .theme-add { display: inline-flex; align-items: center; gap: 4px; }
  .theme-add input { font: inherit; font-size: 12px; padding: 3px 8px; border-radius: 999px; border: 1px solid var(--accent); }
  .theme-add .btn.ghost { width: auto; padding: 3px 10px; }

  .step { display: grid; grid-template-columns: 56px 1fr auto; gap: 8px; align-items: start; margin-bottom: 8px; }
  .step .mins { display: flex; align-items: center; gap: 3px; }
  .step .mins input { width: 38px; text-align: center; padding: 6px 4px; }
  .step .mins span { font-size: 11px; color: var(--muted); }
  .step .name { font-weight: 700; }
  .iconbtn { border: 1px solid var(--line); background: #fff; border-radius: 8px; width: 28px; height: 28px; cursor: pointer; color: var(--muted); font-size: 14px; }
  .iconbtn:hover { border-color: var(--bad); color: var(--bad); }
  .addbtn { border: 1px dashed var(--line); background: #fff; border-radius: 10px; padding: 7px 10px; font: inherit; font-size: 12.5px; color: var(--accent); cursor: pointer; font-weight: 600; }
  .addbtn:hover { border-color: var(--accent); background: var(--accent-soft); }
  .total { font-size: 12.5px; color: var(--muted); margin-top: 4px; }
  .total.over { color: var(--bad-ink); font-weight: 700; }

  .stim-link { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .stim-link img.qr { width: 120px; height: 120px; border: 1px solid var(--line); border-radius: 10px; padding: 6px; background: #fff; }
  .stim-link a { color: var(--accent); font-weight: 600; word-break: break-all; }
  .stim-img { text-align: center; }
  .stim-img img { max-width: 100%; max-height: 280px; border-radius: 10px; box-shadow: var(--shadow); }
  .stim-img { position: relative; }
  .vbadge { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 46px; height: 46px; border-radius: 999px; background: rgba(79,39,89,.82);
    color: #fff; display: grid; place-items: center; box-shadow: var(--shadow); pointer-events: none; }
  .vbadge svg { width: 20px; height: 20px; margin-left: 2px; }

  .reel-wrap { max-width: 420px; margin: 8px auto 0; }
  .reel { position: relative; outline: none; }
  .reel:focus-visible { box-shadow: 0 0 0 3px var(--accent-soft); border-radius: 12px; }
  .reel-frame { position: relative; aspect-ratio: 4 / 3; background: var(--wash); border-radius: 10px; overflow: hidden; display: grid; place-items: center; box-shadow: var(--shadow); }
  .reel-frame img, .reel-frame video { max-width: 100%; max-height: 100%; object-fit: contain; }
  .reel-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; border-radius: 999px; border: none; background: rgba(0,0,0,.5); color: #fff; font-size: 20px; line-height: 1; cursor: pointer; display: grid; place-items: center; }
  .reel-arrow.left { left: 8px; } .reel-arrow.right { right: 8px; }
  .reel-arrow:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--accent-soft); }
  .reel-dots { display: flex; justify-content: center; gap: 6px; margin-top: 8px; }
  .reel-dots .dot { width: 8px; height: 8px; border-radius: 999px; border: none; background: #b9afce; cursor: pointer; padding: 0; }
  .reel-dots .dot.on { background: var(--accent); }
  @media (prefers-reduced-motion: reduce) { .reel * { transition: none !important; } }

  .resp-note { margin-top: 6px; padding: 7px 10px; background: var(--wash); border-radius: 10px; }
  .resp-cap { font-size: 10.5px; letter-spacing: .04em; text-transform: uppercase; color: var(--accent); font-weight: 700; display: block; margin-bottom: 2px; }

// Canvas-generated slide textures (no external asset files). Returns a PNG data-URL sized to

function makeTexture(kind, opts) {

const VIDEO_MARK_PREFIX = "TSG-VIDEO::";

// Convert each marked poster <p:pic> into a real online-video object referencing its SharePoint URL.
async function injectOnlineVideos(blob, videoMarks) {
  if (!videoMarks.length || typeof JSZip === "undefined") return blob;
  const zip = await JSZip.loadAsync(blob);
  const slidePaths = Object.keys(zip.files).filter(p => /^ppt\/slides\/slide\d+\.xml$/.test(p));
  for (const sp of slidePaths) {
    let xml = await zip.file(sp).async("string");
    if (xml.indexOf(VIDEO_MARK_PREFIX) === -1) continue;
    const relPath = sp.replace(/slides\/(slide\d+)\.xml$/, "slides/_rels/$1.xml.rels");
    let rels = await zip.file(relPath).async("string");
    let relSeq = 0;
    let lastVideoSpid = null;

    xml = xml.replace(/<p:pic>[\s\S]*?<\/p:pic>/g, (pic) => {
      const m = pic.match(/descr="TSG-VIDEO::([^"]+)"/);
      if (!m) return pic;
      const idm = pic.match(/<p:cNvPr\s+id="(\d+)"/);
      if (idm) lastVideoSpid = idm[1];
      const rid = "rIdVid" + (++relSeq);

        `<Relationship Id="${rid}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/video" Target="${m[1]}" TargetMode="External"/></Relationships>`);

        if (close === "/>") return head + '><a:hlinkClick r:id="" action="ppaction://media"/></p:cNvPr>';

    `xmlns:vt="http://schemas.openxmlformats.org/officeDocument/2006/docPropsVTypes">${body}</Properties>`);

// Write a video into the connected folder and return its plain-path SharePoint URL.
async function putVideoToSharePoint(dirHandle, file) {
  const savedName = sharePointFileName(file.name);
  const fh = await dirHandle.getFileHandle(savedName, { create: true });
  const w = await fh.createWritable();
  await w.write(file);
  await w.close();
  const url = SHAREPOINT_BASE + savedName.replace(/ /g, "%20"); // spaces -> %20, keep + literal
  return { url, savedName };
}

// Shared theme list lives as themes.json in the connected SharePoint folder so all
// teachers who connect the same library see the same presets (OneDrive sync;
// last-write-wins). Reads are tolerant: any error/absent/malformed -> null.
const THEMES_FILE = "themes.json";
async function readThemesFile(dirHandle) {
  try {
    const fh = await dirHandle.getFileHandle(THEMES_FILE); // no create -> throws if absent
    const text = await (await fh.getFile()).text();
    const data = JSON.parse(text);
    const arr = Array.isArray(data) ? data : (data && Array.isArray(data.themes) ? data.themes : null);
    if (!arr) return null;
    const clean = normalizeThemes(arr);
    return clean.length ? clean : null;
  } catch (_) { return null; }
}
async function writeThemesFile(dirHandle, themes) {
  const fh = await dirHandle.getFileHandle(THEMES_FILE, { create: true });
  const w = await fh.createWritable();
  await w.write(JSON.stringify({ version: 1, themes, updated: new Date().toISOString() }, null, 2));
  await w.close();
}

// Human-readable byte size, e.g. 26214400 -> "25.0 MB".
function formatBytes(n) {
  if (n == null || isNaN(n)) return "";
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return Math.round(n / 1024) + " KB";
  return (n / (1024 * 1024)).toFixed(1) + " MB";
}

// Resolve once the video has finished seeking to time t (seconds).
function seekTo(video, t) {
  return new Promise((resolve, reject) => {
    const onSeeked = () => { cleanup(); resolve(); };
    const onErr = () => { cleanup(); reject(new Error("seek failed")); };
    const cleanup = () => {
      video.removeEventListener("seeked", onSeeked);
      video.removeEventListener("error", onErr);
    };
    video.addEventListener("seeked", onSeeked);
    video.addEventListener("error", onErr);
    video.currentTime = Math.min(Math.max(t, 0), video.duration || t);
  });
}

// Sample `count` evenly-spaced still frames from a video File, fully in-browser.
// Returns JPEG data URLs. Never rejects: if the browser can't decode the format,
// resolves with frames:[] so the caller can fall back to a description + embed.
function extractVideoFrames(file, count = 4) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(file);
    const video = document.createElement("video");
    video.muted = true;
    video.preload = "metadata";
    video.src = url;
    const finish = (frames, meta) => {
      URL.revokeObjectURL(url);
      resolve({ frames, poster: frames[0] || "", ...meta });
    };
    const fail = () => finish([], { duration: 0, width: 0, height: 0 });
    video.onerror = fail;
    video.onloadedmetadata = async () => {
      const duration = video.duration, vw = video.videoWidth, vh = video.videoHeight;
      if (!duration || !isFinite(duration) || !vw || !vh) return fail();
      const scale = Math.min(1, 1024 / Math.max(vw, vh));
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(vw * scale);
      canvas.height = Math.round(vh * scale);
      const ctx = canvas.getContext("2d");
      const frames = [];
      try {
        for (let i = 1; i <= count; i++) {
          await seekTo(video, duration * i / (count + 1));
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          frames.push(canvas.toDataURL("image/jpeg", 0.8));
        }
      } catch (_) { /* keep whatever frames we captured */ }
      finish(frames, { duration, width: vw, height: vh });
    };
  });
}

// Decode a media file's audio, downmix to 16 kHz mono, return a 16-bit PCM WAV Blob.
// Caps at maxSeconds (truncating long clips) so the result stays under the API limit.
async function videoFileToWav16k(file, maxSeconds = 780) {
  const arrayBuf = await file.arrayBuffer();
  const Ctx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
  const tmp = new (window.AudioContext || window.webkitAudioContext)();
  let decoded;
  try { decoded = await tmp.decodeAudioData(arrayBuf.slice(0)); }
  finally { tmp.close && tmp.close(); }
  const srcRate = decoded.sampleRate, outRate = 16000;
  const wantSec = Math.min(decoded.duration, maxSeconds);
  const truncated = decoded.duration > maxSeconds + 0.5;
  const frames = Math.floor(wantSec * outRate);
  const off = new Ctx(1, frames, outRate);
  const buf = off.createBuffer(1, Math.floor(wantSec * srcRate), srcRate);
  // mono downmix
  const ch0 = decoded.getChannelData(0);
  const ch1 = decoded.numberOfChannels > 1 ? decoded.getChannelData(1) : null;
  const mono = buf.getChannelData(0);
  for (let i = 0; i < mono.length; i++) mono[i] = ch1 ? (ch0[i] + ch1[i]) / 2 : ch0[i];
  const node = off.createBufferSource(); node.buffer = buf; node.connect(off.destination); node.start();
  const rendered = await off.startRendering();
  const data = rendered.getChannelData(0);
  // PCM16 WAV
  const bytesPerSample = 2, blockAlign = bytesPerSample, byteRate = outRate * blockAlign;
  const ab = new ArrayBuffer(44 + data.length * 2), view = new DataView(ab);
  const wr = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
  wr(0, "RIFF"); view.setUint32(4, 36 + data.length * 2, true); wr(8, "WAVE"); wr(12, "fmt ");
  view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
  view.setUint32(24, outRate, true); view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true); view.setUint16(34, 16, true); wr(36, "data");
  view.setUint32(40, data.length * 2, true);
  let off2 = 44;
  for (let i = 0; i < data.length; i++) { let s = Math.max(-1, Math.min(1, data[i])); view.setInt16(off2, s < 0 ? s * 0x8000 : s * 0x7fff, true); off2 += 2; }
  return { blob: new Blob([ab], { type: "audio/wav" }), truncated };
}

function readFileAsDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// Build a QR code data URL synchronously. Never throws — returns "" if the
// library is missing or generation fails, so a QR problem can't blank the app.
function makeQrDataUrl(text) {
  try {
    if (typeof qrcode !== "function" || !text) return "";
    const qr = qrcode(0, "M"); // type 0 = auto-size, medium error correction
    qr.addData(String(text));
    qr.make();
    return qr.createDataURL(6, 8); // cellSize, margin -> GIF data URL
  } catch (_) {
    return "";
  }
}

// Strip site chrome (nav, images, link URLs, related-article footers) out of the
// markdown a reader service returns, leaving mostly the article body.
function cleanArticleMarkdown(md) {
  let t = String(md || "");
  // Cut everything from the first end-of-article / footer marker onward.
  const markers = ["Explore more on these topics", "\n### Most viewed", "\n## Most viewed", "\nReuse this content", "\n## More from"];
  let cut = t.length;
  for (const m of markers) { const i = t.indexOf(m); if (i !== -1 && i < cut) cut = i; }
  t = t.slice(0, cut);
  t = t.replace(/!\[[^\]]*\]\([^)]*\)/g, "");          // drop images
  t = t.replace(/\[([^\]]*)\]\([^)]*\)/g, "$1");        // links -> plain label
  t = t.replace(/^\s*-\s*\[[ xX]\]\s*$/gm, "");         // checkbox artefacts
  const drop = /^(Skip to|Search input|Show more|Hide expanded|Close dialogue|Support the Guardian|Fund independent|US edition|UK edition|Australia edition|Europe edition|International edition|Sign in|Print subscriptions|Download the app|View image|Prefer the Guardian|Toggle caption|Next image|Previous image|google-search)/i;
  t = t.split("\n").filter(l => !drop.test(l.trim())).join("\n");
  t = t.replace(/\n{3,}/g, "\n\n").trim();
  return t;
}

// Find the first real content image URL in reader markdown (skip logos/icons/sprites).
function extractLeadImage(md) {
  const re = /!\[[^\]]*\]\((https?:\/\/[^)\s]+)\)/g;
  let m;
  while ((m = re.exec(String(md || "")))) {
    const u = m[1];
    if (/logo|icon|sprite|avatar|placeholder|1x1|pixel|\.svg(\?|$)/i.test(u)) continue;
    if (/\.(jpe?g|png|webp|gif)(\?|$)/i.test(u) || /\/img\/|\/media\/|\/images?\//i.test(u)) return u;
  }
  return "";
}

// Fetch a (possibly cross-origin) image and return a base64 data URL, routed through
// the wsrv.nl image proxy so CORS never blocks embedding it in the .pptx. "" on failure.
async function urlToDataUrl(url) {
  if (!url) return "";
  const proxied = "https://images.weserv.nl/?url=" + encodeURIComponent(url.replace(/^https?:\/\//, "")) + "&output=jpg";
  try {
    const resp = await fetch(proxied);
    if (!resp.ok) throw new Error("proxy " + resp.status);
    const blob = await resp.blob();
    return await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(blob); });
  } catch (_) { return ""; }
}

// Find one relevant, free (CC-licensed) image for a topic via the Wikimedia
// Commons API (keyless, CORS-enabled with origin=*). Returns a raster image URL,
// or "" on any failure — so a missing image never breaks the flow.
async function findRelevantImage(query) {
  const q = String(query || "").replace(/[^a-zA-Z0-9 ]/g, " ").replace(/\s+/g, " ").trim();
  if (!q) return "";
  try {
    const api = "https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrnamespace=6&gsrlimit=6&gsrsearch="
      + encodeURIComponent(q) + "&prop=imageinfo&iiprop=url&iiurlwidth=1000&format=json&origin=*";
    const resp = await fetch(api);
    if (!resp.ok) return "";
    const data = await resp.json();
    const pages = (data.query && data.query.pages) ? Object.values(data.query.pages) : [];
    pages.sort((a, b) => (a.index || 0) - (b.index || 0)); // keep search relevance order
    for (const p of pages) {
      const info = p && p.imageinfo && p.imageinfo[0];
      const u = info && (info.thumburl || info.url);
      if (u && /\.(jpe?g|png|webp)(\?|$)/i.test(u)) return u; // raster only (skip svg/icons)
    }
    return "";
  } catch (_) { return ""; }
}

async function extractPdfText(file) {
  const buf = await file.arrayBuffer();
  await loadScript(PDFJS_SRC, PDFJS_SRI);
  const pdfjs = window.pdfjsLib;
  pdfjs.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const pdf = await pdfjs.getDocument({ data: buf }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(" ") + "\n";
  }
  return text.trim();
}

// Pull the first valid JSON object out of a string, defensively.
function parseJsonLoose(raw) {
  try { return JSON.parse(raw); } catch (_) {}
  const start = raw.indexOf("{");
  const end = raw.lastIndexOf("}");
  if (start !== -1 && end > start) {
    return JSON.parse(raw.slice(start, end + 1)); // may throw -> caller catches
  }
  throw new Error("No JSON object found in model output.");
}

// Strip stray markdown (bold/italic/code/heading markers) the model sometimes adds.
function stripMd(s) {
  return String(s == null ? "" : s)
    .replace(/\*\*(.*?)\*\*/g, "$1")
    .replace(/__(.*?)__/g, "$1")
    .replace(/\*(.*?)\*/g, "$1")
    .replace(/`([^`]*)`/g, "$1")
    .replace(/^#{1,6}\s+/gm, "")
    .trim();
}

// Normalise guiding questions to { q, responses } objects. Accepts the model's
// new object shape ({ question, responses }) or a plain string (legacy / fallback),
// so older saved content and either prompt shape still load cleanly.
function normGuiding(arr) {
  if (!Array.isArray(arr) || !arr.length) return [{ q: "", responses: "" }, { q: "", responses: "" }, { q: "", responses: "" }];
  return arr.map(it => typeof it === "string"
    ? { q: stripMd(it), responses: "" }
    : { q: stripMd((it && (it.question || it.q)) || ""), responses: stripMd((it && it.responses) || "") });
}

// Shape a parsed model deck into the editable spotlight object, pitched per band.
// Pure (uses only stripMd + ROUTINES, both module-level) so one Generate can build
// one deck per selected band.
function shapeDeck(parsed, { band, title }) {
  const steps = Array.isArray(parsed.steps) && parsed.steps.length
    ? parsed.steps.map(s => ({ name: stripMd(s.name || "Step"), minutes: Number(s.minutes) || 1, prompt: stripMd(s.prompt || ""), responses: stripMd(s.responses || "") }))
    : [{ name: "Discuss", minutes: 5, prompt: "", responses: "" }];
  return {
    hook: stripMd(parsed.hook || ""),
    title: stripMd(parsed.title || title || "Digital Life Spotlight"),
    summary: stripMd(parsed.summary || ""),
    framing: stripMd(parsed.framing || ""),
    routineName: stripMd(parsed.routineName || ROUTINES[band][0].name),
    routineIntro: stripMd(parsed.routineIntro || ""),
    steps,
    guidingQuestions: normGuiding(parsed.guidingQuestions),
    studentAction: stripMd(parsed.studentAction || ""),
    keywords: Array.isArray(parsed.keywords) ? parsed.keywords.map(k => stripMd(String(k))).map(s => s.trim().toLowerCase()).filter(Boolean).slice(0, 20) : [],
    learnerProfile: Array.isArray(parsed.learnerProfile) ? parsed.learnerProfile.map(stripMd) : [],
    contentAdvisory: (() => {
      const a = parsed.contentAdvisory || {};
      const cats = Array.isArray(a.categories) ? a.categories.filter(c => ADVISORY_CATEGORIES[c]) : [];
      return { flag: !!a.flag, categories: cats, note: stripMd(a.note || "") };
    })(),
    // teacher-controlled state, seeded from the AI's assessment
    advisoryShow: !!(parsed.contentAdvisory && parsed.contentAdvisory.flag),
    advisoryCats: (Array.isArray(parsed.contentAdvisory?.categories) ? parsed.contentAdvisory.categories.filter(c => ADVISORY_CATEGORIES[c]) : []),
  };
}

// Filename-safe band token for the per-band .pptx export.
function bandFileSlug(bandKey) {
  return ({ PYP: "PYP", Middle: "Middle-7-9", Senior: "Senior-10-12" })[bandKey] || bandKey;
}

// Content-advisory categories the model can flag, and how each reads on the
// teacher's chip vs. the (briefer) advisory-slide theme line.
const ADVISORY_CATEGORIES = {
  "sexual":      { chip: "Nudity / mature themes",   theme: "mature themes" },
  "confronting": { chip: "Violence or distressing",  theme: "confronting themes" },
  "self-harm":   { chip: "Self-harm",                theme: "self-harm" },
  "substance":   { chip: "Drugs, alcohol or illegal", theme: "drugs or alcohol" },
};
const ADVISORY_ORDER = ["sexual", "confronting", "self-harm", "substance"];

// Brief, student-facing theme line for the advisory slide, built from selected
// category keys (deduped, in canonical order). Empty selection -> gentle generic.
function advisoryThemeLine(cats) {
  const set = Array.isArray(cats) ? cats.filter(c => ADVISORY_CATEGORIES[c]) : [];
  const ordered = ADVISORY_ORDER.filter(c => set.includes(c));
  if (!ordered.length) return "a few sensitive topics";
  return ordered.map(c => ADVISORY_CATEGORIES[c].theme).join(" · ");
}

const TRANSCRIBE_LIMIT = 25 * 1024 * 1024; // OpenAI audio endpoint per-file cap
// Transcribe a video/audio File via OpenAI. Sends the file directly when small
// enough; otherwise downsamples to 16 kHz mono WAV (and truncates very long clips).
async function transcribeMedia({ apiKey, file }) {
  let sendFile = file, truncated = false;
  if (file.size > TRANSCRIBE_LIMIT) {
    const { blob, truncated: t } = await videoFileToWav16k(file);
    sendFile = new File([blob], "audio.wav", { type: "audio/wav" });
    truncated = t;
    if (sendFile.size > TRANSCRIBE_LIMIT) {
      const { blob: b2, truncated: t2 } = await videoFileToWav16k(file, 600);
      sendFile = new File([b2], "audio.wav", { type: "audio/wav" }); truncated = t2 || t;
    }
  }
  const fd = new FormData();
  fd.append("file", sendFile);
  fd.append("model", "gpt-4o-transcribe");
  fd.append("response_format", "text");
  const resp = await fetch("https://api.openai.com/v1/audio/transcriptions", {
    method: "POST", headers: { Authorization: "Bearer " + apiKey }, body: fd,
  });
  if (!resp.ok) {
    let detail = ""; try { detail = JSON.stringify((await resp.json()).error || {}); } catch (_) { detail = await resp.text().catch(() => ""); }
    throw new Error(`Transcription failed (${resp.status}). ${detail}`);
  }
  const text = (await resp.text()).trim();
  return { text, truncated };
}

async function generateSpotlight({ apiKey, model, mode, band, year, theme, title, media = [], sourceText = "", scope = "all", routineChoice = "", current = null }) {
  const yearStr = year ? ` Specifically pitch to ${year}.` : "";
  const titleInstruction = title
    ? `The teacher provided this title: "${title}". Use it (lightly polished if needed).`
    : `No title was provided — invent a short, inviting title (max ~8 words).`;

  const chosen = routineChoice ? ROUTINES[band].find(r => r.name === routineChoice) : null;

  const F = {
    hook: `"hook": "string — a SHORT, catchy slide title (MAX 6 words) that captures the SINGLE most striking, specific angle of THIS story — the concrete detail a student would stop scrolling for, not a vague topic label or theme word. A real headline, specific to what actually happened here. NOT a full sentence or question. Pitch it to the band. The provocation lives in the discussion steps, so keep this a memorable, curiosity-sparking title."`,
    title: `"title": "string — the spotlight title"`,
    summary: summaryField,
    framing: `"framing": "string — one short line telling students what to do, e.g. '${MODE_FRAMING[mode]}'"`,
    routineRationale: `"routineRationale": "string — FIRST, before naming the routine: 1-2 sentences analysing THIS specific stimulus — its core tension and the kind of thinking it most rewards (close observation? predicting? taking an ethical stance? stepping into a stakeholder's shoes? testing a claim?) — and which routine from the list below best fits, and why. This is your private reasoning to choose well; it is not shown to students."`,
    routineName: chosen
      ? `"routineName": "string — MUST be exactly: ${chosen.name}"`
      : `"routineName": "string — the EXACT name of the ONE thinking routine from the list below that your rationale concluded is the BEST fit for this stimulus"`,
    routineIntro: `"routineIntro": "string — one warm sentence introducing the routine to the class"`,
    steps: `"steps": [\n    { "name": "string — short step label", "minutes": 1, "prompt": "string — a punchy, provocative discussion prompt the teacher poses at this step", "responses": "string — 2 or 3 SHORT examples of what students at this band might actually say in response, so the teacher can anticipate the discussion (e.g. 'Some may say…; others might argue…')" }\n  ]`,
    guidingQuestions: `"guidingQuestions": [ { "question": "string — a guiding question the teacher can ask, pitched to the band", "responses": "string — 2 or 3 SHORT examples of how students at this band might actually answer it, so the teacher can anticipate the discussion (e.g. 'Some may say…; others might argue…')" } ]  — give 3 to 4 of these objects`,
    studentAction: `"studentAction": "string — ONE concrete action or genuine shift in thinking the student leaves with, drawn from the REAL heart of THIS story: the actual tension, choice, or consequence in the stimulus, not a generic safety platitude. It must connect directly to what made this stimulus matter and give the student something they could truly do or reconsider today. Plain, specific, memorable, pitched to the band — never preachy or a slogan."`,
    keywords: `"keywords": ["8 to 15 short lowercase search terms a teacher might type to FIND this lesson later — the core topics, the real-world hook, and named things in the stimulus (apps, activities, e.g. music, gaming, TikTok, deepfakes), plus close synonyms. Concrete over abstract. For search only; never shown to students."]`,
    learnerProfile: `"learnerProfile": ["1 to 3 IB Learner Profile attributes that fit, e.g. 'Thinker', 'Principled', 'Caring'"]`,
    contentAdvisory: `"contentAdvisory": { "flag": true or false, "categories": [any of "sexual","confronting","self-harm","substance" that genuinely apply], "note": "string — if flag is true, ONE short, warm, plain-text line naming the sensitive themes, pitched to the band (gentler and simpler for PYP, more direct for Senior); empty string if flag is false" }`,
  };
  const SCOPES = {
    all: ["hook", "title", "summary", "framing", "routineRationale", "routineName", "routineIntro", "steps", "guidingQuestions", "studentAction", "keywords", "learnerProfile", "contentAdvisory"],
    title: ["hook", "title"],
    provocation: chosen ? ["routineName", "routineIntro", "steps", "guidingQuestions"] : ["routineRationale", "routineName", "routineIntro", "steps", "guidingQuestions"],
    takeaway: ["studentAction", "learnerProfile"],
  };
  const keys = SCOPES[scope] || SCOPES.all;
  const includesRoutine = keys.indexOf("routineName") !== -1;

  const routineBlock = includesRoutine
    ? "\n" + (chosen
        ? `Use EXACTLY this Harvard Project Zero thinking routine — do not pick another: "${chosen.name}" — ${chosen.moves} Build "routineIntro" and the steps around it as LOOSE INSPIRATION (capture its spirit, but DON'T mechanically echo its exact wording). Write genuinely engaging, provocative discussion prompts that maximise intrigue and debate for the band.`
        : `Choose the SINGLE MOST EFFECTIVE routine from this Harvard Project Zero list for THIS specific stimulus — do the analysis in "routineRationale" first, then commit to it in "routineName". Different stimuli reward different thinking: an image or close-up rewards observation routines; a clear ethical dilemma rewards stance or stakeholder-viewpoint routines; a surprising claim or statistic rewards prediction or claim-testing routines; an open-ended scenario rewards wondering or connecting routines. Match the routine to where the real intrigue in this stimulus lives. Do NOT fall back on a familiar, all-purpose routine just because it can fit almost anything — Claim, Support, Question and Compass Points in particular are badly over-chosen. Pick Claim, Support, Question ONLY when the stimulus specifically rewards staking and testing an argument, and Compass Points ONLY when it rewards weighing mixed reactions to a dilemma; never as a safe default. If two routines seem to fit, prefer the one that is MORE specific to this stimulus's particular kind of thinking (observation, prediction, stakeholder perspective, reconsidering a belief) over the generic claim/issue routine. Once chosen, use the routine as LOOSE INSPIRATION only — capture its spirit, but DON'T mechanically echo its exact wording. Write genuinely engaging, provocative discussion prompts that maximise intrigue and debate for the band:\n${routineList}`)

    : "";

{

}
Write every field in PLAIN TEXT — no markdown, no asterisks, no #, no backticks.${routineBlock}${diffNote}`;

  const systemMsg = "You are an expert IB educator and digital-citizenship coach. You design short, 5-minute 'Digital Life Spotlight' discussion prompts about cyber safety and digital citizenship. Your tone is warm, curious and student-centred, aligned to the IB Learner Profile. You ALWAYS respond with strict JSON only.";

    BAND_GUIDANCE[band] + yearStr,
    `Pitch the cognitive demand, vocabulary and discussion prompts specifically to THIS band — do not reuse generic wording. PYP: noticing/wondering, concrete. Middle: analyse scenarios and consequences. Senior: ethical/critical reasoning and trade-offs. The "responses" examples must sound like students of this band.`,

      .filter(Boolean);

    userContent.push({ type: "text", text: textParts.join("\n") + "\n\n" + schema });
    mediaItems.forEach(m => {
      if (m.kind === "image") userContent.push({ type: "image_url", image_url: { url: m.dataUrl } });
      else (m.frames || []).forEach(fr => userContent.push({ type: "image_url", image_url: { url: fr } }));
    });
  } else {
    const trimmed = (sourceText || "").slice(0, 12000).replace(/"{3,}/g, "“”");
    textParts.push(`The stimulus is the following article text. Build the spotlight from its real content, tied to the focus theme:\n\n"""\n${trimmed}\n"""`);
    userContent.push({ type: "text", text: textParts.join("\n") + "\n\n" + schema });
  }

  const resp = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
    body: JSON.stringify({
      model,
      messages: [
        { role: "system", content: systemMsg },
        { role: "user", content: userContent },
      ],
      response_format: { type: "json_object" },
      max_completion_tokens: 4000,
    }),
  });

  if (!resp.ok) {
    let detail = "";
    try { detail = JSON.stringify((await resp.json()).error || {}, null, 2); }
    catch (_) { detail = await resp.text().catch(() => ""); }
    throw new Error(`OpenAI API error (${resp.status}).\n${detail}`);
  }

  const data = await resp.json();
  const raw = data?.choices?.[0]?.message?.content || "";
  if (!raw.trim()) throw new Error("The model returned an empty response.");
  try {
    return { parsed: parseJsonLoose(raw), raw };
  } catch (perr) {
    const e = new Error("Could not parse the model's JSON: " + perr.message);
    e._raw = raw;
    throw e;
  }
}

/* Merge a scoped regenerate's parsed fields back into the spot, normalising like generate(). */
function mergeScopedFields(spot, scope, p) {
  const out = { ...spot };
  const norm = v => stripMd(v || "");
  if (scope === "title") {
    if (p.hook) out.hook = norm(p.hook);
    if (p.title) out.title = norm(p.title);
  } else if (scope === "provocation") {
    if (p.routineName) out.routineName = norm(p.routineName);
    if (p.routineIntro) out.routineIntro = norm(p.routineIntro);
    if (Array.isArray(p.steps) && p.steps.length)
      out.steps = p.steps.map(s => ({ name: stripMd(s.name || "Step"), minutes: Number(s.minutes) || 1, prompt: stripMd(s.prompt || ""), responses: stripMd(s.responses || "") }));
    if (Array.isArray(p.guidingQuestions) && p.guidingQuestions.length)
      out.guidingQuestions = normGuiding(p.guidingQuestions);
  } else if (scope === "takeaway") {
    if (p.studentAction) out.studentAction = norm(p.studentAction);
    if (Array.isArray(p.learnerProfile)) out.learnerProfile = p.learnerProfile.map(stripMd);
  }
  return out;
}

// Ask the model for ONE short focus-theme phrase based on the current stimulus.
// Sends the same content kinds generate() would (text + any image/frames) but asks
// only for a 2-4 word theme. Returns a cleaned phrase, or "" on empty.
// Snap any free text to the closest canonical THEME so the SharePoint "Theme"
// column only ever sees values from our closed set. Match is case-insensitive:
// exact first, then word-overlap, else the first theme as a safe default.
function snapToTheme(raw) {
  const s = String(raw || "").toLowerCase().replace(/[^a-z0-9 ]/g, " ").replace(/\s+/g, " ").trim();
  if (!s) return THEMES[0];
  const exact = THEMES.find(t => t.toLowerCase() === s);
  if (exact) return exact;
  const words = new Set(s.split(" ").filter(w => w.length > 2));
  let best = THEMES[0], bestScore = 0;
  for (const t of THEMES) {
    const tw = t.toLowerCase().replace(/[^a-z0-9 ]/g, " ").split(" ").filter(w => w.length > 2);
    const score = tw.reduce((n, w) => n + (words.has(w) ? 1 : 0), 0);
    if (score > bestScore) { bestScore = score; best = t; }
  }
  return best;
}

async function suggestThemeFromStimulus({ apiKey, model, mode, media = [], sourceText = "" }) {
  const list = THEMES.map(t => `"${t}"`).join(", ");
  const sys = `You are an IB digital-citizenship coach. Pick the single best FOCUS THEME for a 5-minute cyber-safety / digital-citizenship discussion built on the given stimulus. You MUST choose EXACTLY ONE theme from this fixed list and reply with ONLY that theme, copied verbatim (exact spelling and capitalisation), with no quotes, punctuation, or explanation:\n${list}`;
  const ask = `Choose the ONE best-fitting theme from the allowed list for a cyber-safety / digital-citizenship discussion based on this stimulus. Reply with only the theme text, exactly as written in the list.`;
  const userContent = [];
  if (mode === "media" && media.length) {
    userContent.push({ type: "text", text: ask + ` The stimulus is a reel of ${media.length} item(s).` });
    media.forEach(m => {
      if (m.kind === "image") userContent.push({ type: "image_url", image_url: { url: m.dataUrl } });
      else (m.frames || []).forEach(fr => userContent.push({ type: "image_url", image_url: { url: fr } }));
    });
  } else {
    userContent.push({ type: "text", text: ask + `\nStimulus:\n"""\n${(sourceText || "").slice(0, 8000).replace(/"{3,}/g, "“”")}\n"""` });
  }
  const resp = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
    body: JSON.stringify({
      model,
      messages: [{ role: "system", content: sys }, { role: "user", content: userContent }],
      max_completion_tokens: 800,
    }),
  });
  if (!resp.ok) {
    let detail = "";
    try { detail = JSON.stringify((await resp.json()).error || {}, null, 2); }
    catch (_) { detail = await resp.text().catch(() => ""); }
    throw new Error(`OpenAI API error (${resp.status}).\n${detail}`);
  }
  const data = await resp.json();
  const raw = (data?.choices?.[0]?.message?.content || "").trim();
  // Keep the first line, then snap it to the closest canonical THEME so the result
  // is always a member of the closed set (never free-form drift).
  const first = raw.split("\n")[0].replace(/^["'`]+|["'`.]+$/g, "").trim();
  return snapToTheme(first);
}

function MediaCarousel({ items, index, setIndex }) {
  const n = items.length;
  const clamp = (i) => (i + n) % n;
  const go = (d) => setIndex(i => clamp(i + d));
  const drag = React.useRef(null);
  if (!n) return null;
  const it = items[Math.min(index, n - 1)];
  return (
    <div className="reel" tabIndex={0} role="group" aria-label={`Stimulus ${index + 1} of ${n}`}
      onKeyDown={e => { if (e.key === "ArrowLeft") { e.preventDefault(); go(-1); } if (e.key === "ArrowRight") { e.preventDefault(); go(1); } }}
      onPointerDown={e => { drag.current = e.clientX; }}
      onPointerUp={e => { if (drag.current != null) { const dx = e.clientX - drag.current; if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1); } drag.current = null; }}>
      <div className="reel-frame">
        {it.kind === "image"
          ? <img src={it.dataUrl} alt={"Stimulus " + (index + 1) + ": " + it.name} />
          : <video src={it.dataUrl || undefined} poster={it.poster} controls playsInline />}
        {n > 1 && <React.Fragment>
          <button type="button" className="reel-arrow left" aria-label="Previous item" onClick={() => go(-1)}>‹</button>
          <button type="button" className="reel-arrow right" aria-label="Next item" onClick={() => go(1)}>›</button>
        </React.Fragment>}
      </div>
      {n > 1 && <div className="reel-dots">
        {items.map((m, i) => <button key={m.id} type="button" className={"dot" + (i === index ? " on" : "")} aria-label={"Go to " + (m.kind === "video" ? "video " : "image ") + (i + 1)} aria-current={i === index ? "true" : "false"} onClick={() => setIndex(i)} />)}
      </div>}
    </div>
  );
}

    idbLoadHandle("media").then(async h => { if (h) { setFolderHandle(h); setFolderName(h.name || "folder"); setFolderReady(await folderWritable(h)); } });
    idbLoadHandle("lessons").then(async h => { if (h) { setLessonsHandle(h); setLessonsName(h.name || "folder"); setLessonsReady(await folderWritable(h)); } });
  }, []);
  // Whenever a folder becomes available (restored on load, or freshly connected), adopt
  // its shared themes.json (or seed it). Deps don't change inside the effect, so no loop.
  React.useEffect(() => { syncThemesFromFolder(); }, [folderHandle, lessonsHandle]);
  // Single place that mutates the theme list: normalize -> live THEMES -> state -> cache.
  // (writeFile is wired to themes.json in Task 3.)
  function applyThemes(next, writeFile = true) {
    const clean = normalizeThemes(next);
    if (!clean.length) return;

    setThemeList(clean);

  }
  // Prefer writable Media folder, then Lessons; returns null if neither is writable.
  // Defined inside the component so it can call the component-scoped folderWritable().
  async function pickThemesFolder(mediaH, lessonsH) {
    if (mediaH && await folderWritable(mediaH)) return mediaH;
    if (lessonsH && await folderWritable(lessonsH)) return lessonsH;
    return null;
  }
  // On connect/load: if themes.json exists, adopt it (cache only); if absent, seed it.
  async function syncThemesFromFolder() {
    if (!fsSupported) return;
    const h = await pickThemesFolder(folderHandle, lessonsHandle);
    if (!h) return;
    const arr = await readThemesFile(h);
    if (arr) applyThemes(arr, false);      // adopt the shared list (cache only; don't rewrite)
    else { try { await writeThemesFile(h, THEMES); } catch (_) {} } // seed file from current list

    const name = newTheme.replace(/\s+/g, " ").trim();

    setNewTheme(""); setThemeMsg("");

    if (themeList.length <= 1) { setThemeMsg("Keep at least one theme."); return; }
    applyThemes(themeList.filter(t => t.toLowerCase() !== name.toLowerCase()));

  // Shown after a grant so teachers know how to stop reconnecting each session.
  const PERSIST_TIP = ' Tip: choose "Allow on every visit" in the browser prompt so you don\'t reconnect next time.';
  async function connectMediaFolder() {
    try {
      if (folderHandle) {

        if ((await folderHandle.requestPermission({ mode: "readwrite" })) === "granted") {

  async function connectLessonsFolder() {
    try {
      if (lessonsHandle) {

          setLessonsReady(true); setMediaNote('Lessons folder ready: "' + lessonsName + '".' + PERSIST_TIP); return;
