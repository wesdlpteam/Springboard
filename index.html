function MediaCarousel({ items, index, setIndex }) {
  const n = items.length;
  const clamp = (i) => (i + n) % n;
  const go = (d) => setIndex(i => clamp(i + d));
  const drag = React.useRef(null);
  if (!n) return null;
  const it = items[Math.min(index, n - 1)];
  return (
    <div className="reel" tabIndex={0} role="group" aria-label={`Stimulus ${index + 1} of ${n}`}
      onKeyDown={e => { if (e.key === "ArrowLeft") { e.preventDefault(); go(-1); } if (e.key === "ArrowRight") { e.preventDefault(); go(1); } }}
      onPointerDown={e => { drag.current = e.clientX; }}
      onPointerUp={e => { if (drag.current != null) { const dx = e.clientX - drag.current; if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1); } drag.current = null; }}>
      <div className="reel-frame">
        {it.kind === "image"
          ? <img src={it.dataUrl} alt={"Stimulus " + (index + 1) + ": " + it.name} />
          : <video src={it.dataUrl || undefined} poster={it.poster} controls playsInline />}
        {n > 1 && <React.Fragment>
          <button type="button" className="reel-arrow left" aria-label="Previous item" onClick={() => go(-1)}>‹</button>
          <button type="button" className="reel-arrow right" aria-label="Next item" onClick={() => go(1)}>›</button>
        </React.Fragment>}
      </div>
      {n > 1 && <div className="reel-dots">
        {items.map((m, i) => <button key={m.id} type="button" className={"dot" + (i === index ? " on" : "")} aria-label={"Go to " + (m.kind === "video" ? "video " : "image ") + (i + 1)} aria-current={i === index ? "true" : "false"} onClick={() => setIndex(i)} />)}
      </div>}
      {n > 1 && <div className="sr-only" aria-live="polite">{`Stimulus ${index + 1} of ${n}`}</div>}
    </div>
  );
}

const KEY_STORE = "sb_passcode";

// Admin-analytics password popup. Validates the password against the server before
// leaving Springboard, so a wrong password keeps the teacher on this page instead of
// bouncing to the stats gate. On success it stashes the password for stats.html (same
// sessionStorage key that page auto-loads from) and navigates there in the same tab.
function AdminGate({ onClose }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const inputRef = useRef(null);

  React.useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);
  React.useEffect(() => {
    function onKey(e) { if (e.key === "Escape") onClose(); }
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [onClose]);

  async function submit(e) {
    e.preventDefault();
    const p = pw.trim();
    if (!p) { setErr("Enter the admin password."); return; }
    setErr(""); setBusy(true);
    try {
      const res = await fetch(API_BASE + "/api/stats", { method: "POST", headers: { "x-sb-admin": p } });
      if (res.status === 401) { setErr("Wrong password."); setBusy(false); return; }
      if (!res.ok) { setErr("Couldn't reach the server. Try again."); setBusy(false); return; }
      try { sessionStorage.setItem("sb_admin", p); } catch (_) {}
      window.location.href = "stats.html";
    } catch (_) {
      setErr("Couldn't reach the server. Try again."); setBusy(false);
    }
  }

  return (
    <div className="modal-backdrop" onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" role="dialog" aria-modal="true" aria-labelledby="adminGateTitle">
        <div className="modal-head">
          <h2 id="adminGateTitle">Admin analytics</h2>
          <button type="button" className="iconbtn" aria-label="Close" onClick={onClose}><Icon d={I.close} size={14} stroke /></button>
        </div>
        <p className="modal-sub">Enter the admin password to view usage analytics.</p>
        <form onSubmit={submit}>
          <input ref={inputRef} type="password" autoComplete="current-password" value={pw}
            onChange={e => setPw(e.target.value)} placeholder="Admin password" aria-label="Admin password"
            aria-invalid={err ? "true" : undefined} />
          {err ? <p className="modal-err" role="alert">{err}</p> : null}
          <div className="modal-actions">
            <button type="button" className="btn ghost" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn primary" disabled={busy}>{busy ? "Checking…" : "Open analytics"}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

function App() {
  // config — passcode persists in this browser's localStorage (per user request)
  const [passcode, setPasscode] = useState(() => { try { return localStorage.getItem(KEY_STORE) || ""; } catch (_) { return ""; } });
  const [adminOpen, setAdminOpen] = useState(false); // admin-analytics password popup

  // inputs
  const [mode, setMode] = useState("media");
  const [media, setMedia] = useState([]); // ordered reel of {kind:"image"|"video", ...}
  const [reelIndex, setReelIndex] = useState(0); // active item in the preview carousel
  const [articleText, setArticleText] = useState("");
  const [articleImageUrl, setArticleImageUrl] = useState("");
  const [pdfName, setPdfName] = useState("");
  const [title, setTitle] = useState("");
  const [link, setLink] = useState("");
  const [activeBand, setActiveBand] = useState(null);// which generated deck is shown
  // classInfo replaces the old multi-band checkboxes + theme presets: one class
  // (curriculum/subject/year/outcome) drives one generator run.
  const [classInfo, setClassInfo] = useState(() => loadClassInfo());
  const saveClassInfo = (next) => {
    // VCE-senior Subject is a fixed <select>. If we just flipped into VCE-senior mode carrying
    // a free-typed subject that matches no VCE study, blank it so the placeholder shows and the
    // teacher must pick (otherwise vceStudyGuide silently finds nothing and skips injection).
    if (isVceSenior(next) && next.subject && !VCE_SUBJECTS.some(s => s.name === next.subject.trim())) {
      next = { ...next, subject: "" };
    }
    // Changing year level across a band boundary invalidates the analysis (routines are
    // band-filtered): clear it so the teacher re-analyses for the new band.
    if (bandOf(classInfo.yearLevel) !== bandOf(next.yearLevel)) {
      setAnalysis(null); setSelectedRoutine(""); setAnalyseError("");
    }
    setClassInfo(next);
    try { localStorage.setItem(CLASS_STORE, JSON.stringify(next)); } catch (_) {}
  };

  // generation
  const [loading, setLoading] = useState(false);
  const [genProgress, setGenProgress] = useState(0); // 0-100, eased estimate while generating
  const [regenSlide, setRegenSlide] = useState(null);   // which slide is regenerating: "ignite" | "think" | "launch" | "reflect"
  const [includeReflect, setIncludeReflect] = useState(true);  // teacher toggle: keep the REFLECT slide in the deck
  const [includeAdvisory, setIncludeAdvisory] = useState(true); // teacher toggle: keep the content-advisory slide when flagged

  // analyse step (runs before Generate): AI recommendation + the teacher's pick
  const [analysis, setAnalysis] = useState(null);       // { summary, routines: [{name,why}] } | null
  const [analysing, setAnalysing] = useState(false);
  const [analyseError, setAnalyseError] = useState("");
  const [selectedRoutine, setSelectedRoutine] = useState(""); // "" until the teacher picks a card
  const [reflectRoutine, setReflectRoutine] = useState("");   // "" = let the model vary the end-of-lesson reflection routine; else a pinned REFLECT_ROUTINES name

  const [fetchingArticle, setFetchingArticle] = useState(false);
  const [error, setError] = useState("");
  const [rawDump, setRawDump] = useState("");
  const [spots, setSpots] = useState({});            // { [band]: deckObject }
  const [exporting, setExporting] = useState(false); // PowerPoint download in flight (drives button disabled)
  const busyRef = useRef({ exporting: false }); // synchronous re-entrancy guard (beats same-tick double-clicks before React re-renders)

  // media reel
  const [extractCount, setExtractCount] = useState(0); // count of video extractions in flight (batch/overlap-safe)
  const extractingVideo = extractCount > 0; // spinner shows while any extraction runs
  const [mediaNote, setMediaNote] = useState(""); // soft inline status under the dropzone

  const mediaInput = useRef(null);
  const pdfInput = useRef(null);
  const genBtnRef = useRef(null);
  const genStimKey = useRef(""); // stimulus fingerprint at last successful generate (stale-deck hint)

  // Active band drives the (single) preview/edit/export view; before generation
  // it falls back to the band derived from the class settings panel.
  const band = activeBand || BAND_KEY_OF[bandOf(classInfo.yearLevel)];
  const year = classInfo.yearLevel || "";
  const theme = classInfo.outcome || classInfo.subject || "";
  // If the active deck is a combined one, its cover/label reads "Middle & Senior".
  const activeCombo = (spots[activeBand] && spots[activeBand].comboBands) || null;
  const bandLabel = activeCombo ? comboBandLabel(activeCombo) : bandLabelOf(band);

  // The preview/edit/export view is single-deck: `spot` is the active band's deck,
  // and `setSpot` (accepting a value OR a function updater, like the old useState
  // setter) writes back into the active band's slot of the spots map.
  const spot = activeBand ? (spots[activeBand] || null) : null;
  const setSpot = (upd) => setSpots(all => {
    if (!activeBand) return all;
    const cur = all[activeBand] || null;
    const next = typeof upd === "function" ? upd(cur) : upd;
    return { ...all, [activeBand]: next };
  });

  // Stale-deck hint: fingerprint the stimulus so we can nudge "Regenerate" if it changed
  // after the last successful generate.
  // class settings (curriculum/subject/year) drive the band + chip label, so fold them in:
  // a post-generate class edit now trips the same "regenerate" banner as a stimulus change.
  const stimKey = mode + "|" + media.length + "|" + (mode === "article" ? articleText.length : 0)
    + "|" + classInfo.curriculum + "|" + classInfo.subject + "|" + classInfo.yearLevel;
  const stimulusStale = Object.keys(spots).length > 0 && genStimKey.current && genStimKey.current !== stimKey;

  // Fire-and-forget analytics: logs event + context to the backend.
  // passcode/classInfo in scope; stimulusType derived from mode/media state by callers.
  function logEvent(event, extra = {}) {
    try {
      fetch(API_BASE + "/api/log", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-sb-passcode": passcode },
        body: JSON.stringify({
          event,
          curriculum: classInfo.curriculum, subject: classInfo.subject, yearLevel: classInfo.yearLevel,
          languageMode: "english",
          ...extra, // stimulusType, routine, topic
        }),
        keepalive: true,
      }).catch(() => {});
    } catch (_) {}
  }

  // Keep reelIndex in range whenever the reel shrinks.
  React.useEffect(() => { if (reelIndex > Math.max(0, media.length - 1)) setReelIndex(0); }, [media.length]);

  /* ------- file handlers ------- */
  const newId = () => (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());
  // Intrinsic aspect (w/h) of an image data URL, so the PPTX export can letterbox it
  // correctly (pptxgenjs `sizing:contain` stretches; we compute contain ourselves).
  const imageAspect = (dataUrl) => new Promise(res => {
    const im = new Image();
    im.onload = () => res(im.naturalWidth && im.naturalHeight ? im.naturalWidth / im.naturalHeight : 0);
    im.onerror = () => res(0);
    im.src = dataUrl;
  });

  async function addMediaFiles(fileList) {
    const files = Array.from(fileList || []);
    if (!files.length) return;
    setError(""); setMediaNote("");
    const room = MAX_MEDIA - media.length;
    if (room <= 0) { setMediaNote(`That's the limit of ${MAX_MEDIA} items — remove one to add more.`); return; }
    const take = files.slice(0, room);
    if (files.length > room) setMediaNote(`Only added ${room} — a reel holds up to ${MAX_MEDIA} items.`);

    for (const f of take) {
      if (f.type.startsWith("image/")) {
        try { const dataUrl = await readFileAsDataURL(f); const aspect = await imageAspect(dataUrl); setMedia(m => m.length >= MAX_MEDIA ? m : [...m, { id: newId(), kind: "image", dataUrl, name: f.name, aspect }]); }
        catch (_) { setError("Could not read image: " + f.name); }
      } else if (f.type.startsWith("video/")) {
        setExtractCount(c => c + 1);
        try {
          let dataUrl = "";
          if (f.size <= VIDEO_EMBED_MAX_BYTES) { try { dataUrl = await readFileAsDataURL(f); } catch (_) {} }
          const { frames, poster, width, height } = await extractVideoFrames(f, 4);
          const vidId = newId();
          setMedia(m => m.length >= MAX_MEDIA ? m : [...m, { id: vidId, kind: "video", dataUrl, name: f.name, sizeBytes: f.size,
            poster, aspect: width && height ? width / height : 0, frames, text: "", transcribeState: "running", transcribeNote: "" }]);
          if (!frames.length) setMediaNote("Couldn't read frames from " + f.name + " — add a description under its thumbnail. It will still embed in the PowerPoint.");
          else if (f.size > VIDEO_EMBED_MAX_BYTES) setMediaNote(`${f.name} is large (${formatBytes(f.size)}) — the deck will use its first frame (add a Link on the left for a clickable link + QR) instead of embedding.`);
          (async () => {
            try {
              const { text, truncated } = await transcribeMedia({ passcode: passcode.trim(), file: f });
              setMedia(m => m.map(x => x.id === vidId ? { ...x, text, transcribeState: "done", transcribeNote: truncated ? "(transcript truncated)" : "" } : x));
            } catch (_) {
              setMedia(m => m.map(x => x.id === vidId ? { ...x, transcribeState: "failed", transcribeNote: "couldn't get transcript — frames will be used" } : x));
            }
          })();
        } catch (_) { setError("Could not read video: " + f.name); }
        finally { setExtractCount(c => c - 1); }
      }
    }
  }

  function onMedia(e) { addMediaFiles(e.target.files); e.target.value = ""; }
  const removeMedia = (id) => setMedia(m => m.filter(x => x.id !== id));
  const setMediaText = (id, text) => setMedia(m => m.map(x => x.id === id ? { ...x, text } : x));
  function moveMedia(id, dir) {
    setMedia(m => {
      const i = m.findIndex(x => x.id === id); const j = i + dir;
      if (i < 0 || j < 0 || j >= m.length) return m;
      const out = m.slice(); const [it] = out.splice(i, 1); out.splice(j, 0, it); return out;
    });
  }

  const pdfSeqRef = React.useRef(0);
  async function onPdf(e) {
    const f = e.target.files?.[0]; e.target.value = ""; if (!f) return; // reset so re-picking the same file re-fires
    const seq = ++pdfSeqRef.current; // any later pick supersedes this one so a slow parse can't clobber a newer PDF
    setPdfName(f.name + " (extracting…)");
    try {
      const t = await extractPdfText(f);
      if (seq !== pdfSeqRef.current) return;
      setArticleText(t); setPdfName(f.name + ` (${t.length.toLocaleString()} chars)`);
    } catch (err) {
      if (seq !== pdfSeqRef.current) return;
      setError("Could not extract text from that PDF: " + err.message); setPdfName("");
    }
  }
  // Pull readable article text from a public link via the r.jina.ai reader
  // (it allows browser/CORS requests). Hard paywalls may still fail.
  async function fetchArticleFromLink(overrideUrl) {
    const url = (typeof overrideUrl === "string" ? overrideUrl : link).trim();
    setError("");
    if (!/^https?:\/\//i.test(url)) { setError("Enter a full article link starting with http(s):// first."); return { text: "", image: "" }; }
    setLink(url);
    setFetchingArticle(true);
    try {
      const resp = await fetch("https://r.jina.ai/" + url);
      if (!resp.ok) throw new Error("Reader service returned HTTP " + resp.status);
      const rawMd = await resp.text();
      const text = cleanArticleMarkdown(rawMd);
      if (text.length < 40) throw new Error("Got too little text back — the page may be paywalled or JS-only.");
      const image = extractLeadImage(rawMd); // the article's lead image (before stripping)
      setArticleText(text);
      setArticleImageUrl(image);
      return { text, image };
    } catch (err) {
      setError("Couldn't fetch that link (" + (err.message || err) + "). Paste the article text instead.");
      return { text: "", image: "" };
    } finally {
      setFetchingArticle(false);
    }
  }

  /* ------- validation ------- */
  function inputReady() {
    const hasStimulus = mode === "media" ? media.length > 0 : mode === "article" ? articleText.trim().length > 20 : false;
    return hasStimulus && !!classInfo.subject.trim() && !!classInfo.yearLevel.trim();
  }

  /* ------- analyse (recommend routines, before Generate) ------- */
  async function runAnalyse() {
    if (analysing) return;
    setAnalyseError("");
    if (!inputReady()) { setAnalyseError("Please add a stimulus first, and fill in the subject and year level."); return; }
    setAnalysing(true);
    try {
      const sourceText = mode === "article" ? articleText : "";
      const result = await analyseStimulus({ passcode: passcode.trim(), mode, media, sourceText, classInfo });
      setAnalysis(result);
      setSelectedRoutine("");
      // Log the successful analyse event.
      const hasVideo = media.some(m => m.kind === "video");
      const hasImage = media.some(m => m.kind === "image");
      let stimulusType = mode === "article" ? (pdfName ? "pdf" : "article") : (hasVideo && hasImage ? "mixed" : hasVideo ? "video" : hasImage ? "image" : "unknown");
      logEvent("analyse", { stimulusType });
    } catch (err) {
      setAnalyseError(err.message || String(err));
    } finally {
      setAnalysing(false);
    }
  }
  function pickRoutine(name) {
    setSelectedRoutine(name);
  }
  const analyseBandRoutines = useMemo(() => {
    const tag = bandOf(classInfo.yearLevel);
    return ROUTINES.filter(r => r.bands.includes(tag));
  }, [classInfo.yearLevel]);
  const routineGroups = useMemo(() => {
    const map = new Map();
    analyseBandRoutines.forEach(r => { if (!map.has(r.group)) map.set(r.group, []); map.get(r.group).push(r); });
    return [...map.entries()];
  }, [analyseBandRoutines]);
  const routineUrl = (name) => (ROUTINES.find(r => r.name === name) || {}).url || "https://pz.harvard.edu/thinking-routines";

  /* ------- generate ------- */
  async function generate() {
    if (regenSlide || loading) return; // a slide regen is in flight, or a generate is already running
    setError(""); setRawDump("");
    if (mode === "media" && !media.length) { setError("Add at least one image or video first."); return; }
    if (!inputReady()) { setError("Please add a stimulus first (images/video, or article text/PDF), and fill in the subject and year level."); return; }

    setLoading(true);
    // Estimated progress: ease toward ~92% while the single request is in flight,
    // then snap to 100% when it lands. (The call isn't streamed, so this is a
    // reassurance estimate, not a literal measurement.)
    setGenProgress(3);
    const progTick = setInterval(() => setGenProgress(p => (p < 92 ? p + (92 - p) * 0.06 : p)), 250);
    try {
      const sourceText = mode === "article" ? articleText : "";
      // Single-class-per-run: one generate() call produces one deck, pitched to the
      // band derived from classInfo.yearLevel (bandOf + BAND_KEY_OF above).
      const genBand = BAND_KEY_OF[bandOf(classInfo.yearLevel)];
      const { parsed, raw } = await generateSpringboard({
        passcode: passcode.trim(), mode, media, sourceText,
        classInfo, routineName: selectedRoutine, reflectRoutine, scope: "all",
      });
      const deck = shapeDeck(parsed, { routineName: selectedRoutine });
      setRawDump(raw);
      setSpots({ [genBand]: deck });
      setActiveBand(genBand);
      setIncludeReflect(true);              // fresh deck defaults to including REFLECT
      setIncludeAdvisory(true);             // and, if flagged, the advisory slide
      genStimKey.current = stimKey; // remember the stimulus fingerprint for the stale-deck hint
      setGenProgress(100);
      // Log the successful generate event.
      const hasVideo = media.some(m => m.kind === "video");
      const hasImage = media.some(m => m.kind === "image");
      let stimulusType = mode === "article" ? (pdfName ? "pdf" : "article") : (hasVideo && hasImage ? "mixed" : hasVideo ? "video" : hasImage ? "image" : "unknown");
      logEvent("generate", { stimulusType, routine: selectedRoutine, topic: deck.title });
    } catch (err) {
      setError(err.message || String(err));
      if (err._raw) setRawDump(err._raw);
    } finally {
      clearInterval(progTick);
      setLoading(false);
      setTimeout(() => setGenProgress(0), 500);
    }
  }

  /* ------- regenerate a single slide (targeted, keeps the other slides) ------- */
  async function regenerateSlide(scope, reflectRoutineArg) {
    if (!spot || regenSlide || loading) return;
    setError(""); setRawDump("");
    setRegenSlide(scope);
    try {
      const sourceText = mode === "article" ? articleText : "";
      // Reflect regen honours an explicitly-passed routine (the dropdown fires before
      // state settles); everything else uses the current pinned reflectRoutine.
      const rr = reflectRoutineArg !== undefined ? reflectRoutineArg : reflectRoutine;
      const { parsed } = await generateSpringboard({
        passcode: passcode.trim(), mode, media, sourceText,
        classInfo, routineName: spot.think.routine || selectedRoutine, reflectRoutine: rr,
        scope, current: spot,
      });
      setSpot(s => mergeScopedFields(s, scope, parsed));
      // Log the successful regenerate event.
      logEvent("regenerate", { routine: spot.think.routine, topic: spot.title });
    } catch (err) {
      setError(err.message || String(err));
      if (err._raw) setRawDump(err._raw);
    } finally {
      setRegenSlide(null);
    }
  }

  // Teacher chose an end-of-lesson reflection routine from the REFLECT dropdown: pin it,
  // then re-tailor just the reflect prompts to this lesson (one scoped AI call). "" = Auto.
  async function pickReflectRoutine(name) {
    setReflectRoutine(name);
    await regenerateSlide("reflect", name);
  }

  /* ------- editing helpers ------- */
  // patch: top-level fields (title, keywords). patchSlide: a nested slide object
  // (ignite/think/launch/reflect). patchNote: the teacher note for a slide. arr*: the
  // list fields (think.steps, reflect.prompts).
  const patch = (obj) => setSpot(s => ({ ...s, ...obj }));
  const patchSlide = (slide, obj) => setSpot(s => ({ ...s, [slide]: { ...s[slide], ...obj } }));
  const patchNote = (slide, text) => setSpot(s => ({ ...s, notes: { ...s.notes, [slide]: text } }));
  const patchArr = (slide, key, i, val) => setSpot(s => { const a = s[slide][key].slice(); a[i] = val; return { ...s, [slide]: { ...s[slide], [key]: a } }; });
  const addArr = (slide, key) => setSpot(s => ({ ...s, [slide]: { ...s[slide], [key]: [...s[slide][key], ""] } }));
  const delArr = (slide, key, i) => setSpot(s => ({ ...s, [slide]: { ...s[slide], [key]: s[slide][key].filter((_, j) => j !== i) } }));

  // Single Wesley-light palette for the preview accents (purple bar/number chips, gold tie).
  const T = { accent: WESLEY.purple, accent2: WESLEY.gold };
  const barStyle = { background: hx(T.accent) };
  // Inline render helper (called, not a <Component/>): keeps it out of the render as a fresh
  // component TYPE each pass, which would remount all four "New options" buttons on every keystroke
  // and drop keyboard focus. Called as {regenButton("ignite")}.
  const regenButton = (scope) => (
    <button type="button" className="regen" title="Generate a different version of this slide"
      disabled={!!regenSlide || loading}
      aria-busy={regenSlide === scope} aria-label="Regenerate this slide for different options"
      onClick={() => regenerateSlide(scope)}>
      {regenSlide === scope
        ? <React.Fragment><span className="spinner sm dark"></span> Regenerating…</React.Fragment>
        : <React.Fragment><Icon d={I.refresh} size={13} stroke /> New options</React.Fragment>}
    </button>
  );

  /* ------- export: one Wesley-light 4-slide deck (IGNITE / THINK / LAUNCH / REFLECT) ------- */
  // Reads the active deck plus classInfo / media / link / includeReflect / includeAdvisory from
  // the App closure. IGNITE is full-brand (purple, gold crest, big title, stimulus, gold question);
  // THINK / LAUNCH / REFLECT are white with a thin purple top rule + a small gold crest. A content-
  // advisory slide leads the deck only when the model flagged it AND the teacher kept it. Every
  // slide's teacher note goes in its Notes pane via addNotes.
  // TRAP: pptxgenjs mutates option objects handed to it (shadow especially) — so EVERY addText/
  // addImage/addShape/addMedia call below gets a FRESH object literal; nothing is shared/reused.
  async function buildDeckBlob(bandKey, deck) {
    if (!deck) return null;
    try {
      const P = WESLEY.purple, GOLD = WESLEY.gold, GOLD_INK = WESLEY.goldInk, GOLD_LT = WESLEY.goldLight,
            INK = WESLEY.ink, MUTED = WESLEY.muted, WHITE = WESLEY.white, SUB = WESLEY.subtle, AMBER = WESLEY.amber;
      const FONT = "Arial"; // Graphik can't be embedded in a portable .pptx — Arial is the fork's safe fallback
      const W = 13.33, H = 7.5;

      // Normalise deck fields (re-clamp keywords/steps/prompts to their caps + drop blanks at export).
      const title = (deck.title || "").trim() || "Springboard";
      const routine = ((deck.think && deck.think.routine) || "").trim();
      const structure = ((deck.think && deck.think.structure) || "").trim();
      const kw = (Array.isArray(deck.keywords) ? deck.keywords : []).map(s => String(s).trim()).filter(Boolean).slice(0, 6);
      const steps = (Array.isArray(deck.think && deck.think.steps) ? deck.think.steps : []).map(s => String(s).trim()).filter(Boolean).slice(0, 4);
      const prompts = (Array.isArray(deck.reflect && deck.reflect.prompts) ? deck.reflect.prompts : []).map(s => String(s).trim()).filter(Boolean).slice(0, 4);
      const igniteQ = ((deck.ignite && deck.ignite.question) || "").trim();
      const curriculum = (classInfo.curriculum || "").trim();
      const subject = (classInfo.subject || "").trim();
      const yearLevel = (classInfo.yearLevel || "").trim();
      const metaLine = [bandLabelOf(bandKey) + (yearLevel ? " · Year " + yearLevel : ""), subject].filter(Boolean).join("   ·   ");

      const showAdvisory = !!(deck.advisory && deck.advisory.flag) && includeAdvisory;
      const showReflect = !!includeReflect;
      const total = 3 + (showAdvisory ? 1 : 0) + (showReflect ? 1 : 0);

      await loadScript(PPTX_SRC, PPTX_SRI);
      const pptx = new PptxGenJS();
      pptx.defineLayout({ name: "WIDE", width: W, height: H });
      pptx.layout = "WIDE";

      let sNum = 0; // 1-based slide counter, drives the "n / total" footer

      // --- drawing helpers: each only ever builds fresh object literals (no shared options) ---
      const goldCrest = (s, lw) => { const w = lw || 1.5, h = w / 1.743; s.addImage({ data: WESLEY_LOGO_GOLD, x: W - 0.55 - w, y: 0.4, w, h }); };
      const wordmark = (s) => { const w = 1.7, h = w / 4.991; s.addImage({ data: WESLEY_LOGO_HORIZ, x: 0.55, y: H - 0.52, w, h }); };
      const pageNo = (s, onDark) => s.addText(sNum + " / " + total, { x: W - 1.5, y: H - 0.5, w: 0.95, h: 0.3, fontSize: 9, color: onDark ? SUB : MUTED, align: "right", fontFace: FONT });
      const kicker = (s, txt, color) => s.addText(String(txt || "").toUpperCase(), { x: 0.7, y: 0.62, w: W - 2.3, h: 0.4, fontSize: 13, bold: true, color: color || P, charSpacing: 2, fontFace: FONT });
      const cap = (s, txt, y) => s.addText(String(txt || "").toUpperCase(), { x: 0.7, y, w: W - 1.4, h: 0.3, fontSize: 11, bold: true, color: GOLD_INK, charSpacing: 1.5, fontFace: FONT });
      // Title-case a string (used to tame ALL-CAPS/lowercase model titles for the cover).
      const tCase = (t) => String(t || "").replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
      const eyebrow = (s, txt, x, y, color) => s.addText(String(txt || "").toUpperCase(),
        { x, y, w: W - 2 * x, h: 0.3, fontSize: 11, bold: true, color: color || GOLD_LT, charSpacing: 3, fontFace: FONT });
      // Letterbox a media box's contents within [bx,by,bw,bh] at the media's own aspect ratio.
      const contain = (bx, by, bw, bh, ar) => {
        ar = (ar && isFinite(ar) && ar > 0) ? ar : bw / bh;
        let iw = bw, ih = iw / ar; if (ih > bh) { ih = bh; iw = ih * ar; }
        iw = +iw.toFixed(2); ih = +ih.toFixed(2);
        return { x: +(bx + (bw - iw) / 2).toFixed(2), y: +(by + (bh - ih) / 2).toFixed(2), w: iw, h: ih };
      };

      // White-slide chrome (THINK / LAUNCH / REFLECT / advisory): purple top rule, small crest,
      // wordmark + page number. Returns the new slide.
      const newWhite = () => {
        sNum++;
        const s = pptx.addSlide();
        s.background = { color: WHITE };
        s.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: W, h: 0.12, fill: { color: P } });
        goldCrest(s, 0.95);
        wordmark(s);
        pageNo(s, false);
        return s;
      };

      // Notes-pane text: a one-line header + the teacher note; keywords appended on IGNITE (search).
      const NOTE_HEAD = {
        ignite: "IGNITE — run this in the first minute.",
        think: "THINK — the thinking routine.",
        launch: "LAUNCH — bridge into today's lesson.",
        reflect: "REFLECT — revisit at the end of the lesson.",
      };
      const noteFor = (key) => {
        const body = ((deck.notes && deck.notes[key]) || "").trim();
        let out = NOTE_HEAD[key] + (body ? "\n\n" + body : "");
        if (key === "ignite" && kw.length) out += "\n\nKeywords: " + kw.join(", ");
        // Curriculum connection is teacher-only — it rides in the LAUNCH speaker notes, never the projected slide.
        if (key === "launch") { const conn = ((deck.launch && deck.launch.connection) || "").trim(); if (conn) out += "\n\nCurriculum connection: " + conn; }
        return out;
      };

      // IGNITE stimulus — reuses the fork's image / video-embed / QR+link media paths. Draws into
      // [x,y,w,h] on the purple slide; returns true if anything visual was drawn (so a text-only
      // deck can hand the whole stage to the question instead).
      // opts.posterOnly: draw a video's poster image instead of embedding it (for a second,
      // lighter appearance on THINK). opts.noLink: skip the QR + link row (use the full box).
      async function drawStimulus(s, x, y, w, h, opts = {}) {
        const items = (mode === "media" && Array.isArray(media)) ? media.filter(m => m && (m.dataUrl || m.poster)) : [];
        const url = (link || "").trim();
        let drew = false;
        const mediaH = (url && !opts.noLink) ? h - 0.7 : h; // reserve a QR + link row when there's a link

        if (items.length === 1) {
          const it = items[0];
          const box = contain(x, y, w, Math.max(0.5, mediaH), it.aspect || (it.kind === "video" ? 16 / 9 : w / mediaH));
          if (it.kind === "image") { s.addImage({ data: it.dataUrl, x: box.x, y: box.y, w: box.w, h: box.h }); drew = true; }
          else { // video: embed small clips (play in desktop PowerPoint); otherwise its poster frame
            const embed = !opts.posterOnly && !!it.dataUrl && it.sizeBytes <= VIDEO_EMBED_MAX_BYTES;
            if (embed) { s.addMedia({ type: "video", data: it.dataUrl, cover: it.poster || undefined, x: box.x, y: box.y, w: box.w, h: box.h }); drew = true; }
            else if (it.poster) { s.addImage({ data: it.poster, x: box.x, y: box.y, w: box.w, h: box.h }); drew = true; }
          }
        } else if (items.length > 1) {
          // Multiple stimuli → a static 2-column grid of up to 4 (videos shown by poster). The one
          // IGNITE slide can't be a click-through reel in the 4-slide model, so this is the simplest
          // faithful treatment; the notes tell the teacher the originals are attached in order.
          const show = items.slice(0, 4);
          const cols = 2, rows = Math.ceil(show.length / cols), gap = 0.18;
          const cw = (w - gap) / cols, ch = (Math.max(0.5, mediaH) - gap * (rows - 1)) / rows;
          show.forEach((it, i) => {
            const src = it.kind === "image" ? it.dataUrl : it.poster;
            if (!src) return;
            const cx = x + (i % cols) * (cw + gap), cy = y + Math.floor(i / cols) * (ch + gap);
            const box = contain(cx, cy, cw, ch, it.aspect || (4 / 3));
            s.addImage({ data: src, x: box.x, y: box.y, w: box.w, h: box.h });
            drew = true;
          });
        } else if (mode === "article" && articleImageUrl) {
          const img = await urlToDataUrl(articleImageUrl);
          if (img) { const box = contain(x, y, w, Math.max(0.5, mediaH), 16 / 9); s.addImage({ data: img, x: box.x, y: box.y, w: box.w, h: box.h }); drew = true; }
        }

        if (url) {
          const qr = makeQrDataUrl(url);
          const rowY = y + h - 0.55;
          if (qr) s.addImage({ data: qr, x, y: rowY, w: 0.5, h: 0.5 });
          s.addText(
            [{ text: (MODE_VERB[mode] || "Open") + ":  ", options: { bold: true, color: WHITE } },
             { text: url, options: { color: GOLD_LT, underline: true, hyperlink: { url } } }],
            { x: x + (qr ? 0.65 : 0), y: rowY, w: w - (qr ? 0.65 : 0), h: 0.5, fontSize: 11, valign: "middle", fontFace: FONT });
          drew = true;
        }
        return drew;
      }

      // ---------------- ADVISORY (optional, leads the deck) ----------------
      if (showAdvisory) {
        const s = newWhite();
        const reason = ((deck.advisory && deck.advisory.reason) || "").trim() || "This stimulus touches on a sensitive theme.";
        s.addShape(pptx.ShapeType.roundRect, { x: 0.7, y: 1.05, w: 3.9, h: 0.6, fill: { color: AMBER }, rectRadius: 0.1 });
        s.addText("CONTENT ADVISORY", { x: 0.7, y: 1.05, w: 3.9, h: 0.6, fontSize: 15, bold: true, color: INK, align: "center", valign: "middle", charSpacing: 1, fontFace: FONT });
        s.addText(reason, { x: 0.7, y: 2.05, w: W - 1.4, h: 1.9, fontSize: 22, bold: true, color: P, valign: "top", lineSpacingMultiple: 1.15, fontFace: FONT, fit: "shrink" });
        s.addText("If you'd rather step out for this one, just quietly let your teacher know. That's completely okay.",
          { x: 0.7, y: 4.7, w: W - 1.4, h: 1.0, fontSize: 15, italic: true, color: INK, valign: "top", lineSpacingMultiple: 1.2, fontFace: FONT });
        s.addNotes("CONTENT ADVISORY — decide before class whether to show this. " + reason);
      }

      // ---------------- IGNITE (full-brand purple cover) ----------------
      {
        sNum++;
        const s = pptx.addSlide();
        s.background = { color: P };
        goldCrest(s, 1.3);
        eyebrow(s, "IGNITE", 0.7, 0.55, GOLD_LT);

        // Give the stimulus a LARGE right-hand panel (like Digital Spotlight's stimulus slide)
        // so a portrait phone image is clearly visible, not a sliver. imgX..imgX+imgW clears the
        // crest (which sits above, ending ~y1.15).
        const imgX = 7.0, imgY = 1.5, imgW = 5.6, imgH = 5.3;
        const drew = await drawStimulus(s, imgX, imgY, imgW, imgH);

        if (drew) {
          // Two columns: title · meta · question on the left, big image on the right.
          const colW = imgX - 0.7 - 0.4; // left column up to a 0.4" gutter before the image
          s.addText(tCase(title), { x: 0.7, y: 1.0, w: colW, h: 2.3, fontSize: 34, bold: true, color: WHITE, valign: "top", fontFace: FONT, charSpacing: -0.4, fit: "shrink" });
          if (metaLine) s.addText(metaLine, { x: 0.7, y: 3.45, w: colW, h: 0.6, fontSize: 12.5, color: SUB, charSpacing: 0.5, fontFace: FONT });
          s.addShape(pptx.ShapeType.rect, { x: 0.7, y: 4.35, w: 2.2, h: 0.05, fill: { color: GOLD } });
          s.addText(igniteQ, { x: 0.7, y: 4.55, w: colW, h: 2.4, fontSize: 22, bold: true, color: GOLD, valign: "top", fontFace: FONT, fit: "shrink" });
        } else {
          // No stimulus: title up top, the provocative question owns the whole stage.
          s.addText(tCase(title), { x: 0.7, y: 1.0, w: W - 2.5, h: 1.4, fontSize: 44, bold: true, color: WHITE, valign: "top", fontFace: FONT, charSpacing: -0.5, fit: "shrink" });
          if (metaLine) s.addText(metaLine, { x: 0.7, y: 2.5, w: W - 1.4, h: 0.4, fontSize: 12.5, color: SUB, charSpacing: 0.5, fontFace: FONT });
          s.addShape(pptx.ShapeType.rect, { x: 0.7, y: 3.35, w: 2.4, h: 0.05, fill: { color: GOLD } });
          s.addText(igniteQ, { x: 0.7, y: 3.55, w: W - 1.4, h: 2.6, fontSize: 40, bold: true, color: GOLD, valign: "middle", fontFace: FONT, fit: "shrink" });
        }
        pageNo(s, true);
        s.addNotes(noteFor("ignite"));
      }

      // ---------------- THINK ----------------
      {
        const s = newWhite();
        kicker(s, "THINK");
        // Keep an IMAGE/video provocation visible while students run the routine: show it again as
        // a right-hand panel and narrow the routine column. For an article (no image) the routine
        // spreads to fill the whole slide instead of leaving empty space — no panel.
        const hasImageStim = mode === "media" && Array.isArray(media) && media.some(m => m && (m.dataUrl || m.poster));
        const tImgX = 7.4, tColRight = tImgX - 0.4;
        const colW = hasImageStim ? (tColRight - 0.7) : (W - 1.4);
        const stepW = hasImageStim ? (tColRight - 1.32) : (W - 2.1);
        s.addText(routine || "Thinking routine", { x: 0.7, y: 1.05, w: colW, h: 0.75, fontSize: 32, bold: true, color: P, valign: "top", fontFace: FONT, fit: "shrink" });
        if (structure) s.addText([{ text: "How to run it:  ", options: { bold: true, color: INK } }, { text: structure, options: { color: INK } }],
          { x: 0.7, y: 1.9, w: colW, h: 0.5, fontSize: 14, valign: "top", fontFace: FONT });
        if (hasImageStim) await drawStimulus(s, tImgX, 1.05, W - 0.6 - tImgX, 5.1, { posterOnly: true, noLink: true });
        let sy = hasImageStim ? 2.65 : 2.55;
        const gap = hasImageStim ? 0.14 : 0.2;
        const bottomLimit = hasImageStim ? 6.35 : 6.45;
        const rowH = steps.length ? Math.max(0.5, (bottomLimit - sy - gap * (steps.length - 1)) / steps.length) : 0;
        const stepFont = hasImageStim ? 16 : 20;
        steps.forEach((st, i) => {
          const cy = sy + Math.max(0, (rowH - 0.44) / 2); // vertically centre the number in its row
          s.addShape(pptx.ShapeType.ellipse, { x: 0.7, y: cy, w: 0.44, h: 0.44, fill: { color: P } });
          s.addText(String(i + 1), { x: 0.7, y: cy, w: 0.44, h: 0.44, fontSize: 15, bold: true, color: WHITE, align: "center", valign: "middle", fontFace: FONT });
          s.addText(st, { x: 1.32, y: sy, w: stepW, h: rowH, fontSize: stepFont, color: INK, valign: "middle", fontFace: FONT });
          sy += rowH + gap;
        });
        s.addText(ROUTINE_SOURCE, { x: 0.7, y: H - 0.92, w: W - 2.6, h: 0.3, fontSize: 9, italic: true, color: MUTED, fontFace: FONT });
        s.addNotes(noteFor("think"));
      }

      // ---------------- LAUNCH ----------------
      {
        const s = newWhite();
        kicker(s, "LAUNCH");
        s.addText("Into today's lesson", { x: 0.7, y: 1.05, w: W - 1.4, h: 0.55, fontSize: 26, bold: true, color: P, valign: "top", fontFace: FONT });
        // Curriculum connection dropped from the projected slide (teacher-only, now in the notes); bridge + question reflow up.
        cap(s, "From the stimulus", 1.9);
        s.addText((deck.launch && deck.launch.bridge) || "", { x: 0.7, y: 2.2, w: W - 1.4, h: 0.9, fontSize: 14, color: INK, valign: "top", lineSpacingMultiple: 1.1, fontFace: FONT });
        s.addShape(pptx.ShapeType.rect, { x: 0.7, y: 3.6, w: 2.1, h: 0.045, fill: { color: GOLD } });
        s.addText((deck.launch && deck.launch.question) || "", { x: 0.7, y: 3.8, w: W - 1.4, h: 1.8, fontSize: 28, bold: true, color: P, valign: "top", fontFace: FONT, fit: "shrink" });
        s.addNotes(noteFor("launch"));
      }

      // ---------------- REFLECT (optional) ----------------
      if (showReflect) {
        const s = newWhite();
        kicker(s, "REFLECT");
        s.addText("Revisit your thinking", { x: 0.7, y: 1.05, w: W - 1.4, h: 0.55, fontSize: 26, bold: true, color: P, valign: "top", fontFace: FONT });
        const revisit = (deck.reflect && deck.reflect.revisit) || "";
        if (revisit) s.addText(revisit, { x: 0.7, y: 1.75, w: W - 1.4, h: 0.95, fontSize: 18, color: INK, valign: "top", lineSpacingMultiple: 1.15, fontFace: FONT });
        let ry = 2.95;
        const rowH = prompts.length ? Math.min(1.0, (6.35 - ry) / prompts.length) : 0;
        prompts.forEach((pr, i) => {
          s.addShape(pptx.ShapeType.ellipse, { x: 0.7, y: ry, w: 0.42, h: 0.42, fill: { color: GOLD } });
          s.addText(String(i + 1), { x: 0.7, y: ry, w: 0.42, h: 0.42, fontSize: 15, bold: true, color: INK, align: "center", valign: "middle", fontFace: FONT });
          s.addText(pr, { x: 1.3, y: ry - 0.04, w: W - 2.1, h: rowH, fontSize: 19, color: INK, valign: "top", fontFace: FONT });
          ry += rowH + 0.18;
        });
        s.addNotes(noteFor("reflect"));
      }

      // Core + custom document properties (surface in File ▸ Info and search).
      pptx.title = title;
      pptx.subject = [curriculum, subject].filter(Boolean).join(" ") + (yearLevel ? " Y" + yearLevel : "");
      pptx.company = "Wesley College";
      pptx.author = "Springboard";
      const tags = [...kw, routine, curriculum].filter(Boolean);
      const blob = await pptx.write({ outputType: "blob" });
      return await stampDocProps(blob, { Title: title, Subject: pptx.subject, Company: "Wesley College" }, tags);
    } catch (err) {
      setError("PowerPoint export failed: " + (err.message || String(err)));
      return null;
    }
  }

  // Filename: "Springboard – <title> – <subject> Y<year>.pptx" (illegal chars stripped).
  function deckFileName(deck) {
    const subject = (classInfo.subject || "").trim();
    const yearLevel = (classInfo.yearLevel || "").trim();
    const subjPart = [subject, yearLevel ? "Y" + yearLevel : ""].filter(Boolean).join(" ");
    const parts = ["Springboard", (deck.title || "").trim(), subjPart].map(s => s.trim()).filter(Boolean);
    return sanitizeFilename(parts.join(" – ")) + ".pptx";
  }

  // Build the active deck and download it as a .pptx.
  async function buildAndSaveDeck(bandKey, deck) {
    const finalBlob = await buildDeckBlob(bandKey, deck);
    if (!finalBlob) return;
    const a = document.createElement("a");
    a.href = URL.createObjectURL(finalBlob);
    a.download = deckFileName(deck);
    document.body.appendChild(a); a.click(); a.remove();
    // Log the successful download event.
    logEvent("download", { routine: deck.think.routine, topic: deck.title });
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  }

  // Export the generated deck(s). One class per run means this is normally a single file.
  async function download() {
    if (busyRef.current.exporting) return;
    busyRef.current.exporting = true;
    setExporting(true);
    try {
      const keys = BAND_ORDER.filter(b => spots[b]);
      for (const b of keys) {
        await buildAndSaveDeck(b, spots[b]);
        await new Promise(r => setTimeout(r, 400));
      }
    } finally { busyRef.current.exporting = false; setExporting(false); }
  }

  /* ------------------------------ render ------------------------------ */
  const routineUrlFor = spot ? routineUrl(spot.think.routine) : "";

  return (
    <React.Fragment>
      <header className="app">
        <div className="logo"><Icon d={I.shield} size={22} /></div>
        <div>
          <h1>Springboard</h1>
          <p>Launch student thinking — stimulus to slides in two minutes.</p>
        </div>
        <a className="admin-link" href="about.html" target="_blank" rel="noopener" title="How Springboard works — its purpose and the teaching design behind it">How it works</a>
        <button type="button" className="admin-icon" onClick={() => setAdminOpen(true)} aria-label="Admin analytics" title="Admin analytics — password protected"><Icon d={I.chart} size={16} stroke /></button>
        <span className="appver" title="App version — check this matches after a refresh">{APP_VERSION}</span>
      </header>

      {adminOpen && <AdminGate onClose={() => setAdminOpen(false)} />}

      <main className="layout">
        {/* ----------------- INPUT PANEL ----------------- */}
        <div className="panel input">
          <div className="group">
            <label className="cap" id="lbl-mode">Stimulus mode</label>
            <div className="modes" role="group" aria-labelledby="lbl-mode">
              {["media", "article"].map(m => (
                <button key={m} type="button" className={mode === m ? "active" : ""} aria-pressed={mode === m} onClick={() => setMode(m)}>
                  <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                    <Icon d={m === "media" ? I.image : I.doc} size={16} stroke />
                    {m === "media" ? "Images / video" : "Article"}
                  </span>
                </button>
              ))}
            </div>
          </div>

          {mode === "media" && (
            <div className="group">
              <label className="cap" htmlFor="f-media">Images &amp; video <span style={{ color: "var(--muted)", fontWeight: 600 }}>(swipeable reel)</span></label>
              <button type="button" className="filebox"
                aria-label="Add images or videos to the reel"
                onClick={() => mediaInput.current.click()}
                onDragOver={e => { e.preventDefault(); }}
                onDrop={e => { e.preventDefault(); addMediaFiles(e.dataTransfer.files); }}>
                {extractingVideo
                  ? <React.Fragment><div className="big"><span className="spinner" style={{ borderTopColor: "var(--accent)", borderColor: "var(--accent-soft)" }}></span></div><div className="small">Reading video…</div></React.Fragment>
                  : <React.Fragment><div className="big"><Icon d={I.image} size={26} stroke /></div><div className="small">Click, or drop images / videos here ({media.length}/{MAX_MEDIA})</div></React.Fragment>}
              </button>
              <input ref={mediaInput} id="f-media" type="file" accept="image/*,video/*" multiple hidden onChange={onMedia} />
              {mediaNote && <div className="alert info" role="status" aria-live="polite" style={{ marginTop: 8 }}>{mediaNote}</div>}

              {media.length > 0 && (
                <div className="media-strip">
                  {media.map((it, i) => (
                    <div className="media-thumb" key={it.id}>
                      <img src={it.kind === "image" ? it.dataUrl : it.poster} alt={it.name} />
                      {it.kind === "video" && <span className="vtag"><Icon d={I.play} size={14} /></span>}
                      <div className="media-thumb-tools">
                        <button type="button" className="iconbtn" aria-label={"Move " + it.name + " earlier"} disabled={i === 0} onClick={() => moveMedia(it.id, -1)}>‹</button>
                        <span className="ord">{i + 1}</span>
                        <button type="button" className="iconbtn" aria-label={"Move " + it.name + " later"} disabled={i === media.length - 1} onClick={() => moveMedia(it.id, +1)}>›</button>
                        <button type="button" className="iconbtn" aria-label={"Remove " + it.name} onClick={() => removeMedia(it.id)}><Icon d={I.close} size={13} stroke /></button>
                      </div>
                      {it.kind === "video" && (
                        <textarea className="media-text" rows={2} value={it.text}
                          placeholder="Transcript / what's in this clip (optional)"
                          onChange={e => setMediaText(it.id, e.target.value)} />
                      )}
                      {it.kind === "video" && (
                        <div className="hint" aria-live="polite">
                          {it.transcribeState === "running" && <React.Fragment><span className="spinner sm dark"></span> transcribing…</React.Fragment>}
                          {it.transcribeState === "done" && `transcript ready (${(it.text ? it.text.trim().split(/\s+/).length : 0)} words) ${it.transcribeNote}`}
                          {it.transcribeState === "failed" && it.transcribeNote}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}

              <div className="group" style={{ marginTop: 10 }}>
                <label className="cap" htmlFor="f-mlink">Link (optional — becomes a QR code)</label>
                <input id="f-mlink" type="text" value={link} placeholder="https://…" onChange={e => setLink(e.target.value)} />
              </div>
              <div className="hint">Add one or many — they appear as a swipeable carousel with the routine on the right, and export as a click-through slideshow. Videos: still frames are read so the model can "see" them; small clips embed and play in <b>desktop</b> PowerPoint.</div>
            </div>
          )}

          {mode === "article" && (
            <div className="group">
              <label className="cap" htmlFor="f-pdf">Article — upload PDF or paste text</label>
              <button type="button" className="filebox" aria-label={pdfName ? `Replace PDF ${pdfName}` : "Upload a PDF"} onClick={() => pdfInput.current.click()}>
                <div className="big"><Icon d={I.doc} size={26} stroke /></div>
                <div className="small">{pdfName || "Click or press Enter to upload a PDF"}</div>
              </button>
              <input ref={pdfInput} id="f-pdf" type="file" accept="application/pdf" hidden onChange={onPdf} />

              <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                <input type="text" aria-label="Article link" value={link} placeholder="…or paste an article link (https://…)" onChange={e => setLink(e.target.value)} />
                <button type="button" className="btn ghost" style={{ width: "auto", padding: "9px 12px", whiteSpace: "nowrap" }} disabled={fetchingArticle} onClick={fetchArticleFromLink}>
                  {fetchingArticle ? "Fetching…" : "Fetch text"}
                </button>
              </div>

              <textarea style={{ marginTop: 8 }} aria-label="Article text" value={articleText} placeholder="…the fetched or pasted article text appears here (edit freely)" onChange={e => setArticleText(e.target.value)} />
              <div className="hint"><b>Fetch text</b> pulls the article via a public reader service — works for open news sites (the link also becomes the QR code). Hard paywalls may fail; upload the PDF or paste the text instead.</div>
            </div>
          )}

          <div className="group">
            <label className="cap" htmlFor="f-title">Title (optional)</label>
            <input id="f-title" type="text" value={title} placeholder="Leave blank to auto-generate" onChange={e => setTitle(e.target.value)} />
          </div>

          <div className="group">
            <label className="cap">Class settings</label>
            <div className="field-row">
              <label htmlFor="f-curr">Curriculum</label>
              <select id="f-curr" value={classInfo.curriculum}
                      onChange={e => saveClassInfo({ ...classInfo, curriculum: e.target.value })}>
                {CURRICULA.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div className="field-row">
              <label htmlFor="f-subj">Subject</label>
              {isVceSenior(classInfo)
                ? <select id="f-subj" value={classInfo.subject}
                          onChange={e => saveClassInfo({ ...classInfo, subject: e.target.value })}>
                    <option value="">Choose your VCE study…</option>
                    {VCE_AREAS.map(area => (
                      <optgroup label={area} key={area}>
                        {VCE_SUBJECTS.filter(s => s.area === area).map(s => (
                          <option key={s.key} value={s.name}>{s.name}</option>
                        ))}
                      </optgroup>
                    ))}
                  </select>
                : <input id="f-subj" type="text" placeholder="e.g. Science, English, Humanities"
                         value={classInfo.subject} onChange={e => saveClassInfo({ ...classInfo, subject: e.target.value })} />}
            </div>
            <div className="field-row">
              <label htmlFor="f-year">Year level</label>
              <input id="f-year" type="text" placeholder="e.g. Prep, 4, 8, 11"
                     value={classInfo.yearLevel} onChange={e => saveClassInfo({ ...classInfo, yearLevel: e.target.value })} />
            </div>
            <div className="field-row">
              <label htmlFor="f-outcome">Outcome or topic (optional — paste from your planner)</label>
              <textarea id="f-outcome" rows={2}
                        placeholder="e.g. 'Students analyse how text structures shape meaning' or 'Unit: Body systems'"
                        value={classInfo.outcome} onChange={e => saveClassInfo({ ...classInfo, outcome: e.target.value })} />
            </div>
          </div>

          {/* ----------------- ANALYSE STEP ----------------- */}
          <div className="group">
            <label className="cap">Analyse stimulus</label>
            <button type="button" className="btn ghost" disabled={!inputReady() || analysing} aria-busy={analysing} onClick={runAnalyse}>
              {analysing
                ? <React.Fragment><span className="spinner sm dark"></span> Analysing…</React.Fragment>
                : <React.Fragment><Icon d={I.generate} size={16} stroke /> Analyse stimulus</React.Fragment>}
            </button>
            <div className="hint">Reads your stimulus and suggests a thinking routine before you generate.</div>

            {analyseError && <div className="alert bad" role="alert">{analyseError}</div>}

            {analysis && (
              <React.Fragment>
                <p className="hint" style={{ marginTop: 10 }}>{analysis.summary}</p>

                <div className="routine-cards">
                  {analysis.routines.map(r => (
                    <div className={"routine-card" + (selectedRoutine === r.name ? " on" : "")} key={r.name}>
                      <label className="routine-card-pick">
                        <input type="radio" name="routineCard" value={r.name}
                          checked={selectedRoutine === r.name} onChange={() => pickRoutine(r.name)} />
                        <span className="routine-card-name">{r.name}</span>
                      </label>
                      <p className="routine-card-why">{r.why}</p>
                      <a className="routine-card-link" href={routineUrl(r.name)} target="_blank" rel="noopener">View routine ↗</a>
                    </div>
                  ))}
                </div>

                <details className="routine-browse">
                  <summary>Browse all routines</summary>
                  {routineGroups.map(([group, list]) => (
                    <div className="routine-browse-group" key={group}>
                      <div className="routine-browse-heading">{group}</div>
                      {list.map(r => (
                        <label className="routine-browse-item" key={r.name}>
                          <input type="radio" name="routineCard" value={r.name}
                            checked={selectedRoutine === r.name} onChange={() => pickRoutine(r.name)} />
                          <span>{r.name}</span>
                        </label>
                      ))}
                    </div>
                  ))}
                </details>
              </React.Fragment>
            )}
          </div>

          <button className="btn primary" ref={genBtnRef} disabled={loading || !!regenSlide || !selectedRoutine} aria-busy={loading} onClick={generate}>
            {loading ? <React.Fragment><ProgressRing value={genProgress} /> Generating… {Math.round(genProgress)}%</React.Fragment>
              : spot ? <React.Fragment><Icon d={I.refresh} size={16} stroke /> Regenerate</React.Fragment>
              : <React.Fragment><Icon d={I.generate} size={16} /> Generate Springboard</React.Fragment>}
          </button>
          {!selectedRoutine && <div className="hint">Analyse the stimulus and pick a thinking routine to enable Generate.</div>}

          {/* Screen-reader-only live status: announces the generation lifecycle (the
              visible cue is the button text/spinner; errors are announced via role=alert). */}
          <div className="sr-only" role="status" aria-live="polite">
            {loading ? "Generating your Springboard, this may take a moment."
              : regenSlide ? "Regenerating that section, please wait."
              : (spot && !error) ? "Your Springboard is ready below."
              : ""}
          </div>

          {error && <div className="alert bad" role="alert"><b>Something went wrong.</b><pre>{error}</pre>{rawDump && <React.Fragment><b>Raw model output:</b><pre>{rawDump}</pre></React.Fragment>}</div>}
        </div>

        {/* ----------------- PREVIEW PANEL ----------------- */}
        <div>
          {!spot && !loading && (
            <div className="panel"><div className="empty">
              <div className="big" aria-hidden="true"><Icon d={I.generate} size={46} /></div>
              <h2 style={{ margin: "0 0 6px", fontFamily: "var(--font-display)" }}>Your Springboard preview appears here</h2>
              <p>Add a stimulus on the left and hit <b>Generate</b>. Every field below will be editable before you download.</p>
            </div></div>
          )}

          {spot && (
            <React.Fragment>
              {Object.keys(spots).length > 1 && (
                <div className="band-tabs" role="group" aria-label="Band decks">
                  {BAND_ORDER.filter(b => spots[b]).map(b => (
                    <button key={b} type="button" aria-pressed={activeBand === b}
                      className={"band-tab" + (activeBand === b ? " on" : "")}
                      onClick={() => setActiveBand(b)}>
                      <span className={"band-dot band-" + b.toLowerCase()}></span>{bandLabelOf(b)}
                    </button>
                  ))}
                </div>
              )}
              {stimulusStale && <div className="alert info" role="status">You changed the stimulus. Hit <b>Regenerate</b> so the slides match.</div>}
              <div className="toolbar">
                <button type="button" className="btn ghost" disabled={loading || !!regenSlide || !selectedRoutine} onClick={generate}><Icon d={I.refresh} size={16} stroke /> Regenerate</button>
                <button type="button" className="btn primary" disabled={exporting} onClick={download}><Icon d={I.download} size={16} stroke /> {exporting ? "Preparing…" : "Download PowerPoint"}</button>
              </div>

              <div className="slides">
                {/* Springboard title — search keywords are generated automatically into the file's tags/notes; no teacher-facing field */}
                <div className="slide"><div className="bar" style={barStyle}></div><div className="body">
                  <div className="slide-head"><div className="slide-tag"><span className="n">★</span> <h2 style={{ font: "inherit", margin: 0, display: "inline" }}>Springboard title</h2> <span className="aside">· ≤8 words · band &amp; topic shown here</span></div></div>
                  <textarea className="editable titlebig" rows={1} aria-label="Springboard title" value={spot.title} placeholder="A short, catchy title…" onChange={e => patch({ title: e.target.value })} />
                  <div className="meta-chips">
                    <span className={"chip band-" + band.toLowerCase()}>{bandLabel}{year ? " · " + year : ""}</span>
                    {theme && <span className="chip gold">{theme}</span>}
                  </div>
                </div></div>

                {/* Content advisory — the model flags, the teacher chooses whether to include */}
                {spot.advisory.flag && (
                  <div className="slide advisory-slide"><div className="bar" style={barStyle}></div><div className="body">
                    <div className="advisory-card">
                      <div className="advisory-warnhead"><span className="advisory-tri" aria-hidden="true">⚠</span> CONTENT ADVISORY</div>
                      <div className="advisory-body">
                        <p className="advisory-line">{spot.advisory.reason || "This stimulus touches on a sensitive theme."}</p>
                        <label className="toggle-row" style={{ marginTop: 10 }}>
                          <input type="checkbox" checked={includeAdvisory} onChange={e => setIncludeAdvisory(e.target.checked)} />
                          Include a content-advisory slide at the start of the deck
                        </label>
                      </div>
                    </div>
                  </div></div>
                )}

                {/* IGNITE */}
                <div className="slide"><div className="bar" style={barStyle}></div><div className="body">
                  <div className="slide-head"><div className="slide-tag"><span className="n">1</span> <h2 style={{ font: "inherit", margin: 0, display: "inline" }}>Ignite</h2> <span className="aside">· one provocative question</span></div>{regenButton("ignite")}</div>
                  <textarea className="editable" rows={2} aria-label="Ignite question" value={spot.ignite.question} placeholder="One provocative question…" onChange={e => patchSlide("ignite", { question: e.target.value })} />
                  {(media.length > 0 || (mode === "article" && articleImageUrl) || link.trim()) && (
                    <div className="stim-preview">
                      <div className="cap" style={{ marginTop: 12 }}>On slide 1 <span style={{ fontWeight: 500, textTransform: "none", letterSpacing: 0, color: "var(--muted)" }}>· the stimulus students will see</span></div>
                      {media.length > 0 && <div className="reel-wrap"><MediaCarousel items={media} index={reelIndex} setIndex={setReelIndex} /></div>}
                      {mode === "article" && articleImageUrl && media.length === 0 && (
                        <div className="reel-wrap"><div className="reel-frame"><img src={articleImageUrl} alt="Article lead image" /></div></div>
                      )}
                      {link.trim() && <div style={{ marginTop: 10 }}><StimLink url={link.trim()} verb={MODE_VERB[mode] || "Open"} /></div>}
                    </div>
                  )}
                  <details className="notes-details">
                    <summary>Teacher notes</summary>
                    <textarea className="editable" rows={5} aria-label="Ignite teacher notes" value={spot.notes.ignite} placeholder="FACILITATION: … TIMING: … DIFFERENTIATION: … CURRICULUM LINKS: … EXTENSIONS: …" onChange={e => patchNote("ignite", e.target.value)} />
                  </details>
                </div></div>

                {/* THINK */}
                <div className="slide"><div className="bar" style={barStyle}></div><div className="body">
                  <div className="slide-head"><div className="slide-tag"><span className="n">2</span> <h2 style={{ font: "inherit", margin: 0, display: "inline" }}>Think</h2> <span className="aside">· {ROUTINE_SOURCE}</span></div>{regenButton("think")}</div>
                  <div className="routine-name-row">
                    <span className="chip">{spot.think.routine}</span>
                    <a className="routine-card-link" href={routineUrlFor} target="_blank" rel="noopener">View routine ↗</a>
                  </div>
                  <div className="hint" style={{ marginTop: 4 }}>To use a different routine, re-pick it in Analyse on the left and Regenerate.</div>
                  <div className="cap" style={{ marginTop: 12 }}>How to run it</div>
                  <textarea className="editable" rows={1} aria-label="How to run the routine" value={spot.think.structure} placeholder="e.g. Think-pair-share, 3 min" onChange={e => patchSlide("think", { structure: e.target.value })} />
                  <div className="cap" style={{ marginTop: 12 }}>Student prompts <span style={{ fontWeight: 500, textTransform: "none", letterSpacing: 0, color: "var(--muted)" }}>· up to 4</span></div>
                  {spot.think.steps.map((st, i) => (
                    <div className="step" key={i} style={{ gridTemplateColumns: "28px 1fr auto" }}>
                      <span className="rp-num" style={{ background: hx(T.accent), color: "#fff" }}>{i + 1}</span>
                      <textarea className="editable" rows={2} aria-label={"Student prompt " + (i + 1)} value={st} onChange={e => patchArr("think", "steps", i, e.target.value)} />
                      <button type="button" className="iconbtn" aria-label={"Remove prompt " + (i + 1)} title="Remove" onClick={() => delArr("think", "steps", i)}><Icon d={I.close} size={14} stroke /></button>
                    </div>
                  ))}
                  {spot.think.steps.length < 4 && <button type="button" className="addbtn" onClick={() => addArr("think", "steps")}>+ Add prompt</button>}
                  <details className="notes-details">
                    <summary>Teacher notes</summary>
                    <textarea className="editable" rows={5} aria-label="Think teacher notes" value={spot.notes.think} placeholder="FACILITATION: … TIMING: … DIFFERENTIATION: … CURRICULUM LINKS: … EXTENSIONS: …" onChange={e => patchNote("think", e.target.value)} />
                  </details>
                </div></div>

                {/* LAUNCH */}
                <div className="slide"><div className="bar" style={barStyle}></div><div className="body">
                  <div className="slide-head"><div className="slide-tag"><span className="n">3</span> <h2 style={{ font: "inherit", margin: 0, display: "inline" }}>Launch</h2> <span className="aside">· into today's lesson</span></div>{regenButton("launch")}</div>
                  <div className="cap">Bridge from the stimulus</div>
                  <textarea className="editable" rows={2} aria-label="Bridge from the stimulus" value={spot.launch.bridge} placeholder="From the stimulus to today's lesson…" onChange={e => patchSlide("launch", { bridge: e.target.value })} />
                  <div className="cap" style={{ marginTop: 10 }}>Lesson launch question</div>
                  <textarea className="editable" rows={2} aria-label="Lesson launch question" value={spot.launch.question} placeholder="The question that opens the lesson…" onChange={e => patchSlide("launch", { question: e.target.value })} />
                  <details className="notes-details">
                    <summary>Teacher notes · not shown to students</summary>
                    <div className="cap">Curriculum connection</div>
                    <textarea className="editable" rows={2} aria-label="Curriculum connection" value={spot.launch.connection} placeholder="How this links to your outcome…" onChange={e => patchSlide("launch", { connection: e.target.value })} />
                    <div className="cap" style={{ marginTop: 10 }}>Notes</div>
                    <textarea className="editable" rows={5} aria-label="Launch teacher notes" value={spot.notes.launch} placeholder="FACILITATION: … TIMING: … DIFFERENTIATION: … CURRICULUM LINKS: … EXTENSIONS: …" onChange={e => patchNote("launch", e.target.value)} />
                  </details>
                </div></div>

                {/* REFLECT */}
                <div className="slide"><div className="bar" style={barStyle}></div><div className="body">
                  <div className="slide-head"><div className="slide-tag"><span className="n">4</span> <h2 style={{ font: "inherit", margin: 0, display: "inline" }}>Reflect</h2> <span className="aside">· revisit thinking at lesson end</span></div></div>
                  <label className="toggle-row">
                    <input type="checkbox" checked={includeReflect} onChange={e => setIncludeReflect(e.target.checked)} />
                    Include REFLECT slide (revisit thinking at lesson end)
                  </label>
                  <div className={"reflect-body" + (includeReflect ? "" : " dimmed")} aria-hidden={!includeReflect}>
                    {includeReflect && (
                      <div style={{ display: "flex", alignItems: "flex-end", gap: 12, justifyContent: "space-between", flexWrap: "wrap" }}>
                        <div className="routine-pick" style={{ margin: 0 }}>
                          <label htmlFor="reflect-routine" className="cap" style={{ display: "block", marginBottom: 4 }}>Reflection routine</label>
                          <select id="reflect-routine" value={reflectRoutine} disabled={!!regenSlide || loading}
                            onChange={e => pickReflectRoutine(e.target.value)}>
                            <option value="">Auto — vary each lesson</option>
                            {REFLECT_ROUTINES.map(r => <option key={r.name} value={r.name}>{r.name}</option>)}
                          </select>
                        </div>
                        {regenButton("reflect")}
                      </div>
                    )}
                    <div className="cap" style={{ marginTop: 10 }}>Revisit the ignite question</div>
                    <textarea className="editable" rows={2} aria-label="Revisit the ignite question" value={spot.reflect.revisit} placeholder="…revisiting the opening question" onChange={e => patchSlide("reflect", { revisit: e.target.value })} disabled={!includeReflect} />
                    <div className="cap" style={{ marginTop: 10 }}>Reflection prompts <span style={{ fontWeight: 500, textTransform: "none", letterSpacing: 0, color: "var(--muted)" }}>· up to 4</span></div>
                    {spot.reflect.prompts.map((pr, i) => (
                      <div className="step" key={i} style={{ gridTemplateColumns: "28px 1fr auto" }}>
                        <span className="rp-num" style={{ background: "var(--gold-soft)", color: "var(--accent-2-ink)" }}>{i + 1}</span>
                        <textarea className="editable" rows={1} aria-label={"Reflection prompt " + (i + 1)} value={pr} onChange={e => patchArr("reflect", "prompts", i, e.target.value)} disabled={!includeReflect} />
                        <button type="button" className="iconbtn" aria-label={"Remove reflection prompt " + (i + 1)} title="Remove" onClick={() => delArr("reflect", "prompts", i)} disabled={!includeReflect}><Icon d={I.close} size={14} stroke /></button>
                      </div>
                    ))}
                    {includeReflect && spot.reflect.prompts.length < 4 && <button type="button" className="addbtn" onClick={() => addArr("reflect", "prompts")}>+ Add prompt</button>}
                    <details className="notes-details">
                      <summary>Teacher notes</summary>
                      <textarea className="editable" rows={5} aria-label="Reflect teacher notes" value={spot.notes.reflect} placeholder="FACILITATION: … TIMING: … DIFFERENTIATION: … CURRICULUM LINKS: … EXTENSIONS: …" onChange={e => patchNote("reflect", e.target.value)} disabled={!includeReflect} />
                    </details>
                  </div>
                </div></div>
              </div>
            </React.Fragment>
          )}
        </div>
      </main>
    </React.Fragment>
  );
}

/* QR preview component (synchronous, crash-proof) */
function StimLink({ url, verb }) {
  const qr = makeQrDataUrl(url);
  return (
    <div className="stim-link">
      {qr && <img className="qr" src={qr} alt={"QR code for " + url} />}
      <div><div style={{ marginBottom: 4 }}>{verb} here:</div><a href={url} target="_blank" rel="noreferrer">{url}</a></div>
    </div>
  );
}

/* Error boundary so a render error shows a message instead of a blank screen */
class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(err, info) { console.error("App crashed:", err, info); }
  render() {
    if (this.state.err) {
      return (
        <div style={{ maxWidth: 720, margin: "60px auto", padding: 24, fontFamily: "var(--font-body)" }}>
          <h2 style={{ color: "var(--bad-ink)" }}>Something crashed in the app</h2>
          <p>Try a hard refresh (Ctrl+F5). If it keeps happening, send this message:</p>
          <pre style={{ whiteSpace: "pre-wrap", background: "var(--bad-bg)", color: "var(--bad-ink)", border: "1px solid var(--bad)", borderRadius: 10, padding: 12 }}>
            {String(this.state.err && (this.state.err.stack || this.state.err.message || this.state.err))}
          </pre>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
