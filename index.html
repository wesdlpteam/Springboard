  async function folderWritable(h) {
    if (!h) return false;
    try { return (await h.queryPermission({ mode: "readwrite" })) === "granted"; } catch (_) { return false; }
  }
  // Lesson filename: hook title (fallback to deck title, then "Lesson") + date, .pptx.
  function lessonFileName(deck) {
    const raw = (deck && (deck.hook || deck.title)) || "Lesson";
    const base = raw.replace(/[^A-Za-z0-9 _.+-]/g, "").replace(/\s+/g, " ").trim() || "Lesson";
    const d = new Date();
    // Australian day-month-year, e.g. "29-06-2026".
    const date = String(d.getDate()).padStart(2, "0") + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + d.getFullYear();
    // Band (always) + optional Theme as a bracketed, filename-safe, parseable suffix.
    // Combined decks carry both codes, e.g. "[MS+SS · Living with AI]".
    const band = (deck && deck.comboBands) ? comboBandCode(deck.comboBands) : bandSpCode(activeBand);
    const tag = INCLUDE_THEME_IN_FILENAME && theme ? band + " · " + theme : band;
    return base + " (" + date + ") [" + tag + "].pptx";
  }
  async function saveLessonToSharePoint() {
    if (!spot || !activeBand) return;
    if (!(await folderWritable(lessonsHandle))) { setLessonsReady(false); setMediaNote(lessonsHandle ? 'Click "Reconnect" on the Lessons folder to enable saving this session.' : "Connect a Lessons folder first to save to SharePoint."); return; }
    if (busyRef.current.saving) return;
    busyRef.current.saving = true;
    setSaving(true);
    setLessonsReady(true);
    setMediaNote("Saving lesson to SharePoint Lessons…");
    try {
      const finalBlob = await buildDeckBlob(activeBand, spots[activeBand]);
      if (!finalBlob) { setMediaNote("Couldn't build the PowerPoint to save — see the error above."); return; }
      const name = lessonFileName(spots[activeBand]);
      const fh = await lessonsHandle.getFileHandle(name, { create: true });
      const w = await fh.createWritable();
      await w.write(finalBlob);
      await w.close();
      setMediaNote('Saved to SharePoint Lessons ✓  "' + name + '"');
    } catch (_) {
      setMediaNote("Couldn't save the lesson to SharePoint — try Reconnect on the Lessons folder.");
    } finally {
      busyRef.current.saving = false;
      setSaving(false);
    }
  }

  const mediaInput = useRef(null);
  const pdfInput = useRef(null);
  const genBtnRef = useRef(null);
  const genStimKey = useRef(""); // stimulus fingerprint at last successful generate (stale-deck hint)

  // First item's still image — keeps legacy single-image AI/PPTX paths working.
  const firstStill = media[0] ? (media[0].kind === "image" ? media[0].dataUrl : media[0].poster) : "";

  // Active band drives the (single) preview/edit/export view; before generation
  // it falls back to the first selected band so chips/labels still resolve.
  const band = activeBand || bands[0] || "PYP";
  const year = years[band] || "";
  // If the active deck is a combined one, its cover/label reads "Middle & Senior".
  const activeCombo = (spots[activeBand] && spots[activeBand].comboBands) || null;
  const bandLabel = activeCombo ? comboBandLabel(activeCombo) : bandLabelOf(band);
  const toggleBand = (b) => setBands(prev => {
    const has = prev.includes(b);
    const next = has ? prev.filter(x => x !== b) : [...prev, b];
    return BAND_ORDER.filter(x => next.includes(x)); // keep canonical order
  });
  const setBandYear = (b, y) => setYears(prev => ({ ...prev, [b]: y }));

  // The preview/edit/export view is single-deck: `spot` is the active band's deck,
  // and `setSpot` (accepting a value OR a function updater, like the old useState
  // setter) writes back into the active band's slot of the spots map.
  const spot = activeBand ? (spots[activeBand] || null) : null;
  const setSpot = (upd) => setSpots(all => {
    if (!activeBand) return all;
    const cur = all[activeBand] || null;
    const next = typeof upd === "function" ? upd(cur) : upd;
    return { ...all, [activeBand]: next };
  });

  // Stale-deck hint: fingerprint the stimulus so we can nudge "Regenerate" if it changed
  // after the last successful generate.
  const stimKey = mode + "|" + media.length + "|" + (mode === "article" ? articleText.length : 0);
  const stimulusStale = Object.keys(spots).length > 0 && genStimKey.current && genStimKey.current !== stimKey;

  // Keep reelIndex in range whenever the reel shrinks.
  React.useEffect(() => { if (reelIndex > Math.max(0, media.length - 1)) setReelIndex(0); }, [media.length]);
  // "Combine" only makes sense with 2+ bands — auto-clear it if the selection drops below.
  React.useEffect(() => { if (bands.length < 2 && combine) setCombine(false); }, [bands.length]);

  /* ------- file handlers ------- */
  const newId = () => (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());
  // Intrinsic aspect (w/h) of an image data URL, so the PPTX export can letterbox it
  // correctly (pptxgenjs `sizing:contain` stretches; we compute contain ourselves).
  const imageAspect = (dataUrl) => new Promise(res => {
    const im = new Image();
    im.onload = () => res(im.naturalWidth && im.naturalHeight ? im.naturalWidth / im.naturalHeight : 0);
    im.onerror = () => res(0);
    im.src = dataUrl;
  });

  async function addMediaFiles(fileList) {
    const files = Array.from(fileList || []);
    if (!files.length) return;
    setError(""); setMediaNote("");
    const room = MAX_MEDIA - media.length;
    if (room <= 0) { setMediaNote(`That's the limit of ${MAX_MEDIA} items — remove one to add more.`); return; }
    const take = files.slice(0, room);
    if (files.length > room) setMediaNote(`Only added ${room} — a reel holds up to ${MAX_MEDIA} items.`);

    for (const f of take) {
      if (f.type.startsWith("image/")) {
        try { const dataUrl = await readFileAsDataURL(f); const aspect = await imageAspect(dataUrl); setMedia(m => m.length >= MAX_MEDIA ? m : [...m, { id: newId(), kind: "image", dataUrl, name: f.name, aspect }]); }
        catch (_) { setError("Could not read image: " + f.name); }
      } else if (f.type.startsWith("video/")) {
        setExtractingVideo(true);
        try {
          let dataUrl = "";
          if (f.size <= VIDEO_EMBED_MAX_BYTES) { try { dataUrl = await readFileAsDataURL(f); } catch (_) {} }
          const { frames, poster, width, height } = await extractVideoFrames(f, 4);
          const vidId = newId();
          setMedia(m => m.length >= MAX_MEDIA ? m : [...m, { id: vidId, kind: "video", dataUrl, name: f.name, sizeBytes: f.size,
            poster, aspect: width && height ? width / height : 0, frames, text: "", transcribeState: apiKey.trim() ? "running" : "idle", transcribeNote: "",
            sharePointUrl: "" }]);
          if (!frames.length) setMediaNote("Couldn't read frames from " + f.name + " — add a description under its thumbnail. It will still embed in the PowerPoint.");
          else if (f.size > VIDEO_EMBED_MAX_BYTES) setMediaNote(`${f.name} is large (${formatBytes(f.size)}) — the deck will use its first frame (add a Link on the left for a clickable link + QR) instead of embedding.`);
          // Auto-upload to the connected SharePoint Media folder (background, non-blocking).
          if (folderHandle) {
            (async () => {
              try {
                if (!(await folderWritable(folderHandle))) { setFolderReady(false); setMediaNote('Click "Reconnect" on the Media folder to let videos upload to SharePoint this session.'); return; }
                setFolderReady(true);
                setMediaNote("Uploading video to SharePoint — give it a moment before sharing the deck.");
                const { url } = await putVideoToSharePoint(folderHandle, f);
                setMedia(m => m.map(x => x.id === vidId ? { ...x, sharePointUrl: url } : x));
              } catch (_) {
                setMediaNote("Couldn't save to SharePoint — the clip will embed with a link/QR instead.");
              }
            })();
          }
          if (apiKey.trim()) {
            (async () => {
              try {
                const { text, truncated } = await transcribeMedia({ apiKey: apiKey.trim(), file: f });
                setMedia(m => m.map(x => x.id === vidId ? { ...x, text, transcribeState: "done", transcribeNote: truncated ? "(transcript truncated)" : "" } : x));
              } catch (_) {
                setMedia(m => m.map(x => x.id === vidId ? { ...x, transcribeState: "failed", transcribeNote: "couldn't get transcript — frames will be used" } : x));
              }
            })();
          }
        } catch (_) { setError("Could not read video: " + f.name); }
        finally { setExtractingVideo(false); }
      }
    }
  }

  function onMedia(e) { addMediaFiles(e.target.files); e.target.value = ""; }
  const removeMedia = (id) => setMedia(m => m.filter(x => x.id !== id));
  const setMediaText = (id, text) => setMedia(m => m.map(x => x.id === id ? { ...x, text } : x));
  function moveMedia(id, dir) {
    setMedia(m => {
      const i = m.findIndex(x => x.id === id); const j = i + dir;
      if (i < 0 || j < 0 || j >= m.length) return m;
      const out = m.slice(); const [it] = out.splice(i, 1); out.splice(j, 0, it); return out;
    });
  }

  async function onPdf(e) {
    const f = e.target.files?.[0]; if (!f) return;
    setPdfName(f.name + " (extracting…)");
    try { const t = await extractPdfText(f); setArticleText(t); setPdfName(f.name + ` (${t.length.toLocaleString()} chars)`); }
    catch (err) { setError("Could not extract text from that PDF: " + err.message); setPdfName(""); }
  }
  // Pull readable article text from a public link via the r.jina.ai reader
  // (it allows browser/CORS requests). Hard paywalls may still fail.
  async function fetchArticleFromLink(overrideUrl) {
    const url = (typeof overrideUrl === "string" ? overrideUrl : link).trim();
    setError("");
    if (!/^https?:\/\//i.test(url)) { setError("Enter a full article link starting with http(s):// first."); return { text: "", image: "" }; }
    setLink(url);
    setFetchingArticle(true);
    try {
      const resp = await fetch("https://r.jina.ai/" + url);
      if (!resp.ok) throw new Error("Reader service returned HTTP " + resp.status);
      const rawMd = await resp.text();
      const text = cleanArticleMarkdown(rawMd);
      if (text.length < 40) throw new Error("Got too little text back — the page may be paywalled or JS-only.");
      const image = extractLeadImage(rawMd); // the article's lead image (before stripping)
      setArticleText(text);
      setArticleImageUrl(image);
      return { text, image };
    } catch (err) {
      setError("Couldn't fetch that link (" + (err.message || err) + "). Paste the article text instead.");
      return { text: "", image: "" };
    } finally {
      setFetchingArticle(false);
    }
  }

  /* ------- validation ------- */
  function inputReady() {
    if (mode === "media") return media.length > 0;
    if (mode === "article") return articleText.trim().length > 20;
    return false;
  }

  /* ------- suggest a focus theme from the current stimulus ------- */
  async function suggestTheme() {
    setError("");
    if (!apiKey.trim()) { setError("Please paste your OpenAI API key first."); return; }
    if (!inputReady()) { setError("Add a stimulus first, then Suggest a theme."); return; }
    setSuggestingTheme(true);
    try {
      const t = await suggestThemeFromStimulus({
        apiKey: apiKey.trim(), model, mode, media,
        sourceText: mode === "article" ? articleText : "",
      });
      if (t) setTheme(t);
      else setError("The model didn't return a theme — try again or type one.");
    } catch (err) {
      setError("Couldn't suggest a theme: " + (err.message || String(err)));
    } finally {
      setSuggestingTheme(false);
    }
  }

  /* ------- generate ------- */
  async function generate() {
    if (regenSlide || loading) return; // a slide regen is in flight, or a generate is already running
    setError(""); setRawDump("");
    if (!apiKey.trim()) { setError("Please paste your OpenAI API key first."); return; }
    if (mode === "media" && !media.length) { setError("Add at least one image or video first."); return; }
    if (!inputReady()) { setError("Please add a stimulus first (images/video, or article text/PDF)."); return; }

    setLoading(true);
    // Estimated progress: ease toward ~92% while the single request is in flight,
    // then snap to 100% when it lands. (The call isn't streamed, so this is a
    // reassurance estimate, not a literal measurement.)
    setGenProgress(3);
    const progTick = setInterval(() => setGenProgress(p => (p < 92 ? p + (92 - p) * 0.06 : p)), 250);
    try {
      if (!bands.length) { setError("Pick at least one band first."); setLoading(false); clearInterval(progTick); return; }
      const sourceText = mode === "article" ? articleText : "";
      const built = {};
      if (combine && bands.length > 1) {
        // ONE shared deck for all selected bands. Pitch + thinking routine come from the
        // LOWEST band (accessible to everyone); the deck is stored under that key and
        // tagged with comboBands so its label/filename/metadata read as combined.
        const ordered = BAND_ORDER.filter(b => bands.includes(b));
        const genBand = ordered[0];
        setGenStatus(`Generating combined ${comboBandLabel(ordered)}…`);
        const { parsed, raw } = await generateSpotlight({
          apiKey: apiKey.trim(), model, mode, band: genBand, year: "", theme,
          title: title.trim(), media, sourceText,
        });
        const deck = shapeDeck(parsed, { band: genBand, title });
        deck.comboBands = ordered;
        if (!deck.framing) deck.framing = MODE_FRAMING[mode];
        built[genBand] = deck;
        setRawDump(raw);
        setSpots(built);
        setActiveBand(genBand);
      } else {
        for (let i = 0; i < bands.length; i++) {
          const b = bands[i];
          setGenStatus(`Generating ${bandLabelOf(b)}… ${i + 1} of ${bands.length}`);
          const { parsed, raw } = await generateSpotlight({
            apiKey: apiKey.trim(), model, mode, band: b, year: years[b] || "", theme,
            title: title.trim(), media, sourceText,
          });
          built[b] = shapeDeck(parsed, { band: b, title });
          if (i === bands.length - 1) setRawDump(raw);
          if (!built[b].framing) built[b].framing = MODE_FRAMING[mode];
        }
        setSpots(built);
        setActiveBand(bands[0]);
      }
      genStimKey.current = stimKey; // remember the stimulus fingerprint for the stale-deck hint
      setGenProgress(100);
    } catch (err) {
      setError(err.message || String(err));
      if (err._raw) setRawDump(err._raw);
    } finally {
      clearInterval(progTick);
      setLoading(false);
      setGenStatus("");
      setTimeout(() => setGenProgress(0), 500);
    }
  }

  /* ------- regenerate a single slide (targeted, keeps the other slides) ------- */
  async function regenerateSlide(scope, routineChoiceArg) {
    if (!spot || regenSlide || loading) return;
    if (!apiKey.trim()) { setError("Please paste your OpenAI API key first."); return; }
    setError(""); setRawDump("");
    setRegenSlide(scope);
    try {
      const sourceText = mode === "article" ? articleText : "";
      const { parsed } = await generateSpotlight({
        apiKey: apiKey.trim(), model, mode, band, year, theme,
        title: title.trim(), media, sourceText,
        scope, routineChoice: routineChoiceArg !== undefined ? routineChoiceArg : routineChoice, current: spot,
      });
      setSpot(s => mergeScopedFields(s, scope, parsed));
    } catch (err) {
      setError(err.message || String(err));
      if (err._raw) setRawDump(err._raw);
    } finally {
      setRegenSlide(null);
    }
  }

  function toggleArr(arr, v) { return arr.includes(v) ? arr.filter(x => x !== v) : [...arr, v]; }

  /* ------- editing helpers ------- */
  const patch = (obj) => setSpot(s => ({ ...s, ...obj }));
  const patchStep = (i, obj) => setSpot(s => { const steps = s.steps.slice(); steps[i] = { ...steps[i], ...obj }; return { ...s, steps }; });
  const addStep = () => setSpot(s => ({ ...s, steps: [...s.steps, { name: "New step", minutes: 1, prompt: "" }] }));
  const delStep = (i) => setSpot(s => ({ ...s, steps: s.steps.filter((_, j) => j !== i) }));
  const patchQ = (i, obj) => setSpot(s => { const q = s.guidingQuestions.slice(); q[i] = { ...q[i], ...obj }; return { ...s, guidingQuestions: q }; });
  const addQ = () => setSpot(s => ({ ...s, guidingQuestions: [...s.guidingQuestions, { q: "", responses: "" }] }));
  const delQ = (i) => setSpot(s => ({ ...s, guidingQuestions: s.guidingQuestions.filter((_, j) => j !== i) }));

  const totalMins = useMemo(() => spot ? spot.steps.reduce((a, s) => a + (Number(s.minutes) || 0), 0) : 0, [spot]);

  const ST = STYLES[design] || STYLES.classic;
  const T = ST.palette;
  const barStyle = { background: hx(T.accent) };
  const RegenButton = ({ scope }) => (
    <button type="button" className="regen" title="Generate a different version of this slide"
      disabled={!!regenSlide || loading}
      aria-busy={regenSlide === scope} aria-label="Regenerate this slide for different options"
      onClick={() => regenerateSlide(scope)}>
      {regenSlide === scope
        ? <React.Fragment><span className="spinner sm dark"></span> Regenerating…</React.Fragment>
        : <React.Fragment><Icon d={I.refresh} size={13} stroke /> New options</React.Fragment>}
    </button>
  );

  /* ------- export ------- */
  // Build + save one deck. Shadows spot/band/year/bandLabel so the ~150-line body
  // below operates on the passed deck instead of the active-band view.
  async function buildDeckBlob(bandKey, deck) {
    if (!deck) return null;
    const spot = deck;                       // body reads spot.*
    const band = bandKey;
    // A combined deck shows no single year and reads "Middle & Senior" on its slides.
    const year = deck.comboBands ? "" : (years[bandKey] || "");
    const bandLabel = deck.comboBands ? comboBandLabel(deck.comboBands) : bandLabelOf(bandKey);
    const kw = Array.isArray(spot.keywords) ? spot.keywords.filter(Boolean) : []; // search terms for notes + core props
    try {
      // SharePoint online-video markers recorded during the build; applied to the
      // .pptx blob post-build by injectOnlineVideos(). Scoped per band/call.
      const videoMarks = [];
      const ST = STYLES[design] || STYLES.classic;
      const T = ST.palette;
      const accent = T.accent, accent2 = T.accent2, bar = T.bar, ink = T.ink, muted = T.muted;
      const tFont = ST.fonts.display, bFont = ST.fonts.body;
      const tCase = (s) => ST.upper ? String(s).toUpperCase() : String(s);
      const W = 13.33, H = 7.5;

      await loadScript(PPTX_SRC, PPTX_SRI);
      const pptx = new PptxGenJS();
      pptx.defineLayout({ name: "WIDE", width: W, height: H });
      pptx.layout = "WIDE";

      let n = 0;
      // Title + one provocation slide per reel item (article = 1) + Key takeaway.
      const showAdv = !!spot.advisoryShow;
      const slideOffset = showAdv ? 1 : 0;
      const total = slideOffset + 2 + ((mode === "media" && media.length) ? media.length : 1);
      const newSlide = (kind, bgOverride) => {
        n++;
        const s = pptx.addSlide();
        // bgOverride lets a "title"-kind slide use a style-specific background (e.g. Pop Art's
        // amber takeaway) while keeping the title chrome — footer band, crest and texture.
        s.background = { color: bgOverride || (kind === "title" ? T.titleBg : T.contentBg) };
        if (ST.texture) s.addImage({ data: makeTexture(ST.texture.kind, { color: ST.texture.color, alpha: ST.texture.alpha }), x:0, y:0, w:W, h:H });
        // Wesley footer band: a full-width accent bar along the BOTTOM of every slide.
        s.addShape(pptx.ShapeType.rect, { x: 0, y: H - 0.18, w: W, h: 0.18, fill: { color: bar } });
        if (kind === "title") {
          // Gold crest is 870x499 (aspect 1.743) — size to that ratio so it isn't squished.
          const lw = 2.1, lh = lw / 1.743;
          s.addImage({ data: WESLEY_LOGO_GOLD, x: W - 0.6 - lw, y: 0.45, w: lw, h: lh });
        } else {
          // Horizontal lockup is 554x111 (aspect 4.991) — sits just above the footer band.
          const lw = 2.3, lh = lw / 4.991;
          s.addImage({ data: WESLEY_LOGO_HORIZ, x: W - 0.6 - lw, y: H - 0.62 - lh, w: lw, h: lh });
        }
        const footColor = kind === "title" ? T.titleFoot : muted;
        s.addText(`Digital Life Spotlight · 5-minute discussion · ${n}/${total}`, { x: 0.6, y: H - 0.6, w: W - 3.4, h: 0.3, fontSize: 9, color: footColor, fontFace: bFont });
        return s;
      };
      const kicker = (s, txt, col) => s.addText(String(txt).toUpperCase(), { x: 0.8, y: 0.55, w: W - 1.6, h: 0.4, fontSize: 13, bold: true, color: col || accent, charSpacing: 2, fontFace: bFont });

      // Estimate the wrapped height (inches) of text in a box of width w at a given
      // font size. Fixed row heights used to overflow on long prompts — steps squished
      // together and the source line touched the last step — so we flow by measured
      // height and shrink the font when a routine's content runs long. Factors are
      // deliberately generous (more lines / taller lines) so we never under-allocate.
      const cpl = (fs, w) => Math.max(8, Math.floor(w / (fs * 0.0072)));     // chars per line
      const txtH = (text, fs, w) => {
        const per = cpl(fs, w), lh = fs * 0.018;                            // line height (in)
        const lines = String(text || "").split("\n")
          .reduce((n, ln) => n + Math.max(1, Math.ceil(ln.length / per)), 0);
        return lines * lh;
      };
      const drawRoutine = (s, rx2, rw2, colY, colH) => {
        const stepText = (st) => `${st.minutes} min   ${st.name}` + (st.prompt ? `\n${st.prompt}` : "");
        const gap = 0.12, srcH = 0.28;
        // Total column height at scale k; shrink fonts until the routine fits its column.
        const measure = (k) => {
          let h = txtH(tCase(spot.routineName), 18 * k, rw2) + gap;
          if (spot.routineIntro) h += txtH(spot.routineIntro, 12 * k, rw2) + gap;
          spot.steps.forEach((st) => { h += txtH(stepText(st), 12.5 * k, rw2) + gap; });
          return h + srcH;
        };
        let k = 1;
        while (k > 0.78 && measure(k) > colH) k -= 0.04;
        const nameFs = 18 * k, introFs = 12 * k, stepFs = 12.5 * k;

        let ry = colY;
        const nameH = txtH(tCase(spot.routineName), nameFs, rw2);
        s.addText(tCase(spot.routineName), { x: rx2, y: ry, w: rw2, h: nameH + 0.08, fontSize: nameFs, bold: true, color: ink, valign: "top", fontFace: tFont });
        ry += nameH + gap;
        if (spot.routineIntro) {
          const ih = txtH(spot.routineIntro, introFs, rw2);
          s.addText(spot.routineIntro, { x: rx2, y: ry, w: rw2, h: ih + 0.08, fontSize: introFs, italic: true, color: muted, valign: "top", fontFace: bFont });
          ry += ih + gap;
        }
        spot.steps.forEach((st) => {
          const sh = txtH(stepText(st), stepFs, rw2);
          s.addText([
            { text: `${st.minutes} min   `, options: { bold: true, color: accent } },
            { text: st.name, options: { bold: true, color: ink } },
            { text: st.prompt ? `\n${st.prompt}` : "", options: { color: ink } },
          ], { x: rx2, y: ry, w: rw2, h: sh + 0.08, fontSize: stepFs, valign: "top", fontFace: bFont });
          ry += sh + gap;
        });
        s.addText(ROUTINE_SOURCE, { x: rx2, y: Math.min(ry, colY + colH - srcH), w: rw2, h: srcH, fontSize: 8, italic: true, color: muted, valign: "top", fontFace: bFont });
      };

      /* Slide 2..(1+N) — PROVOCATION + THINKING ROUTINE, one slide per media item.
         Image/video fills the left column; the routine repeats on the right; ◀/▶ corner
         arrows hyperlink to the adjacent item-slide so it swipes in Slide Show mode. */
      const colY = 1.95, colH = 4.45;
      const lx = 0.8, lw2 = 6.6;
      const rx2 = 7.7, rw2 = W - 0.8 - rx2;
      const hasLink = !!link.trim();
      const mediaH = hasLink ? colH - 0.5 : colH;

      // Per-style visual layer: each skin renders cover/provocation-chrome/takeaway differently;
      // shared media/video/QR/routine logic below stays identical across all styles. Dark styles
      // get a dark content background automatically via newSlide's T.contentBg (set per-style).
      const HARD = (color) => ({ type:"outer", color, blur:0, offset:5, angle:45, opacity:1 });
      const SKINS = {
        classic: {
          cover(s, c) {
            s.addText(c.tCase(c.spot.hook || c.spot.title), { x: 0.9, y: 1.6, w: c.W - 2.6, h: 3.8, fontSize: 44, bold: true, color: c.T.titleInk, valign: "middle", fontFace: c.tFont });
            s.addText(`${c.bandLabel}${c.year ? " · " + c.year : ""}   ·   ${c.theme}   ·   5-minute discussion`, { x: 0.9, y: 5.7, w: c.W - 1.8, h: 0.4, fontSize: 14, color: c.T.titleSub, fontFace: c.bFont });
          },
          provChrome(s, c, idx, reelLen) {
            c.kicker(s, reelLen > 1 ? `Provocation · ${idx + 1}/${reelLen}` : "Provocation");
            s.addText(c.spot.framing, { x: 0.8, y: 1.0, w: c.W - 1.6, h: 0.7, fontSize: 22, bold: true, color: c.ink, fontFace: c.tFont });
          },
          takeaway(s, c) {
            c.kicker(s, "Your key takeaway", c.T.titleKick);
            s.addShape(c.pptx.ShapeType.roundRect, { x: 1.1, y: 2.2, w: c.W - 2.2, h: 2.8, fill: { color: c.T.cardBg }, rectRadius: 0.18 });
            s.addText(c.spot.studentAction || "—", { x: 1.7, y: 2.4, w: c.W - 3.4, h: 2.4, fontSize: 26, bold: true, color: c.T.cardInk, valign: "middle", align: "center", fontFace: c.tFont, fit: "shrink" });
            if (c.spot.learnerProfile.filter(Boolean).length)
              s.addText("IB Learner Profile: " + c.spot.learnerProfile.filter(Boolean).join(", "), { x: 1.1, y: 5.4, w: c.W - 2.2, h: 0.4, fontSize: 14, italic: true, color: c.T.titleSub, align: "center", fontFace: c.bFont });
          },
        },
        brutalist: {
          cover(s, c) {
            s.addText(" DIGITAL LIFE SPOTLIGHT ", { x:0.6, y:0.5, w:4.2, h:0.35, fontSize:11, bold:true, color:"E4D1A1", fill:{color:"000000"}, fontFace:"Arial", charSpacing:1 });
            s.addText(c.tCase(c.spot.hook || c.spot.title), { x:0.7, y:1.5, w:c.W-2.4, h:3.4, fontSize:46, bold:true, color:"000000", valign:"middle", fontFace:c.tFont, charSpacing:-0.5 });
            s.addShape(c.pptx.ShapeType.rect, { x:0.7, y:5.6, w:6.2, h:0.7, fill:{color:"4F2759"}, line:{color:"000000", width:3}, shadow:HARD("C59F40") });
            s.addText(`${c.bandLabel}${c.year?" · "+c.year:""}  ·  ${c.theme}  ·  5-MIN`, { x:0.7, y:5.6, w:6.2, h:0.7, fontSize:13, bold:true, color:"FFFFFF", align:"center", valign:"middle", fontFace:c.bFont });
          },
          provChrome(s, c, idx, reelLen) {
            s.addText((reelLen>1?` PROVOCATION ${idx+1}/${reelLen} `:" PROVOCATION "), { x:0.8, y:0.5, w:3.2, h:0.35, fontSize:11, bold:true, color:"000000", fill:{color:"C59F40"}, fontFace:"Arial" });
            s.addText(c.spot.framing, { x:0.8, y:1.0, w:c.W-1.6, h:0.7, fontSize:22, bold:true, color:c.ink, fontFace:c.tFont });
          },
          takeaway(s, c) {
            s.addText("YOUR KEY TAKEAWAY", { x:0.8, y:1.2, w:c.W-1.6, h:0.4, fontSize:13, bold:true, color:"000000", fontFace:"Arial", charSpacing:2 });
            s.addShape(c.pptx.ShapeType.rect, { x:1.1, y:2.1, w:c.W-2.2, h:3.0, fill:{color:"4F2759"}, line:{color:"000000", width:3.5}, shadow:HARD("C59F40") });
            s.addText(c.spot.studentAction || "—", { x:1.6, y:2.3, w:c.W-3.2, h:2.6, fontSize:28, bold:true, color:"FFFFFF", align:"center", valign:"middle", fontFace:c.tFont, fit:"shrink" });
          },
        },
        editorial: {
          cover(s, c) {
            s.addShape(c.pptx.ShapeType.line, { x:0.9, y:0.95, w:c.W-1.8, h:0, line:{color:"C59F40", width:1.5} });
            s.addText("THE DIGITAL LIFE SPOTLIGHT", { x:0.9, y:1.05, w:c.W-1.8, h:0.35, fontSize:12, color:"6A5018", charSpacing:4, fontFace:c.bFont });
            s.addText(c.spot.hook || c.spot.title, { x:0.9, y:1.9, w:c.W-2.2, h:2.8, fontSize:46, bold:true, color:"4F2759", valign:"top", fontFace:"Arial" });
            s.addText(`${c.bandLabel}${c.year?" · "+c.year:""}   ·   ${c.theme}   ·   a 5-minute discussion`, { x:0.9, y:5.9, w:c.W-1.8, h:0.4, fontSize:14, italic:true, color:c.T.titleSub, fontFace:"Arial" });
          },
          provChrome(s, c, idx, reelLen) {
            s.addText((reelLen>1?`PROVOCATION · ${idx+1}/${reelLen}`:"PROVOCATION"), { x:0.8, y:0.5, w:c.W-1.6, h:0.3, fontSize:11, color:"6A5018", charSpacing:3, fontFace:c.bFont });
            s.addShape(c.pptx.ShapeType.line, { x:0.8, y:0.85, w:1.2, h:0, line:{color:"C59F40", width:1} });
            s.addText(c.spot.framing, { x:0.8, y:1.0, w:c.W-1.6, h:0.7, fontSize:22, bold:true, color:"4F2759", fontFace:"Arial" });
          },
          takeaway(s, c) {
            s.addText("“", { x:0.9, y:1.0, w:1.5, h:1.2, fontSize:90, color:"C59F40", fontFace:"Arial" });
            // Quote box owns the whole mid-band (y 2.0–5.4) and shrinks to fit, so a long
            // student action can never overflow into the gold rule / IB line below it.
            s.addText(c.spot.studentAction || "—", { x:1.4, y:2.0, w:c.W-2.8, h:3.4, fontSize:34, italic:true, bold:true, color:"4F2759", valign:"middle", fontFace:"Arial", fit:"shrink" });
            s.addShape(c.pptx.ShapeType.line, { x:1.4, y:5.7, w:2.2, h:0, line:{color:"C59F40", width:1.5} });
            if (c.spot.learnerProfile.filter(Boolean).length)
              s.addText("IB Learner Profile: " + c.spot.learnerProfile.filter(Boolean).join(", "), { x:1.4, y:5.9, w:c.W-2.8, h:0.4, fontSize:13, italic:true, color:c.muted, fontFace:c.bFont });
          },
        },
        popart: {
          cover(s, c) {
            // No top-right starburst — it collided with the Wesley crest. Comic feel comes from
            // bold caps + subtle halftone + the speech-bubble meta chip. (pptxgenjs `line` on text
            // draws a BOX around the frame, not a glyph outline, so the headline stays unoutlined.)
            s.addText(c.tCase(c.spot.hook || c.spot.title), { x:0.7, y:1.3, w:c.W-1.6, h:3.5, fontSize:46, bold:true, color:"4F2759", valign:"middle", fontFace:c.tFont, charSpacing:-0.5 });
            s.addShape(c.pptx.ShapeType.roundRect, { x:0.7, y:5.6, w:6.0, h:0.7, fill:{color:"FFFFFF"}, line:{color:"000000", width:2.5}, rectRadius:0.35 });
            s.addText(`${c.bandLabel}${c.year?" · "+c.year:""}  ·  ${c.theme}`, { x:0.7, y:5.6, w:6.0, h:0.7, fontSize:13, bold:true, color:"4F2759", align:"center", valign:"middle", fontFace:c.bFont });
          },
          provChrome(s, c, idx, reelLen) {
            s.addText((reelLen>1?` PROVOCATION ${idx+1}/${reelLen} `:" PROVOCATION "), { x:0.8, y:0.5, w:3.2, h:0.4, fontSize:11, bold:true, color:"FFFFFF", fill:{color:"4F2759"}, line:{color:"000000", width:2}, align:"center", fontFace:c.tFont });
            s.addText(c.spot.framing, { x:0.8, y:1.05, w:c.W-1.6, h:0.7, fontSize:22, bold:true, color:c.ink, fontFace:c.tFont });
          },
          takeaway(s, c) {
            // The amber field + halftone now come from newSlide (takeawayBg override + texture
            // hook), so the Wesley footer band + crest survive. Skin only draws the speech card.
            s.addShape(c.pptx.ShapeType.roundRect, { x:1.2, y:1.9, w:c.W-2.4, h:3.2, fill:{color:"FFFFFF"}, line:{color:"000000", width:3}, rectRadius:0.3 });
            s.addText(c.tCase("Your key takeaway"), { x:1.6, y:2.1, w:c.W-3.2, h:0.4, fontSize:13, bold:true, color:"4F2759", fontFace:c.tFont, charSpacing:1 });
            s.addText((c.spot.studentAction || "—") + "!", { x:1.6, y:2.6, w:c.W-3.2, h:2.0, fontSize:26, bold:true, color:"4F2759", valign:"middle", fontFace:c.tFont, fit:"shrink" });
          },
        },
      };
      const skin = SKINS[ST.layout] || SKINS.classic;
      const ctx = {
        pptx, ST, T, W, H, n: () => n, total, spot, bandLabel, year, theme, mode,
        accent, accent2, bar, ink, muted, tFont, bFont, tCase, kicker, drawRoutine, newSlide,
        geom: { colY, colH, lx, lw2, rx2, rw2, mediaH, hasLink },
      };

      /* Advisory slide (slide 1) — unmistakable CONTENT WARNING, identical across all deck styles. */
      if (showAdv) {
        n++;
        const ADV_BG = "000000", ADV_INK = "F7F2EA", ADV_GOLD = "E4D1A1", ADV_AMBER = "E8A33D";
        // Fixed Wesley brand fonts (not the per-style tFont/bFont) so the advisory
        // reads identically across all deck styles.
        const ADV_DISPLAY = "Avenir Black", ADV_BODY = "Graphik";
        const sa = pptx.addSlide();
        sa.background = { color: ADV_BG };
        // Amber caution band across the top so it reads instantly as a warning slide.
        sa.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: W, h: 0.32, fill: { color: ADV_AMBER } });
        sa.addShape(pptx.ShapeType.rect, { x: 0, y: H - 0.18, w: W, h: 0.18, fill: { color: ADV_GOLD } });
        const lw = 2.3, lh = lw / 4.991;
        sa.addImage({ data: WESLEY_LOGO_HORIZ, x: W - 0.6 - lw, y: H - 0.62 - lh, w: lw, h: lh });
        sa.addText(`Digital Life Spotlight · 5-minute discussion · ${n}/${total}`, { x: 0.6, y: H - 0.6, w: W - 3.4, h: 0.3, fontSize: 9, color: ADV_INK, fontFace: ADV_BODY });
        // Warning triangle (amber, dark "!") + bold "CONTENT WARNING" header.
        sa.addShape(pptx.ShapeType.triangle, { x: 0.9, y: 1.05, w: 1.0, h: 0.9, fill: { color: ADV_AMBER }, line: { color: ADV_BG, width: 2.5 } });
        sa.addText("!", { x: 0.9, y: 1.32, w: 1.0, h: 0.6, fontSize: 34, bold: true, color: ADV_BG, align: "center", valign: "middle", fontFace: ADV_DISPLAY });
        sa.addText("CONTENT WARNING", { x: 2.1, y: 1.0, w: W - 3.0, h: 1.0, fontSize: 36, bold: true, color: ADV_AMBER, charSpacing: 3, valign: "middle", fontFace: ADV_DISPLAY });
        const themeLine = advisoryThemeLine(spot.advisoryCats || []);
        sa.addText(`Heads up — today's spotlight touches on some things that might feel heavy: ${themeLine}.`, { x: 0.9, y: 2.7, w: W - 1.8, h: 1.5, fontSize: 23, bold: true, color: ADV_INK, valign: "top", fontFace: ADV_BODY, lineSpacingMultiple: 1.15 });
        sa.addText("If you'd rather step out for this one, just quietly let your teacher know. That's completely okay.", { x: 0.9, y: 4.7, w: W - 1.8, h: 1.2, fontSize: 16, italic: true, color: ADV_INK, valign: "top", fontFace: ADV_BODY, lineSpacingMultiple: 1.2 });
      }

      /* Slide 1 — TITLE (catchy headline; also carries band/theme) */
      const s1 = newSlide("title");
      skin.cover(s1, ctx);

      // For article mode, keep a single provocation slide (reuse the legacy single-stimulus path).
      const reel = (mode === "media" && media.length) ? media : [null]; // [null] = non-media single slide
      const provFirst = 2 + slideOffset;  // title is slide 1 (+1 when the advisory slide is present)
      const provLast = provFirst + reel.length - 1;

      for (let idx = 0; idx < reel.length; idx++) {
        const item = reel[idx];
        const s3 = newSlide("content");
        skin.provChrome(s3, ctx, idx, reel.length);

        // LEFT: this item's media (or article/summary on the single non-media slide).
        if (item && item.kind === "image") {
          // Compute "contain" ourselves (pptxgenjs sizing:contain stretches the image to the box).
          const ar = (item.aspect && isFinite(item.aspect) && item.aspect > 0) ? item.aspect : (lw2 / mediaH);
          let iw = lw2, ih = iw / ar; if (ih > mediaH) { ih = mediaH; iw = ih * ar; }
          iw = +iw.toFixed(2); ih = +ih.toFixed(2);
          const iX = +(lx + (lw2 - iw) / 2).toFixed(2), iY = +(colY + (mediaH - ih) / 2).toFixed(2);
          s3.addImage({ data: item.dataUrl, x: iX, y: iY, w: iw, h: ih });
        } else if (item && item.kind === "video") {
          const ar = (item.aspect && isFinite(item.aspect) && item.aspect > 0) ? item.aspect : (16 / 9);
          let vw = lw2, vh = vw / ar; if (vh > mediaH) { vh = mediaH; vw = vh * ar; }
          vw = +vw.toFixed(2); vh = +vh.toFixed(2);
          const vX = +(lx + (lw2 - vw) / 2).toFixed(2), vY = +(colY + (mediaH - vh) / 2).toFixed(2);
          if (item.sharePointUrl) {
            // Marked poster — converted into a real online-video by post-processing (injectOnlineVideos).
            const firstStillFallback = item.poster || WESLEY_LOGO_HORIZ;
            s3.addImage({ data: item.poster || firstStillFallback, x: vX, y: vY, w: vw, h: vh,
              sizing: { type: "contain", w: vw, h: vh },
              altText: VIDEO_MARK_PREFIX + item.sharePointUrl });
            videoMarks.push({ url: item.sharePointUrl, name: item.name || "video.mp4" });
          } else {
            const embed = !!item.dataUrl && item.sizeBytes <= VIDEO_EMBED_MAX_BYTES;
            if (embed) s3.addMedia({ type: "video", data: item.dataUrl, cover: item.poster || undefined, x: vX, y: vY, w: vw, h: vh });
            else if (item.poster) s3.addImage({ data: item.poster, x: vX, y: vY, w: vw, h: vh, sizing: { type: "contain", w: vw, h: vh } });
          }
        } else {
          // article / no-media: lead image + summary (legacy behavior).
          let stimImg = "";
          if (mode === "article" && articleImageUrl) stimImg = await urlToDataUrl(articleImageUrl);
          let ay = colY, aAvail = mediaH;
          if (stimImg) { const ih = +(aAvail * 0.5).toFixed(2); s3.addImage({ data: stimImg, x: lx, y: ay, w: lw2, h: ih, sizing: { type: "contain", w: lw2, h: ih } }); ay += ih + 0.15; aAvail -= ih + 0.15; }
          // Cap the box 0.15" above the link/QR row and shrink-to-fit so a long
          // summary can never overflow its box and collide with the link + QR below.
          if (spot.summary && spot.summary.trim()) s3.addText(spot.summary, { x: lx, y: ay, w: lw2, h: Math.max(0.6, aAvail - (hasLink ? 0.15 : 0)), fontSize: 13, color: ink, valign: "top", fontFace: bFont, lineSpacingMultiple: 1.1, fit: "shrink" });
          else if (!stimImg) s3.addText("(Share the stimulus with students directly.)", { x: lx, y: ay, w: lw2, h: 0.6, fontSize: 14, italic: true, color: muted, fontFace: bFont });
        }

        // Optional link + QR under the left column.
        if (hasLink) {
          const url = link.trim();
          const qr = makeQrDataUrl(url);
          const lineY = colY + colH - 0.5;
          if (qr) s3.addImage({ data: qr, x: lx, y: lineY, w: 0.5, h: 0.5 });
          s3.addText([{ text: `${MODE_VERB[mode] || "Source"}: `, options: { color: ink, bold: true } }, { text: url, options: { color: accent, underline: true, hyperlink: { url } } }],
            { x: lx + (qr ? 0.6 : 0), y: lineY, w: lw2 - (qr ? 0.6 : 0), h: 0.5, fontSize: 9, valign: "middle", fontFace: bFont });
        }

        // RIGHT: routine (repeated on every item-slide).
        drawRoutine(s3, rx2, rw2, colY, colH);

        // Carousel nav: ◀/▶ to adjacent item-slides + dot row (only when >1 item).
        if (reel.length > 1) {
          const myNum = provFirst + idx;
          const prevNum = Math.max(provFirst, myNum - 1);
          const nextNum = Math.min(provLast, myNum + 1);
          if (myNum > provFirst) s3.addText("‹", { x: lx + 0.05, y: colY + mediaH / 2 - 0.25, w: 0.5, h: 0.5, fontSize: 28, bold: true, color: "FFFFFF", align: "center", valign: "middle", fill: { color: "000000", transparency: 45 }, hyperlink: { slide: prevNum } });
          if (myNum < provLast) s3.addText("›", { x: lx + lw2 - 0.55, y: colY + mediaH / 2 - 0.25, w: 0.5, h: 0.5, fontSize: 28, bold: true, color: "FFFFFF", align: "center", valign: "middle", fill: { color: "000000", transparency: 45 }, hyperlink: { slide: nextNum } });
          const dots = reel.map((_, i) => i === idx ? "●" : "○").join("  ");
          s3.addText(dots, { x: lx, y: colY + mediaH + 0.02, w: lw2, h: 0.3, fontSize: 12, color: accent, align: "center", fontFace: bFont });
        }

        // Speaker notes on every item-slide.
        const gq = spot.guidingQuestions.filter(g => (g.q || "").trim());
        const respLines = spot.steps.map((st, i) => `Step ${i + 1} — ${st.name}: ${st.responses || "(none generated — add your own)"}`);
        s3.addNotes(
          (gq.length ? "Guiding questions:\n" + gq.map(g => "• " + g.q + ((g.responses || "").trim() ? "\n    ↳ Possible responses: " + g.responses : "")).join("\n") : "") +
          (respLines.length ? (gq.length ? "\n\n" : "") + "Likely student responses (per step):\n" + respLines.join("\n") : "") +
          (kw.length ? "\n\nKeywords: " + kw.join(", ") : "")
        );
      }

      /* STUDENT KEY TAKEAWAY */
      const s6 = newSlide("title", T.takeawayBg);
      skin.takeaway(s6, ctx);

      // Core document properties (surface in PowerPoint's File ▸ Info and most tools).
      const lessonTitle = spot.title || spot.hook || "Digital Life Spotlight";
      const spTheme = theme || "";   // same focus theme printed on the deck (component state)
      const spBand = deck.comboBands ? comboBandCode(deck.comboBands) : bandSpCode(bandKey);
      pptx.title = lessonTitle;
      pptx.subject = [spBand, spTheme].filter(Boolean).join(" · ");
      pptx.company = "Wesley College — Digital Spotlight";
      pptx.author = "Digital Spotlight Generator";

      // Build to a blob, post-process any SharePoint videos, then stamp Band + Theme as
      // custom doc properties for the Power Automate flow that fills the SharePoint columns.
      const blob = await pptx.write({ outputType: "blob" });
      const withVideos = await injectOnlineVideos(blob, videoMarks);
      return await stampDocProps(withVideos, { Band: spBand, Theme: spTheme, Title: lessonTitle }, kw);
    } catch (err) {
      setError("PowerPoint export failed: " + (err.message || String(err)));
      return null;
    }
  }

  // Build one band's deck and download it as a .pptx.
  async function buildAndSaveDeck(bandKey, deck) {
    const finalBlob = await buildDeckBlob(bandKey, deck);
    if (!finalBlob) return;
    const a = document.createElement("a");
    a.href = URL.createObjectURL(finalBlob);
    a.download = `Tech-Spotlight-${bandFileSlug(bandKey)}.pptx`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  }

  // Export one .pptx per generated band, staggered so browsers don't drop files.
  async function download() {
    if (busyRef.current.exporting) return;
    busyRef.current.exporting = true;
    setExporting(true);
    try {
      const keys = BAND_ORDER.filter(b => spots[b]);
      for (const b of keys) {
        await buildAndSaveDeck(b, spots[b]);
        await new Promise(r => setTimeout(r, 400));
      }
    } finally { busyRef.current.exporting = false; setExporting(false); }
  }

  /* ------------------------------ render ------------------------------ */
  const routineBlockJsx = spot ? (
    <React.Fragment>
      <div className="cap" style={{ marginTop: 14 }}>Thinking routine <span style={{ fontWeight: 500, textTransform: "none", letterSpacing: 0, color: "var(--muted)" }}>· {ROUTINE_SOURCE}</span></div>
      <div className="routine-pick">
        <select aria-label="Choose the thinking routine" value={routineChoice} disabled={!!regenSlide || loading}
          onChange={e => { setRoutineChoice(e.target.value); regenerateSlide("provocation", e.target.value); }}>
          <option value="">✨ Let AI choose the routine</option>
          {ROUTINES[band].map(r => <option key={r.name} value={r.name}>{r.name}</option>)}
        </select>
      </div>
      <textarea className="editable" rows={1} aria-label="Thinking routine name" style={{ fontWeight: 700, fontSize: 16 }} value={spot.routineName} onChange={e => patch({ routineName: e.target.value })} />
      <textarea className="editable" rows={1} aria-label="Routine introduction for the class" style={{ fontStyle: "italic", color: "var(--muted)" }} value={spot.routineIntro} onChange={e => patch({ routineIntro: e.target.value })} />
      {spot.steps.map((st, i) => (
        <div className="step" key={i}>
          <div className="mins"><input type="number" min="0" max="5" aria-label={"Step " + (i + 1) + " minutes"} value={st.minutes} onChange={e => patchStep(i, { minutes: Number(e.target.value) })} /><span>min</span></div>
          <div>
            <input className="editable name" aria-label={"Step " + (i + 1) + " name"} value={st.name} onChange={e => patchStep(i, { name: e.target.value })} />
            <textarea className="editable" rows={2} aria-label={"Step " + (i + 1) + " discussion prompt"} value={st.prompt} onChange={e => patchStep(i, { prompt: e.target.value })} />
            <div className="resp-note">
              <span className="resp-cap">Likely student responses <span style={{ fontWeight: 500, textTransform: "none", letterSpacing: 0 }}>(speaker notes)</span></span>
              <textarea className="editable" rows={2} value={st.responses || ""} placeholder="What students might actually say…" onChange={e => patchStep(i, { responses: e.target.value })} />
            </div>
          </div>
          <button type="button" className="iconbtn" aria-label={"Remove step: " + (st.name || (i + 1))} title="Remove step" onClick={() => delStep(i)}><Icon d={I.close} size={14} stroke /></button>
        </div>
      ))}
      <button type="button" className="addbtn" onClick={addStep}>+ Add step</button>
      <div className={"total" + (totalMins > 5 ? " over" : "")}>Total: {totalMins} min {totalMins > 5 ? "— over 5 minutes!" : "/ 5 min"}</div>

      <div className="cap" style={{ marginTop: 14 }}>Guiding questions <span style={{ fontWeight: 500, textTransform: "none", letterSpacing: 0, color: "var(--muted)" }}>· speaker notes (not shown on the slide)</span></div>
      <ul className="ql">
        {spot.guidingQuestions.map((item, i) => (
          <li key={i}>
            <span className="num" style={{ background: hx(T.accent) }}>{i + 1}</span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <textarea className="editable" rows={1} aria-label={"Guiding question " + (i + 1)} value={item.q} onChange={e => patchQ(i, { q: e.target.value })} />
              <div className="resp-note">
                <span className="resp-cap">Possible student responses <span style={{ fontWeight: 500, textTransform: "none", letterSpacing: 0 }}>(speaker notes)</span></span>
                <textarea className="editable" rows={2} value={item.responses || ""} placeholder="How students might answer…" onChange={e => patchQ(i, { responses: e.target.value })} />
              </div>
            </div>
            <button type="button" className="iconbtn" aria-label={"Remove guiding question " + (i + 1)} title="Remove" onClick={() => delQ(i)}><Icon d={I.close} size={14} stroke /></button>
          </li>
        ))}
      </ul>
      <button type="button" className="addbtn" onClick={addQ}>+ Add question</button>
    </React.Fragment>
  ) : null;

  return (
    <React.Fragment>
      <header className="app">
        <div className="logo"><Icon d={I.shield} size={22} /></div>
        <div>
          <h1>Digital Spotlight Generator</h1>
          <p>5-minute cyber-safety &amp; digital-citizenship discussion prompts → PowerPoint</p>
        </div>
        <span className="appver" title="App version — check this matches after a refresh">{APP_VERSION}</span>
      </header>

      <main className="layout">
        {/* ----------------- INPUT PANEL ----------------- */}
        <div className="panel input">
          <div className="group">
            <label className="cap" htmlFor="f-apikey">OpenAI API key</label>
            <div style={{ display: "flex", gap: 6 }}>
              <input id="f-apikey" type="password" value={apiKey} placeholder="sk-…" onChange={e => saveApiKey(e.target.value)} />
              {apiKey && <button className="btn ghost" style={{ width: "auto", padding: "9px 12px", whiteSpace: "nowrap" }} title="Remove the saved key from this browser" onClick={forgetAll}>Forget</button>}
            </div>
            <div className="hint">Saved in <b>this browser only</b> (localStorage). <b>Forget</b> clears the key <b>and</b> disconnects any SharePoint folders — use it on a shared computer.</div>
          </div>

          <div className="group">
            <label className="cap" htmlFor="f-model">Model</label>
            <select id="f-model" value={model} onChange={e => setModel(e.target.value)}>
              <option value="gpt-5.4">gpt-5.4</option>
              <option value="gpt-5.5">gpt-5.5</option>
              <option value="gpt-5.4-mini">gpt-5.4-mini</option>
            </select>
          </div>

          <div className="group">
            <label className="cap" id="lbl-mode">Stimulus mode</label>
            <div className="modes" role="group" aria-labelledby="lbl-mode">
              {["media", "article"].map(m => (
                <button key={m} type="button" className={mode === m ? "active" : ""} aria-pressed={mode === m} onClick={() => setMode(m)}>
                  <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                    <Icon d={m === "media" ? I.image : I.doc} size={16} stroke />
                    {m === "media" ? "Images / video" : "Article"}
                  </span>
                </button>
              ))}
            </div>
          </div>

          {mode === "media" && (
            <div className="group">
              <label className="cap" htmlFor="f-media">Images &amp; video <span style={{ color: "var(--muted)", fontWeight: 600 }}>(swipeable reel)</span></label>
              <button type="button" className="filebox"
                aria-label="Add images or videos to the reel"
                onClick={() => mediaInput.current.click()}
                onDragOver={e => { e.preventDefault(); }}
                onDrop={e => { e.preventDefault(); addMediaFiles(e.dataTransfer.files); }}>
                {extractingVideo
                  ? <React.Fragment><div className="big"><span className="spinner" style={{ borderTopColor: "var(--accent)", borderColor: "var(--accent-soft)" }}></span></div><div className="small">Reading video…</div></React.Fragment>
                  : <React.Fragment><div className="big"><Icon d={I.image} size={26} stroke /></div><div className="small">Click, or drop images / videos here ({media.length}/{MAX_MEDIA})</div></React.Fragment>}
              </button>
              <input ref={mediaInput} id="f-media" type="file" accept="image/*,video/*" multiple hidden onChange={onMedia} />
              {mediaNote && <div className="alert info" role="status" aria-live="polite" style={{ marginTop: 8 }}>{mediaNote}</div>}

              {media.length > 0 && (
                <div className="media-strip">
                  {media.map((it, i) => (
                    <div className="media-thumb" key={it.id}>
                      <img src={it.kind === "image" ? it.dataUrl : it.poster} alt={it.name} />
                      {it.kind === "video" && <span className="vtag"><Icon d={I.play} size={14} /></span>}
                      <div className="media-thumb-tools">
                        <button type="button" className="iconbtn" aria-label={"Move " + it.name + " earlier"} disabled={i === 0} onClick={() => moveMedia(it.id, -1)}>‹</button>
                        <span className="ord">{i + 1}</span>
                        <button type="button" className="iconbtn" aria-label={"Move " + it.name + " later"} disabled={i === media.length - 1} onClick={() => moveMedia(it.id, +1)}>›</button>
                        <button type="button" className="iconbtn" aria-label={"Remove " + it.name} onClick={() => removeMedia(it.id)}><Icon d={I.close} size={13} stroke /></button>
                      </div>
                      {it.kind === "video" && (
                        <textarea className="media-text" rows={2} value={it.text}
                          placeholder="Transcript / what's in this clip (optional)"
                          onChange={e => setMediaText(it.id, e.target.value)} />
                      )}
                      {it.kind === "video" && (
                        <div className="hint" aria-live="polite">
                          {it.transcribeState === "running" && <React.Fragment><span className="spinner sm dark"></span> transcribing…</React.Fragment>}
                          {it.transcribeState === "done" && `transcript ready (${(it.text ? it.text.trim().split(/\s+/).length : 0)} words) ${it.transcribeNote}`}
                          {it.transcribeState === "failed" && it.transcribeNote}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}

              <div className="group" style={{ marginTop: 10 }}>
                <label className="cap" htmlFor="f-mlink">Link (optional — becomes a QR code)</label>
                <input id="f-mlink" type="text" value={link} placeholder="https://…" onChange={e => setLink(e.target.value)} />
              </div>
              <div className="hint">Add one or many — they appear as a swipeable carousel with the routine on the right, and export as a click-through slideshow. Videos: still frames are read so the model can "see" them; small clips embed and play in <b>desktop</b> PowerPoint.</div>
            </div>
          )}

          {mode === "article" && (
            <div className="group">
              <label className="cap" htmlFor="f-pdf">Article — upload PDF or paste text</label>
              <button type="button" className="filebox" aria-label={pdfName ? `Replace PDF ${pdfName}` : "Upload a PDF"} onClick={() => pdfInput.current.click()}>
                <div className="big"><Icon d={I.doc} size={26} stroke /></div>
                <div className="small">{pdfName || "Click or press Enter to upload a PDF"}</div>
              </button>
              <input ref={pdfInput} id="f-pdf" type="file" accept="application/pdf" hidden onChange={onPdf} />

              <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                <input type="text" aria-label="Article link" value={link} placeholder="…or paste an article link (https://…)" onChange={e => setLink(e.target.value)} />
                <button type="button" className="btn ghost" style={{ width: "auto", padding: "9px 12px", whiteSpace: "nowrap" }} disabled={fetchingArticle} onClick={fetchArticleFromLink}>
                  {fetchingArticle ? "Fetching…" : "Fetch text"}
                </button>
              </div>

              <textarea style={{ marginTop: 8 }} aria-label="Article text" value={articleText} placeholder="…the fetched or pasted article text appears here (edit freely)" onChange={e => setArticleText(e.target.value)} />
              <div className="hint"><b>Fetch text</b> pulls the article via a public reader service — works for open news sites (the link also becomes the QR code). Hard paywalls may fail; upload the PDF or paste the text instead.</div>
            </div>
          )}

          {/* SharePoint folders — shown in BOTH modes so an article deck can still be
              saved to the Lessons library (these used to be trapped in media mode). */}
          {fsSupported && (
            <div className="group">
              <label className="cap">SharePoint folders</label>
              <div className="link-import" style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {!folderHandle ? (
                  <button type="button" className="btn ghost" style={{ width: "auto" }} onClick={connectMediaFolder}>Connect SharePoint Media folder</button>
                ) : folderReady ? (
                  <div className="hint">✓ Media folder ready: <b>{folderName}</b> — videos auto-upload &amp; embed.</div>
                ) : (
                  <div className="hint">
                    Media folder <b>{folderName}</b> remembered — click{" "}
                    <button type="button" className="btn ghost" style={{ width: "auto", padding: "4px 10px" }} onClick={connectMediaFolder}>Reconnect</button>{" "}
                    to re-enable this session.
                  </div>
                )}
                {folderHandle && <button type="button" className="btn ghost" style={{ width: "auto", padding: "9px 12px" }} onClick={async () => { await idbDeleteHandle("media"); setFolderHandle(null); setFolderName(""); setFolderReady(false); setMediaNote("Disconnected the SharePoint Media folder from this browser."); }}>Disconnect</button>}
                {!lessonsHandle ? (
                  <button type="button" className="btn ghost" style={{ width: "auto" }} onClick={connectLessonsFolder}>Connect Lessons folder</button>
                ) : lessonsReady ? (
                  <div className="hint">✓ Lessons folder ready: <b>{lessonsName}</b> — for saving finished decks.</div>
                ) : (
                  <div className="hint">
                    Lessons folder <b>{lessonsName}</b> remembered — click{" "}
                    <button type="button" className="btn ghost" style={{ width: "auto", padding: "4px 10px" }} onClick={connectLessonsFolder}>Reconnect</button>{" "}
                    to re-enable this session.
                  </div>
                )}
                {lessonsHandle && <button type="button" className="btn ghost" style={{ width: "auto", padding: "9px 12px" }} onClick={async () => { await idbDeleteHandle("lessons"); setLessonsHandle(null); setLessonsName(""); setLessonsReady(false); setMediaNote("Disconnected the Lessons folder from this browser."); }}>Disconnect</button>}
              </div>
            </div>
          )}

          <div className="group">
            <label className="cap" htmlFor="f-title">Title (optional)</label>
            <input id="f-title" type="text" value={title} placeholder="Leave blank to auto-generate" onChange={e => setTitle(e.target.value)} />
          </div>

          <div className="group">
            <label className="cap">Band &amp; year <span style={{ fontWeight: 500, textTransform: "none", letterSpacing: 0, color: "var(--muted)" }}>· tick one or more</span></label>
            <div className="band-multi">
              {BAND_ORDER.map(b => {
                const on = bands.includes(b);
                return (
                  <div key={b} className={"band-opt" + (on ? " on" : "")}>
                    <label className="band-check">
                      <input type="checkbox" checked={on} onChange={() => { toggleBand(b); setRoutineChoice(""); }} />
                      <span className={"band-dot band-" + b.toLowerCase()}></span>
                      {bandLabelOf(b)}
                    </label>
                    {on && (
                      <select aria-label={"Year level for " + bandLabelOf(b)} value={years[b] || ""} onChange={e => setBandYear(b, e.target.value)}>
                        <option value="">Whole band</option>
                        {BANDS[b].years.map(y => <option key={y} value={y}>{y}</option>)}
                      </select>
                    )}
                  </div>
                );
              })}
            </div>
            {bands.length > 1 && (
              <label className="band-check" style={{ marginTop: 10 }}>
                <input type="checkbox" checked={combine} onChange={() => setCombine(c => !c)} />
                <span>Combine into <b>one shared deck</b> for {comboBandLabel(BAND_ORDER.filter(b => bands.includes(b)))}</span>
              </label>
            )}
            {bands.length > 1 && (
              <div className="hint">{combine
                ? "One deck, shared language (pitched to the youngest band) — saved as a single file tagged with every selected band."
                : "Off = a separate deck per band. Tick to make one deck that fits them all."}</div>
            )}
          </div>

          <div className="group">
            <div className="theme-head">
              <label className="cap" htmlFor="f-theme">Focus theme</label>
              <button type="button" className="theme-edit-toggle" onClick={() => { setEditThemes(v => !v); setThemeMsg(""); setNewTheme(""); }}>
                {editThemes ? "Done" : "Edit themes"}
              </button>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <input id="f-theme" type="text" value={theme} placeholder="Type a theme, tap a preset, or Suggest" onChange={e => setTheme(e.target.value)} />
              <button type="button" className="btn ghost" style={{ width: "auto", padding: "9px 12px", whiteSpace: "nowrap" }} disabled={suggestingTheme || !inputReady()} title="Suggest a theme from your stimulus" onClick={suggestTheme}>
                {suggestingTheme ? <React.Fragment><span className="spinner" style={{ borderTopColor: "var(--accent)", borderColor: "var(--accent-soft)" }}></span> Suggesting…</React.Fragment> : "Suggest"}
              </button>
            </div>
            <div className="theme-picks">
              {themeList.map((t, i) => (
                <span key={t} className={"pick-wrap" + (editThemes ? " editing" : "")}>
                  <button type="button" className={"pick tint-" + (i % 5) + (theme === t ? " on" : "")} onClick={() => setTheme(t)}>{t}</button>
                  {editThemes && <button type="button" className="pick-x" aria-label={"Remove theme: " + t} title={"Remove " + t} onClick={() => removeTheme(t)}>×</button>}
                </span>
              ))}
              {editThemes && (
                <span className="theme-add">
                  <input type="text" value={newTheme} placeholder="New theme…" onChange={e => setNewTheme(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); addTheme(); } }} />
                  <button type="button" className="btn ghost" onClick={addTheme}>Add</button>
                </span>
              )}
            </div>
            {editThemes && <div className="hint">Themes are shared with teachers who connect a SharePoint folder.</div>}
            {themeMsg && <div className="hint" style={{ color: "var(--bad-ink)" }}>{themeMsg}</div>}
            <div className="hint">Type any theme, tap a preset above, or <b>Suggest</b> one from your stimulus.</div>
          </div>

          <button className="btn primary" ref={genBtnRef} disabled={loading || !!regenSlide} aria-busy={loading} onClick={generate}>
            {loading ? <React.Fragment><ProgressRing value={genProgress} /> Generating… {Math.round(genProgress)}%</React.Fragment>
              : spot ? <React.Fragment><Icon d={I.refresh} size={16} stroke /> Regenerate</React.Fragment>
              : <React.Fragment><Icon d={I.generate} size={16} /> Generate Spotlight</React.Fragment>}
          </button>

          {genStatus && <div className="hint">{genStatus}</div>}

          {/* Screen-reader-only live status: announces the generation lifecycle (the
              visible cue is the button text/spinner; errors are announced via role=alert). */}
          <div className="sr-only" role="status" aria-live="polite">
            {loading ? "Generating your Spotlight, this may take a moment."
              : regenSlide ? "Regenerating that section, please wait."
              : (spot && !error) ? "Your Spotlight is ready below."
              : ""}
          </div>

          {error && <div className="alert bad" role="alert"><b>Something went wrong.</b><pre>{error}</pre>{rawDump && <React.Fragment><b>Raw model output:</b><pre>{rawDump}</pre></React.Fragment>}</div>}
        </div>

        {/* ----------------- PREVIEW PANEL ----------------- */}
        <div>
          {!spot && !loading && (
            <div className="panel"><div className="empty">
              <div className="big" aria-hidden="true"><Icon d={I.generate} size={46} /></div>
              <h2 style={{ margin: "0 0 6px", fontFamily: "var(--font-display)" }}>Your Spotlight preview appears here</h2>
              <p>Add a stimulus on the left and hit <b>Generate</b>. Every field below will be editable before you download.</p>
            </div></div>
          )}

          {spot && (
            <React.Fragment>
              {Object.keys(spots).length > 1 && (
                <div className="band-tabs" role="tablist" aria-label="Band decks">
                  {BAND_ORDER.filter(b => spots[b]).map(b => (
                    <button key={b} role="tab" aria-selected={activeBand === b}
                      className={"band-tab" + (activeBand === b ? " on" : "")}
                      onClick={() => setActiveBand(b)}>
                      <span className={"band-dot band-" + b.toLowerCase()}></span>{bandLabelOf(b)}
                    </button>
                  ))}
                </div>
              )}
              {stimulusStale && <div className="alert info" role="status">You changed the stimulus. Hit <b>Regenerate</b> so the slides match.</div>}
              <div className="toolbar">
                <button type="button" className="btn ghost" disabled={loading} onClick={generate}><Icon d={I.refresh} size={16} stroke /> Regenerate</button>
                <button type="button" className="btn primary" disabled={exporting} onClick={download}><Icon d={I.download} size={16} stroke /> {exporting ? "Preparing…" : "Download PowerPoint"}</button>
                {fsSupported && lessonsHandle && (
                  <button type="button" className="btn ghost" disabled={saving} onClick={saveLessonToSharePoint} title="Save this lesson's .pptx to the SharePoint Lessons library">
                    <Icon d={I.upload || I.download} size={16} stroke /> {saving ? "Saving…" : "Save to SharePoint Lessons"}
                  </button>
                )}
              </div>

              {/* Content advisory — AI suggests, teacher confirms; chips drive the slide's theme line */}
              <div className="advisory-ctl">
                <label className="advisory-check">
                  <input type="checkbox" checked={!!spot.advisoryShow}
                    onChange={e => patch({ advisoryShow: e.target.checked })} />
                  <span>Add content advisory slide</span>
                </label>
                {spot.contentAdvisory && spot.contentAdvisory.flag && spot.contentAdvisory.note && (
                  <div className="hint">Suggested by AI — {spot.contentAdvisory.note}</div>
                )}
                {spot.advisoryShow && (
                  <div className="advisory-chips" role="group" aria-label="Content themes to warn about">
                    {ADVISORY_ORDER.map(key => {
                      const on = (spot.advisoryCats || []).includes(key);
                      return (
                        <button key={key} type="button" aria-pressed={on}
                          className={"advisory-chip" + (on ? " on" : "")}
                          onClick={() => patch({ advisoryCats: on
                            ? (spot.advisoryCats || []).filter(c => c !== key)
                            : [...(spot.advisoryCats || []), key] })}>
                          {ADVISORY_CATEGORIES[key].chip}
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>

              {/* Export-template picker + live themed cover preview */}
              <div className="design-row">
                <div className="thumb-slide">
                  <StyleCover big styleKey={design} title={spot.hook || spot.title} bandLabel={bandLabel} theme={theme} />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <label className="cap">Deck style</label>
                  <div className="hint">{ST.blurb} The Wesley crest sits on every slide — pick a look, then download.</div>
                  <div className="tpl-picks" role="radiogroup" aria-label="Deck style">
                    {STYLE_ORDER.map((key) => {
                      const s = STYLES[key];
                      return (
                        <button key={key} type="button" role="radio" aria-checked={design === key} title={s.blurb}
                          className={"tpl-swatch" + (design === key ? " on" : "")} onClick={() => setDesign(key)}>
                          <span className="tpl-cover">
                            <StyleCover styleKey={key} />
                          </span>
                          <span className="tpl-name">{s.label}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>

              <div className="slides">
                {/* Advisory — shown first in the deck when enabled */}
                {spot.advisoryShow && (
                  <div className="slide advisory-slide"><div className="bar" style={barStyle}></div><div className="body">
                    <div className="slide-head"><div className="slide-tag"><span className="n">!</span> <h2 style={{ font: "inherit", margin: 0, display: "inline" }}>Content warning</h2> <span className="aside">· shown first in the deck</span></div></div>
                    <div className="advisory-card">
                      <div className="advisory-warnhead"><span className="advisory-tri">⚠</span> CONTENT WARNING</div>
                      <div className="advisory-body">
                        <p className="advisory-line"><b>Heads up</b> — today's spotlight touches on some things that might feel heavy: <b>{advisoryThemeLine(spot.advisoryCats || [])}</b>.</p>
                        <p className="advisory-reassure">If you'd rather step out for this one, just quietly let your teacher know. That's completely okay.</p>
                      </div>
                    </div>
                  </div></div>
                )}
                {/* Slide 1 — Hook */}
                <div className="slide"><div className="bar" style={barStyle}></div><div className="body">
                  <div className="slide-head"><div className="slide-tag"><span className="n">1</span> <h2 style={{ font: "inherit", margin: 0, display: "inline" }}>Title</h2> <span className="aside">· a short, catchy headline · band &amp; theme shown here</span></div><RegenButton scope="title" /></div>
                  <textarea className="editable titlebig" rows={1} value={spot.hook} placeholder="A short, catchy title…" onChange={e => patch({ hook: e.target.value })} />
                  <div className="meta-chips">
                    <span className={"chip band-" + band.toLowerCase()}>{bandLabel}{year ? " · " + year : ""}</span>
                    <span className="chip gold">{theme}</span>
                  </div>
                </div></div>

                {/* Slide 2 — Provocation (stimulus + thinking routine on one slide) */}
                <div className="slide"><div className="bar" style={barStyle}></div><div className="body">
                  <div className="slide-head"><div className="slide-tag"><span className="n">2</span> <h2 style={{ font: "inherit", margin: 0, display: "inline" }}>Provocation</h2> <span className="aside">· stimulus + thinking routine</span></div><RegenButton scope="provocation" /></div>
                  <textarea className="editable" rows={1} aria-label="Provocation framing text" value={spot.framing} onChange={e => patch({ framing: e.target.value })} />
                  {mode !== "media" && (
                    <React.Fragment>
                      <div className="cap" style={{ marginTop: 6 }}>5-sentence summary</div>
                      <textarea className="editable" rows={5} value={spot.summary} placeholder="A 5-sentence summary for students…" onChange={e => patch({ summary: e.target.value })} />
                    </React.Fragment>
                  )}
                  {mode === "media" && media.length >= 2 && (
                    <div className="reel-wrap">
                      <MediaCarousel items={media} index={Math.min(reelIndex, media.length - 1)} setIndex={setReelIndex} />
                    </div>
                  )}
                  {mode === "media" && media.length === 1 && (
                    media[0].kind === "image"
                      ? <div className="stim-img"><img src={media[0].dataUrl} alt="Stimulus image for this Spotlight" /></div>
                      : <div className="stim-img"><img src={media[0].poster} alt={"First frame of " + media[0].name} /><span className="vbadge"><Icon d={I.play} size={20} /></span></div>
                  )}
                  {mode === "article" && articleImageUrl && (
                    <div className="stim-img" style={{ position: "relative" }}>
                      <img src={articleImageUrl} alt="Lead image from the article" />
                      <button type="button" className="iconbtn" style={{ position: "absolute", top: 6, right: 6 }} aria-label="Remove image" title="Remove image" onClick={() => setArticleImageUrl("")}><Icon d={I.close} size={14} stroke /></button>
                    </div>
                  )}
                  {mode !== "media" && link.trim() && <StimLink url={link.trim()} verb={MODE_VERB[mode]} />}
                  {mode === "article" && !link.trim() && !articleImageUrl && <div className="hint">Tip: add a link on the left for a clickable link + QR code, or fetch an article to pull in its lead image.</div>}

                  {routineBlockJsx}
                </div></div>

                {/* Slide 3 — Student key takeaway */}
                <div className="slide"><div className="bar" style={barStyle}></div><div className="body">
                  <div className="slide-head"><div className="slide-tag"><span className="n">3</span> <h2 style={{ font: "inherit", margin: 0, display: "inline" }}>Student key takeaway</h2></div><RegenButton scope="takeaway" /></div>
                  <div className="action-box" style={{ background: hx(T.accent2) + "22", borderColor: hx(T.accent2) + "66" }}>
                    <div className="cap" style={{ color: "var(--accent-2-ink)" }}>One thing to take away</div>
                    <textarea className="editable" rows={2} aria-label="Student key takeaway" value={spot.studentAction} onChange={e => patch({ studentAction: e.target.value })} />
                  </div>
                  <div className="lp-chips">
                    {spot.learnerProfile.filter(Boolean).map((lp, i) => <span key={i} className="chip">LP · {lp}</span>)}
                  </div>
                  <div className="cap" style={{ marginTop: 12 }}>Find-me keywords <span style={{ fontWeight: 500, textTransform: "none", letterSpacing: 0, color: "var(--muted)" }}>· help teachers search this lesson (hidden from students)</span></div>
                  <textarea className="editable" rows={2} aria-label="Search keywords for this lesson"
                    value={(spot.keywords || []).join(", ")}
                    onChange={e => patch({ keywords: e.target.value.split(",").map(s => s.trim().toLowerCase()).filter(Boolean) })} />
                </div></div>
              </div>
            </React.Fragment>
          )}
        </div>
      </main>
    </React.Fragment>
  );
}

/* QR preview component (synchronous, crash-proof) */
function StimLink({ url, verb }) {
  const qr = makeQrDataUrl(url);
  return (
    <div className="stim-link">
      {qr && <img className="qr" src={qr} alt="QR code" />}
      <div><div style={{ marginBottom: 4 }}>{verb} here:</div><a href={url} target="_blank" rel="noreferrer">{url}</a></div>
    </div>
  );
}

/* Error boundary so a render error shows a message instead of a blank screen */
class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(err, info) { console.error("App crashed:", err, info); }
  render() {
    if (this.state.err) {
      return (
        <div style={{ maxWidth: 720, margin: "60px auto", padding: 24, fontFamily: "var(--font-body)" }}>
          <h2 style={{ color: "var(--bad-ink)" }}>Something crashed in the app</h2>
          <p>Try a hard refresh (Ctrl+F5). If it keeps happening, send this message:</p>
          <pre style={{ whiteSpace: "pre-wrap", background: "var(--bad-bg)", color: "var(--bad-ink)", border: "1px solid var(--bad)", borderRadius: 10, padding: 12 }}>
            {String(this.state.err && (this.state.err.stack || this.state.err.message || this.state.err))}
          </pre>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
