<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- Lock script loading to the known CDNs (unpkg/jsdelivr/cdnjs) + self; block injected external scripts, object embeds and base-tag hijack. connect-src/img-src stay permissive https: so the Vercel backend, r.jina.ai, images.weserv.nl and wikimedia (all https) plus blob:/data: media keep working. 'unsafe-eval' is needed by in-browser Babel, 'unsafe-inline' by the inline app + styles. -->
<meta name="referrer" content="strict-origin-when-cross-origin" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https:; media-src 'self' blob: data:; connect-src 'self' https:;" />
<title>Springboard</title>

<!-- React + Babel (in-browser JSX, no build step) -->
<script crossorigin="anonymous" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin="anonymous" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin="anonymous" integrity="sha384-fsMuX1qrlL2OwY1g8apML4JcSv2aYFaMXKQIjzX+OOveqSCCdmIMjwNQRoralXGe" src="https://unpkg.com/@babel/standalone@8.0.3/babel.min.js"></script>

<!-- QR codes (qrcode-generator: exposes a global `qrcode` with synchronous createDataURL) -->
<script crossorigin="anonymous" integrity="sha384-8FWZA6BGMXhsfO+BLtrJK0We6gg5o1JyO8xQm6peWDEUs17ACA5ziE/NIAkl9z2k" src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<!-- JSZip: post-process the generated .pptx to stamp custom document properties -->
<script crossorigin="anonymous" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<!-- pptxgenjs (PowerPoint export, ~155KB) and pdf.js (PDF text extraction, ~73KB) are
     heavy and only needed on user action, so they're lazy-loaded on demand via
     loadScript() below — keeping ~228KB off the initial render path. -->


<style>
  /* Wesley primary typeface — Graphik (self-hosted from ./fonts/). Available weights are
     Regular (400), Medium (500) and Semibold (600); the app's 700/800 headings map onto
     Semibold via the 600–800 range so the whole UI stays in the Graphik family rather than
     mixing in the fallback. If the files are missing the stack degrades to Segoe UI. */
  @font-face { font-family: "Graphik"; font-weight: 400;     font-style: normal; font-display: swap; src: url("fonts/Graphik-Regular.woff2") format("woff2"); }
  @font-face { font-family: "Graphik"; font-weight: 400;     font-style: italic; font-display: swap; src: url("fonts/Graphik-RegularItalic.woff2") format("woff2"); }
  @font-face { font-family: "Graphik"; font-weight: 500;     font-style: normal; font-display: swap; src: url("fonts/Graphik-Medium.woff2") format("woff2"); }
  @font-face { font-family: "Graphik"; font-weight: 500;     font-style: italic; font-display: swap; src: url("fonts/Graphik-MediumItalic.woff2") format("woff2"); }
  @font-face { font-family: "Graphik"; font-weight: 600 800; font-style: normal; font-display: swap; src: url("fonts/Graphik-Semibold.woff2") format("woff2"); }
  @font-face { font-family: "Graphik"; font-weight: 600 800; font-style: italic; font-display: swap; src: url("fonts/Graphik-SemiboldItalic.woff2") format("woff2"); }

  /* Secondary brand typeface — Avenir Black, for large DISPLAY headlines only (Wesley hierarchy:
     Graphik primary, Avenir Black secondary, Arial tertiary). Self-hosted from ./fonts/.
     DISABLED until the font file is added: the woff2 was never shipped, so an enabled @font-face
     just 404s on every load. --font-display already falls back to Graphik then Arial, so display
     headings look identical. To enable: drop fonts/Avenir-Black.woff2 in and uncomment below. */
  /* @font-face { font-family: "Avenir Black"; font-weight: 400 900; font-style: normal; font-display: swap; src: url("fonts/Avenir-Black.woff2") format("woff2"); } */

  :root {
    /* Neutrals */
    --ink: #2b2536;
    --muted: #574f63;         /* darkened for AA at small sizes */
    --line: #e7e1ef;
    --bg: #f6f2fb;
    --panel: #ffffff;
    --beige: #e6e2dd;         /* Wesley neutral (calm wash) */

    /* Wesley purple family — the dominant, interactive voice */
    --accent: #4f2759;        /* Wesley Purple (canonical brand) */
    --accent-deep: #3d1d45;   /* hover / pressed purple */
    --accent-soft: #e9deeb;   /* Wesley Light Purple — chips, focus glow, tints */
    --purple-grey: #cec3cf;   /* Wesley Grey Purple — inactive borders/dividers */
    --wash: #f4eef8;          /* faint purple surface wash (hover / notes) */

    /* Wesley gold — rare emphasis */
    --accent-2: #c59f40;      /* Wesley Gold (secondary) */
    --accent-2-ink: #6a5018;  /* readable gold for text on light (AA on gold-soft) */
    --gold-soft: #e4d1a1;     /* Wesley Light Gold — emphasis wash */

    /* Semantic states — Wesley Interface "traffic-light" + Highlighter bg + AA-verified ink */
    --good: #58c337; --good-bg: #cfe9d3; --good-ink: #4d5142;
    --warn: #f0a54f; --warn-bg: #ffdab5; --warn-ink: #8a4b12;
    --bad:  #e83534; --bad-bg:  #fdafbd; --bad-ink:  #8f1d2e;
    --info: #7ca3ff; --info-bg: #cbdaff; --info-ink: #4242a1;

    /* Band identity — Wesley Secondary spectrum, categorical (never interactive) */
    --band-pyp: #7ca3ff; --band-pyp-bg: #cbdaff; --band-pyp-ink: #4242a1;
    --band-myp: #86c791; --band-myp-bg: #cfe9d3; --band-myp-ink: #636656;
    --band-middle: #86c791; --band-middle-bg: #cfe9d3; --band-middle-ink: #636656;
    --band-senior: #dfab57; --band-senior-bg: #ffedbc; --band-senior-ink: #7a5012;

    /* Typography — Wesley three-tier: Graphik primary, Avenir Black secondary (display
       headlines only), Arial tertiary fallback. */
    --font-body: "Graphik", Arial, sans-serif;
    --font-display: "Avenir Black", "Graphik", Arial, sans-serif;

    --radius: 14px;
    --shadow: 0 6px 24px rgba(60,40,90,.10);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-body);
    color: var(--ink);
    background: linear-gradient(160deg, #f6f2fb 0%, #ffffff 100%);
    min-height: 100vh;
  }
  header.app {
    padding: 18px 26px;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,.7);
    backdrop-filter: blur(6px);
    position: sticky; top: 0; z-index: 5;
  }
  header.app .logo {
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--accent);
    display: grid; place-items: center; color: #fff;
    box-shadow: var(--shadow);
  }
  header.app .logo svg { width: 22px; height: 22px; }
  header.app h1 { font-size: 19px; margin: 0; }
  header.app .admin-link { align-self: center; font-size: 12px; font-weight: 600; color: #4F2759; text-decoration: none; border: 1px solid var(--line); border-radius: 999px; padding: 5px 12px; white-space: nowrap; transition: background .15s; }
  header.app .admin-link:first-of-type { margin-left: auto; } /* push nav group right; keep both tabs together */
  header.app .admin-link:hover, header.app .admin-link:focus-visible { background: rgba(79,39,89,.07); }
  /* Admin analytics = quiet icon-only button; must not compete with the "How it works" pill. */
  header.app .admin-icon { align-self: center; display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; padding: 0; border: 1px solid transparent; border-radius: 999px; background: transparent; color: var(--muted); cursor: pointer; transition: background .15s, color .15s; }
  header.app .admin-icon:hover, header.app .admin-icon:focus-visible { background: rgba(79,39,89,.07); color: var(--accent); }

  /* Admin password popup */
  .modal-backdrop { position: fixed; inset: 0; z-index: 50; display: grid; place-items: center; padding: 20px; background: rgba(43,37,54,.45); }
  .modal { width: 100%; max-width: 380px; padding: 20px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 20px 60px rgba(60,40,90,.28); }
  .modal-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
  .modal-head h2 { margin: 0; font-size: 16px; }
  .modal-sub { margin: 0 0 14px; font-size: 13px; color: var(--muted); }
  .modal input[type=password] { margin-bottom: 12px; }
  .modal-err { margin: 0 0 12px; padding: 8px 10px; font-size: 12.5px; color: var(--bad-ink); background: var(--bad-bg); border: 1px solid var(--bad); border-radius: 10px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
  .modal-actions .btn { width: auto; }
  header.app .appver { margin-left: 10px; align-self: center; font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; letter-spacing: .02em; }
  header.app p { margin: 2px 0 0; font-size: 12.5px; color: var(--muted); }

  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 22px;
    padding: 22px 26px 60px;
    max-width: 1500px; margin: 0 auto;
  }
  @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .panel.input { padding: 18px; align-self: start; position: sticky; top: 88px; }
  @media (max-width: 980px) { .panel.input { position: static; } }

  .group { margin-bottom: 16px; }
  .group > label.cap {
    display: block; font-size: 11.5px; letter-spacing: .04em; text-transform: uppercase;
    color: var(--muted); font-weight: 700; margin-bottom: 6px;
  }
  /* Class settings panel (curriculum/subject/year/outcome) — same field rhythm as .group. */
  .field-row { margin-bottom: 12px; }
  .field-row label {
    display: block; font-size: 11.5px; letter-spacing: .04em; text-transform: uppercase;
    color: var(--muted); font-weight: 700; margin-bottom: 6px;
  }
  input[type=text], input[type=password], textarea, select {
    width: 100%; padding: 9px 11px; border: 1px solid var(--line); border-radius: 10px;
    font: inherit; color: var(--ink); background: #fff; outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  input::placeholder, textarea::placeholder { color: var(--muted); opacity: 1; }
  textarea { resize: vertical; min-height: 88px; line-height: 1.45; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.4; }

  .modes { display: flex; gap: 6px; background: var(--bg); padding: 5px; border-radius: 12px; }
  .modes button {
    flex: 1; padding: 9px 6px; border: 0; border-radius: 10px; background: transparent;
    font: inherit; font-weight: 600; color: var(--muted); cursor: pointer; transition: .15s;
  }
  .modes button.active { background: #fff; color: var(--accent); box-shadow: var(--shadow); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .filebox {
    width: 100%; display: block; font: inherit; color: inherit;
    border: 1.5px dashed var(--line); border-radius: 12px; padding: 14px; text-align: center;
    background: var(--bg); cursor: pointer; transition: .15s;
  }
  .filebox:hover { border-color: var(--accent); background: var(--accent-soft); }
  .filebox .big { font-size: 26px; }
  .filebox .small { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .thumb { max-width: 100%; max-height: 160px; border-radius: 10px; margin-top: 8px; box-shadow: var(--shadow); }
  .media-strip { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
  .media-thumb { width: 120px; border: 1px solid var(--line); border-radius: 10px; padding: 6px; background: #fff; position: relative; }
  .media-thumb > img { width: 100%; height: 70px; object-fit: contain; border-radius: 6px; background: var(--wash); }
  .media-thumb .vtag { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,.55); color: #fff; border-radius: 6px; padding: 1px 4px; display: inline-flex; }
  .media-thumb-tools { display: flex; align-items: center; gap: 2px; margin-top: 4px; }
  .media-thumb-tools .ord { font-size: 11px; color: var(--muted); min-width: 14px; text-align: center; }
  .media-thumb-tools .iconbtn { flex: 0 0 auto; }
  .media-thumb-tools .iconbtn:disabled { opacity: .35; cursor: not-allowed; }
  .media-text { width: 100%; margin-top: 4px; font: inherit; font-size: 11px; resize: vertical; border: 1px solid var(--line); border-radius: 6px; padding: 4px; }

  .btn {
    width: 100%; padding: 12px; border: 0; border-radius: 12px; font: inherit; font-weight: 700;
    cursor: pointer; transition: .15s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn.primary { background: var(--accent); color: #fff; box-shadow: var(--shadow); }
  .btn.primary:hover { background: var(--accent-deep); }
  .btn.primary:disabled { opacity: .55; cursor: not-allowed; }
  .btn.ghost { background: #fff; border: 1px solid var(--line); color: var(--ink); }
  .btn.ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn.ghost:disabled { opacity: .5; cursor: not-allowed; }
  .btn:focus-visible, .iconbtn:focus-visible, .addbtn:focus-visible,
  .modes button:focus-visible, .filebox:focus-visible {
    /* Solid high-contrast ring (accent ~11.9:1 on light) — the old --accent-soft glow was ~1.3:1,
       failing WCAG 2.4.11 Focus Appearance. Matches the .notes-details summary treatment. */
    outline: 2px solid var(--accent); outline-offset: 2px; box-shadow: var(--shadow);
  }

  .alert { padding: 11px 13px; border-radius: 10px; font-size: 13px; margin-top: 12px; line-height: 1.45; }
  .alert.bad { background: var(--bad-bg); color: var(--bad-ink); border: 1px solid var(--bad); }
  .alert.info { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--purple-grey); }
  .alert pre { white-space: pre-wrap; word-break: break-word; margin: 6px 0 0; font-size: 11.5px; }

  /* Preview slides */
  .slides { display: flex; flex-direction: column; gap: 18px; }
  .slide {
    background: #fff; border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
  }
  .slide .bar { height: 6px; background: var(--accent); }
  .slide .body { padding: 18px 20px; }
  /* Functional slide wayfinding label (replaces the retired uppercase .kicker eyebrow).
     The 3 preview slides are a real ordered sequence, so a small numbered badge earns its place. */
  .slide-tag { display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 600; color: var(--ink); margin-bottom: 2px; flex-wrap: wrap; }
  .slide-tag .n { flex: 0 0 auto; display: grid; place-items: center; width: 18px; height: 18px; border-radius: 6px; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; }
  .slide-tag .aside { color: var(--muted); font-weight: 400; }
  .slide-head { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
  .slide-head .slide-tag { margin-bottom: 0; }
  .regen { margin-left: auto; flex: 0 0 auto; display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--line); background: #fff; color: var(--accent); border-radius: 999px; padding: 4px 11px; font: inherit; font-size: 12px; font-weight: 600; cursor: pointer; transition: .15s; white-space: nowrap; }
  .regen:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-soft); }
  .regen:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .regen:disabled { opacity: .5; cursor: not-allowed; }
  .routine-pick { margin: 6px 0 8px; }
  .routine-pick select { width: auto; min-width: 240px; max-width: 100%; }

  /* Analyse step: recommended routine cards + "browse all" disclosure */
  .routine-cards { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .routine-card { border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; background: var(--panel); }
  .routine-card.on { border-color: var(--accent); background: var(--wash); }
  .routine-card-pick { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13.5px; cursor: pointer; }
  .routine-card-pick input { width: 16px; height: 16px; flex: 0 0 auto; }
  .routine-card-why { margin: 6px 0 4px; font-size: 12.5px; color: var(--muted); line-height: 1.4; }
  .routine-card-link { font-size: 12px; font-weight: 600; color: var(--accent); }
  .routine-card-link:hover { text-decoration: underline; }
  .routine-browse { margin-top: 10px; font-size: 13px; }
  .routine-browse summary { cursor: pointer; font-weight: 600; color: var(--accent); }
  .routine-browse summary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .routine-browse-group { margin: 8px 0; }
  .routine-browse-heading { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); font-weight: 700; margin-bottom: 4px; }
  .routine-browse-item { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 12.5px; cursor: pointer; }
  .routine-browse-item input { width: 14px; height: 14px; }
  .slide h3 { margin: 4px 0 2px; font-size: 16px; }
  .editable {
    border: 1px solid transparent; border-radius: 8px; padding: 6px 8px; margin: -2px -8px 6px;
    width: calc(100% + 16px); font: inherit; color: var(--ink); background: transparent; display: block;
  }
  .editable:hover { background: var(--wash); }
  .editable:focus { background: #fff; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); outline: none; }
  textarea.editable { resize: vertical; line-height: 1.5; }
  .titlebig { font-size: 22px; font-weight: 800; font-family: var(--font-display); }
  .meta-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
  .chip { background: var(--accent-soft); color: var(--accent); padding: 4px 11px; border-radius: 999px; font-size: 12.5px; font-weight: 600; }
  .chip.gold { background: var(--gold-soft); color: var(--accent-2-ink); }
  /* Band identity — categorical, never an interactive cue */
  .chip.band-pyp    { background: var(--band-pyp-bg);    color: var(--band-pyp-ink); }
  .chip.band-myp    { background: var(--band-myp-bg);    color: var(--band-myp-ink); }
  .chip.band-middle { background: var(--band-middle-bg); color: var(--band-middle-ink); }
  .chip.band-senior { background: var(--band-senior-bg); color: var(--band-senior-ink); }
  .advisory-ctl { margin: 10px 0; }
  .advisory-check { display: inline-flex; align-items: center; gap: 8px; font-weight: 600; cursor: pointer; }
  .advisory-check input { width: 16px; height: 16px; }
  /* Springboard preview: toggle rows, collapsible teacher notes, numbered prompt lists */
  .toggle-row { display: inline-flex; align-items: center; gap: 8px; font-weight: 600; font-size: 13.5px; cursor: pointer; }
  .toggle-row input { width: 16px; height: 16px; flex: 0 0 auto; }
  .reflect-body.dimmed { opacity: .45; pointer-events: none; }
  .notes-details { margin-top: 12px; border-top: 1px dashed var(--line); padding-top: 8px; }
  .notes-details > summary { cursor: pointer; font-weight: 700; font-size: 12px; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); list-style: none; display: inline-flex; align-items: center; gap: 6px; }
  .notes-details > summary::before { content: "▸"; font-size: 11px; transition: transform .15s; }
  .notes-details[open] > summary::before { transform: rotate(90deg); }
  .notes-details > summary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  .routine-name-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 6px 0 2px; }
  .routine-name-row .chip { font-weight: 700; }
  .rp-num { flex: 0 0 auto; display: grid; place-items: center; width: 22px; height: 22px; border-radius: 6px; font-size: 12px; font-weight: 700; margin-top: 4px; }
  .advisory-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .advisory-chip { border: 1px solid var(--line, #E7E1EF); background: transparent; color: inherit;
    border-radius: 999px; padding: 5px 12px; font-size: 13px; cursor: pointer; }
  .advisory-chip.on { background: var(--accent, #4F2759); color: #fff; border-color: var(--accent, #4F2759); }
  .advisory-chip:focus-visible { outline: 2px solid var(--accent, #4F2759); outline-offset: 2px; }
  @media (prefers-reduced-motion: no-preference) { .advisory-chip { transition: background .15s, color .15s; } }
  .advisory-card { background: #2B281F; color: #FFFFFF; border-radius: 12px; overflow: hidden; }
  .advisory-warnhead { background: #F0A54F; color: #2B281F; font-weight: 800; font-size: 18px; letter-spacing: .08em; padding: 11px 22px; display: flex; align-items: center; gap: 9px; }
  .advisory-tri { font-size: 20px; line-height: 1; }
  .advisory-body { padding: 16px 22px 18px; }
  .advisory-line { font-size: 16px; margin: 0 0 10px; }
  .advisory-reassure { font-size: 14px; font-style: italic; opacity: .92; margin: 0; }
  .band-dot { display: inline-block; width: 8px; height: 8px; border-radius: 999px; margin-right: 5px; vertical-align: middle; }
  .band-dot.band-pyp    { background: var(--band-pyp); }
  .band-dot.band-myp    { background: var(--band-myp); }
  .band-dot.band-middle { background: var(--band-middle); }
  .band-dot.band-senior { background: var(--band-senior); }
  /* Band deck tabs — switch the previewed/edited deck when several bands generated */
  .band-tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }

  { steps: ["SEE: Notice as much as you can.","WONDER: What questions do you have?","CONNECT: How does this link to school subjects?","CONNECT again: How does this link to your own interests?"], structure: "Whole class, quiet look then two connect rounds", name: "See Wonder Connect x2", url: "https://pz.harvard.edu/resources/see-wonder-connect-x2",
    gist: "A looped routine combining seeing, wondering, and connecting.",
    bands: ["younger", "middle", "senior"], group: "Core observation and inquiry" },
  { steps: ["What do you think you know about this topic?","What questions or puzzles do you have?","How might you explore your puzzles?"], structure: "Individual write, then share, revisit later", name: "Think, Puzzle, Explore", url: "https://pz.harvard.edu/resources/think-puzzle-explore",
    gist: "Activate prior knowledge, surface puzzles, plan exploration.",
    bands: ["younger", "middle", "senior"], group: "Core observation and inquiry" },
  { steps: ["Look quietly for 30 seconds.","List 10 words or phrases about what you see.","Look again and add 10 more."], structure: "Individual, two timed rounds", name: "Looking: Ten Times Two", url: "https://pz.harvard.edu/resources/looking-ten-times-two",

    bands: ["younger"], group: "Core observation and inquiry" },

    gist: "The listening version of Ten Times Two, for music and sound.",
    bands: ["younger", "middle", "senior"], group: "Core observation and inquiry" },
  { steps: ["Pick a section and describe exactly what you see.","Add more detail to what was just said.","Keep building, one more detail each turn.","Move to a new section and repeat."], structure: "Small group, taking turns", name: "The Elaboration Game", url: "https://pz.harvard.edu/resources/elaboration-game",

  { steps: ["STOP: State your claim or question clearly.","LOOK: Brainstorm where you could find sources.","LISTEN: Check each source. Could it be biased?"], structure: "Whole class, chart tracks bias across sources", name: "Stop, Look, Listen", url: "https://pz.harvard.edu/resources/stop-look-listen",

  { steps: ["Jot your first impression of each image.","How is this like the topic?","How is this not like the topic?","What new ideas does this image give you?"], structure: "Whole class or small group, multiple images", name: "Thinking with Images", url: "https://pz.harvard.edu/resources/thinking-images",

  // --- Activating, connecting, and reflecting on learning ---
  { steps: ["Before: write 3 thoughts, 2 questions, 1 metaphor.","Take part in the learning experience.","After: write 3 thoughts, 2 questions, 1 metaphor again.","Bridge: how do your new ideas connect to your first ones?"], structure: "Individual, before and after learning", name: "3-2-1 Bridge", url: "https://pz.harvard.edu/resources/3-2-1-bridge",
    gist: "Capture 3 thoughts, 2 questions, 1 metaphor before and after learning, then bridge the two.",
    bands: ["younger", "middle", "senior"], group: "Activating, connecting, and reflecting on learning" },
  { steps: ["Connect: how does this link to what you already know?","Extend: what new ideas pushed your thinking further?","Challenge: what's still puzzling you?"], structure: "Whole class, small group, or individual wrap-up", name: "Connect, Extend, Challenge", url: "https://pz.harvard.edu/resources/connect-extend-challenge",
    gist: "Connect new ideas to prior knowledge, note how they extend thinking, flag what's still challenging.",
    bands: ["middle"], group: "Activating, connecting, and reflecting on learning" },
  { steps: ["Write: 'I used to think...'","Think about how your ideas have changed.","Write: 'Now I think...'","Share and explain why your thinking shifted."], structure: "Whole class first, then pairs", name: "I Used to Think... Now I Think...", url: "https://pz.harvard.edu/resources/i-used-think-now-i-think",
    gist: "Articulate how and why your thinking has changed.",
    bands: ["younger"], group: "Activating, connecting, and reflecting on learning" },
  { steps: ["Think about the question on your own.","Pair up and share your thinking.","Listen and ask your partner a clarifying question.","Share your thinking with the whole group."], structure: "Individual, then pairs, then whole class", name: "Think, Pair, Share", url: "https://pz.harvard.edu/resources/think-pair-share",
    gist: "Think individually, discuss with a partner, then share with the group.",
    bands: ["younger", "middle"], group: "Activating, connecting, and reflecting on learning" },
  { steps: ["Silently write your ideas and questions on the paper.","Move around and read what others wrote.","Add your own comments or questions to their writing.","Return to your paper and discuss what emerged."], structure: "Silent writing on chart paper, then rotate", name: "Chalk Talk", url: "https://pz.harvard.edu/resources/chalk-talk",
    gist: "A silent written conversation: respond to a prompt and to each other's comments on paper.",
    bands: ["younger", "middle", "senior"], group: "Activating, connecting, and reflecting on learning" },
  { steps: ["E: What excites you about this idea?","W: What worries you about it?","N: What do you still need to know?","S: What's your stance or suggestion?"], structure: "Whole-class discussion, then individual stance", name: "Compass Points", url: "https://pz.harvard.edu/resources/compass-points",
    gist: "Explore a proposition via excitements, worries, needs, and stance before judging it.",
    bands: ["middle", "senior"], group: "Activating, connecting, and reflecting on learning" },
  { steps: ["Reflect: what stood out to you, and why does it matter?","Connect: how does this link to other learning?","Project: how might you use this differently next time?"], structure: "Individually or with peers, ongoing habit", name: "Reflect, Connect, Project", url: "https://pz.harvard.edu/resources/reflect-connect-project",
    gist: "Reflect on an experience, connect it to prior knowledge, project forward to implications.",
    bands: ["younger", "middle", "senior"], group: "Activating, connecting, and reflecting on learning" },
  { steps: ["Take three deep breaths.","Notice what's on your mind and write or draw it.","Set aside what you don't need right now.","Keep at the center what will help you learn today."], structure: "Calm individual routine, start of lesson", name: "Creating Space for Learning", url: "https://pz.harvard.edu/resources/creating-space-for-learning",
    gist: "Focuses on the conditions and environment that support learning.",
    bands: ["younger", "middle", "senior"], group: "Activating, connecting, and reflecting on learning" },

  // --- Synthesizing and organizing ideas ---
  { steps: ["Write a headline capturing the most important part.","Share your headline with a neighbor.","Whose headline captured the core of things really well?"], structure: "Individual then pair, end of class/unit", name: "Headlines", url: "https://pz.harvard.edu/resources/headlines",
    gist: "Write a newspaper-style headline capturing the essence of a topic, discussion, or event.",
    bands: ["younger", "middle"], group: "Synthesizing and organizing ideas" },
  { steps: ["Choose a color that captures a key idea.","Choose a symbol for another key idea.","Choose an image for a third key idea.","Share your color, symbol, and image and explain why."], structure: "Individual choice, then round-robin group share", name: "Color, Symbol, Image", url: "https://pz.harvard.edu/resources/color-symbol-image",
    gist: "Distill an idea non-verbally by choosing a color, a symbol, and an image.",
    bands: ["younger", "middle", "senior"], group: "Synthesizing and organizing ideas" },
  { steps: ["Pick a word that struck you as powerful.","Pick a phrase that moved or provoked you.","Pick a sentence that captures the core idea.","Share in rounds: word, then phrase, then sentence."], structure: "Individual, then small-group rounds", name: "Word-Phrase-Sentence", url: "https://pz.harvard.edu/resources/word-phrase-sentence",
    gist: "Capture a text's essence in one word, one phrase, and one resonant sentence.",
    bands: ["middle", "senior"], group: "Synthesizing and organizing ideas" },
  { steps: ["Generate a list of ideas about the topic.","Sort ideas from central to tangential.","Connect related ideas with lines and explain why.","Elaborate by adding new ideas."], structure: "Concept map, individual or over time", name: "Generate-Sort-Connect-Elaborate", url: "https://pz.harvard.edu/resources/generate-sort-connect-elaborate",
    gist: "A concept-mapping routine: generate ideas, sort them, connect them, elaborate.",
    bands: ["younger", "middle", "senior"], group: "Synthesizing and organizing ideas" },
  { steps: ["Connections: how does this link to your life or learning?","Challenge: what do you want to argue with?","Concepts: what key ideas are worth holding on to?","Changes: what changes in thinking or action does this suggest?"], structure: "Small group, round-robin one C at a time", name: "The 4 Cs", url: "https://pz.harvard.edu/resources/4-cs",
    gist: "A text-discussion routine built around connections, challenges, key concepts, and changes.",
    bands: ["younger", "middle", "senior"], group: "Synthesizing and organizing ideas" },
  { steps: ["Stay fully present, don't take notes yet.","Jot down one point: important, puzzling, or a question.","Share your note with a small group."], structure: "Index card, end-of-class exit ticket", name: "Take Note", url: "https://pz.harvard.edu/resources/take-note",
    gist: "A quick synthesis routine capturing the most important, puzzling, or question-worthy points.",
    bands: ["younger", "middle", "senior"], group: "Synthesizing and organizing ideas" },
  { steps: ["Recall: list key ideas from memory.","Pass your list and add one new idea to someone else's.","Review all the additions to your own list."], structure: "Individual, then pass papers twice", name: "+1 Routine", url: "https://pz.harvard.edu/resources/1-routine",
    gist: "A memory-and-consolidation routine: recall ideas and successively add to each other's notes.",
    bands: ["younger", "middle", "senior"], group: "Synthesizing and organizing ideas" },
  { steps: ["Get familiar with the 'skin' of the topic.","Hunt for puzzles and mysteries under the skin.","Pursue a puzzle toward a deeper understanding."], structure: "Ongoing map across a multi-lesson topic", name: "Peel the Fruit", url: "https://pz.harvard.edu/resources/peel-fruit",
    gist: "A map for deep understanding, moving from surface features toward the core.",
    bands: ["younger", "middle", "senior"], group: "Synthesizing and organizing ideas" },
  { steps: ["Look at the artwork closely.","Imagine: is this the beginning, middle, or end of a story?","Share your story and look for patterns and meaning."], structure: "Individual or pair, writing/storytelling prompt", name: "Beginning, Middle, End", url: "https://pz.harvard.edu/resources/beginning-middle-end",
    gist: "Use an image or object as a story's beginning, middle, or end to spark narrative thinking.",
    bands: ["younger", "middle", "senior"], group: "Synthesizing and organizing ideas" },
  { steps: ["What is the story being told?","What is the untold story?","What is your story?"], structure: "Whole class or small group, in order", name: "Stories", url: "https://pz.harvard.edu/resources/stories",
    gist: "Built around the stories connected to a topic or object.",
    bands: ["younger", "middle", "senior"], group: "Synthesizing and organizing ideas" },

  // --- Questioning and possibility thinking ---
  { steps: ["Brainstorm a list of questions about the topic.","Flip a question using 'What would it be like if...'","Choose one question to explore creatively.","What new ideas do you have now?"], structure: "Individual/pair brainstorm, then creative task", name: "Creative Questions", url: "https://pz.harvard.edu/resources/creative-questions",
    gist: "Brainstorm imaginative questions about a topic and select one to explore.",
    bands: ["younger", "middle", "senior"], group: "Questioning and possibility thinking" },
  { steps: ["Brainstorm at least 12 questions using the question starters.","Pick the most interesting question.","Discuss the question you chose.","What new ideas do you have now?"], structure: "Timed brainstorm, then discussion", name: "Creative Question Starts", url: "https://pz.harvard.edu/resources/creative-question-starts",
    gist: "Practice generating rich questions using open-ended question stems.",
    bands: ["younger", "middle", "senior"], group: "Questioning and possibility thinking" },
  { steps: ["What do you see or know about the topic?","Choose a comparison category.","Imagine: if this was a ______, what would it be?","Explain three ways it compares."], structure: "Individual or pair, pick a category", name: "Creative Comparisons", url: "https://pz.harvard.edu/resources/creative-comparisons",
    gist: "Explore a topic by comparing it to something seemingly unrelated.",
    bands: ["younger", "middle", "senior"], group: "Questioning and possibility thinking" },
  { steps: ["What's the main purpose here?","What are the parts and their purposes?","Which parts are especially smart or creative? Star them.","Who is the audience for this?"], structure: "Annotate the object, walk through in order", name: "Creative Hunt", url: "https://pz.harvard.edu/resources/creative-hunt",
    gist: "Hunt for creative and design features in objects or environments.",
    bands: ["younger", "middle", "senior"], group: "Questioning and possibility thinking" },
  { steps: ["In what ways could it be more effective?","In what ways could it be more efficient?","In what ways could it be more ethical?","In what ways could it be more beautiful?"], structure: "Whole class, one prompt at a time", name: "Imagine If...", url: "https://pz.harvard.edu/resources/imagine-if",
    gist: "Consider how something could be made more effective, efficient, ethical, or beautiful.",
    bands: ["senior"], group: "Questioning and possibility thinking" },
  { steps: ["How could you make it work better?","How could you make it easier or faster to use?","How could you make it fairer or safer to share?","How could you make it more beautiful?"], structure: "Verbal or drawing responses, kid-friendly", name: "Imagine If... (For Younger Children)", url: "https://pz.harvard.edu/resources/imagine-if-younger-children",
    gist: "The early-years adaptation of Imagine If.",
    bands: ["younger"], group: "Questioning and possibility thinking" },
  { steps: ["Review: how did it get to be this way?","Predict: how else might this change in future?","Imagine: what could be created from these changes?"], structure: "Linked discussion, history to future", name: "What Can Be", url: "https://pz.harvard.edu/resources/what-can-be",
    gist: "A possibilities routine for envisioning change.",
    bands: ["younger", "middle", "senior"], group: "Questioning and possibility thinking" },
  { steps: ["State: what I want to say is...","How else can I say this? And why?","Ask again: how else, and why?"], structure: "Repeated rephrasing prompt, one student at a time", name: "How Else and Why?", url: "https://pz.harvard.edu/resources/how-else-and-why",
    gist: "Generate alternative approaches or uses and reason about them.",
    bands: ["younger", "middle", "senior"], group: "Questioning and possibility thinking" },
  { steps: ["List the obvious options.","Brainstorm hidden options by combining ideas or imagining new roles.","What have we learned from finding these options?"], structure: "Whole-class brainstorm, obvious then hidden", name: "Options Explosion", url: "https://pz.harvard.edu/resources/options-explosion",
    gist: "Rapidly brainstorm many possible options for a situation or dilemma.",
    bands: ["younger", "middle", "senior"], group: "Questioning and possibility thinking" },
  { steps: ["Identify two options with a trade-off between them.","Brainstorm ideas for each corner of the diamond.","What have we learned about the situation?"], structure: "Diamond diagram on the board", name: "Options Diamond", url: "https://pz.harvard.edu/resources/options-diamond",
    gist: "Map options for a dilemma across a diamond of trade-offs.",
    bands: ["younger", "middle", "senior"], group: "Questioning and possibility thinking" },
  { steps: ["How well does each option fit the ideal?","How well does each option fit your criteria?","How well does each option fit your real situation?","Imagine doing each option. Which feels like the best fit?"], structure: "Score options against four lenses", name: "Does It Fit?", url: "https://pz.harvard.edu/resources/does-it-fit",
    gist: "Weigh how well options or ideas fit a situation.",
    bands: ["younger", "middle", "senior"], group: "Questioning and possibility thinking" },
  { steps: ["Pick a surprising pattern from the topic.","Brainstorm other situations where the same pattern might show up.","Compare and contrast the pattern in both situations."], structure: "Individual or group, spot then transfer pattern", name: "Portable Surprise", url: "https://pz.harvard.edu/resources/portable-surprise",
    gist: "A possibilities/curiosity routine.",
    bands: ["younger", "middle", "senior"], group: "Questioning and possibility thinking" },

  // --- Perspective taking and empathy ---
  { steps: ["Brainstorm different perspectives on the topic.","Choose one perspective to explore.","I think... (describe the topic from that viewpoint).","A question I have from this viewpoint is..."], structure: "Individual or group, speak in role", name: "Circle of Viewpoints", url: "https://pz.harvard.edu/resources/circle-of-viewpoints",
    gist: "Brainstorm the different perspectives around a topic, then speak from one of them.",
    bands: ["senior"], group: "Perspective taking and empathy" },
  { steps: ["What can the person or thing perceive?","What might they know or believe?","What might they care about?","Speak or write from their point of view."], structure: "Individual role, share as monologue", name: "Step Inside", url: "https://pz.harvard.edu/resources/step-inside",
    gist: "Step into the perspective of a person or thing and speak from within it.",
    bands: ["senior"], group: "Perspective taking and empathy" },
  { steps: ["Step In: what might this person feel, believe, or know?","Step Out: what would you need to learn to understand them better?","Step Back: what does this show about your own perspective?"], structure: "Small groups, sticky notes then share", name: "Step In, Step Out, Step Back", url: "https://pz.harvard.edu/resources/step-step-out-step-back",
    gist: "Take another's perspective, note the limits of what you can know, then reflect on your own thinking.",
    bands: ["younger", "middle", "senior"], group: "Perspective taking and empathy" },
  { steps: ["Think: how does this person understand their role in the system?","Feel: what's their emotional response to it?","Care: what do they value or care about?","Compare across people: where do views align or clash?"], structure: "Role-play or write for several people", name: "Think, Feel, Care", url: "https://pz.harvard.edu/resources/think-feel-care",
    gist: "Step into roles within a system: what does each person think, feel, and care about?",
    bands: ["middle"], group: "Perspective taking and empathy" },
  { steps: ["Think: what does this person do? How do you know?","Feel: if you were them, how would you feel?","Care: if you were them, what would you care about?","Repeat for a different person and compare."], structure: "Whole class, familiar system, one person at a time", name: "Think, Feel, Care (For Younger Children)", url: "https://pz.harvard.edu/resources/think-feel-care-younger-children",
    gist: "The early-years adaptation of Think, Feel, Care.",
    bands: ["younger"], group: "Perspective taking and empathy" },
  { steps: ["Same: how are you and this person similar?","Different: how are you different?","Connect: how are you connected as human beings?","Engage: what would you like to ask, say, or do?"], structure: "Individual or pair, ends in real action", name: "Same, Different, Connect, Engage", url: "https://pz.harvard.edu/resources/same-different-connect-engage",
    gist: "Consider how you and another person are similar and different, then connect and engage.",
    bands: ["younger", "middle", "senior"], group: "Perspective taking and empathy" },
  { steps: ["Notice: what's your first impression?","What other points of view could this be seen from?","What's the same? What's different?"], structure: "Whole class, present debate or images", name: "Same and Different", url: "https://pz.harvard.edu/resources/same-and-different",
    gist: "A simpler comparison routine, well suited to younger children.",
    bands: ["younger", "middle", "senior"], group: "Perspective taking and empathy" },
  { steps: ["Have you used this? What do you like or dislike?","How would your life be different without it?","Now imagine someone else: what would they say?","Compare your answers with theirs."], structure: "Answer same questions from two viewpoints", name: "My Perspective, Other Perspectives (For Exploring Complexity)", url: "https://pz.harvard.edu/resources/my-perspective-other-perspectives-exploring-complexity",
    gist: "Articulate your own view on something complex, then deliberately seek out others'.",
    bands: ["middle", "senior"], group: "Perspective taking and empathy" },
  { steps: ["Explore: who am I? How has my identity developed?","Connect: who and what am I connected to?","Identify: what would identify me to others?","Belong: where do I think I belong?"], structure: "Sequence over one lesson or several", name: "Who Am I?", url: "https://pz.harvard.edu/resources/who-am-i",
    gist: "An identity and perspective routine.",
    bands: ["younger", "middle", "senior"], group: "Perspective taking and empathy" },
  { steps: ["Multiple Feelings: what might this person be feeling?","Strength: what are their strengths and cultural richness?","Connections: how do we connect as human beings?","Human Dignity: what words honor this person's humanity?"], structure: "Work in order, then group reflection", name: "Seek to See", url: "https://pz.harvard.edu/resources/seek-see",
    gist: "Look beyond first impressions and assumptions.",
    bands: ["younger", "middle", "senior"], group: "Perspective taking and empathy" },

  // --- Truth, evidence, and fairness ---
  { steps: ["Make a claim: give your interpretation.","Identify support: what backs up your claim?","Ask a question the claim leaves open."], structure: "Model as class, then individual or small group", name: "Claim, Support, Question", url: "https://pz.harvard.edu/resources/claim-support-question",

  { steps: ["Identify what pulls at each side of the dilemma.","Generate tugs (reasons) for both sides.","Ask 'what if' questions to explore further.","Has your thinking changed?"], structure: "Whole class, post-its on a rope", name: "Tug of War", url: "https://pz.harvard.edu/resources/tug-war",

    bands: ["senior"], group: "Truth, evidence, and fairness" },
  { steps: ["Brainstorm different viewpoints on the claim.","My viewpoint is... I think this claim is true/false because...","What would convince me to change my mind?","Step back: what is your conclusion now?"], structure: "Circle, speak in role, then debrief", name: "True for Who?", url: "https://pz.harvard.edu/resources/true-who",

    bands: ["senior"], group: "Truth, evidence, and fairness" },
  { steps: ["What do you perceive is being conveyed?","Who would decide to convey this, and why?","How else could this be interpreted?","What do you believe is true? What makes you think that?"], structure: "Reveal source piece by piece", name: "Facts or Fiction", url: "https://pz.harvard.edu/resources/facts-or-fiction",
    gist: "Evaluate the reliability of information and claims.",
    bands: ["middle", "senior"], group: "Truth, evidence, and fairness" },
  { steps: ["Scan for 'red lights' — strong signs of a truth problem.","Scan for 'yellow lights' — milder warning signs.","What zones tend to be full of red or yellow lights?"], structure: "Individual or pair scan, pool as class chart", name: "Red Light, Yellow Light", url: "https://pz.harvard.edu/resources/red-light-yellow-light",

    bands: ["middle"], group: "Truth, evidence, and fairness" },
  { steps: ["Name the facts and events. What evidence confirms them?","Identify the thoughts and feelings involved. What evidence confirms them?","Make your best judgment based on this."], structure: "Sort notes into a 2x2 grid", name: "Reporter's Notebook", url: "https://pz.harvard.edu/resources/reporters-notebook",

// Human-readable byte size, e.g. 26214400 -> "25.0 MB".
function formatBytes(n) {
  if (n == null || isNaN(n)) return "";
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return Math.round(n / 1024) + " KB";
  return (n / (1024 * 1024)).toFixed(1) + " MB";
}

// Resolve once the video has finished seeking to time t (seconds).
function seekTo(video, t) {
  return new Promise((resolve, reject) => {
    const onSeeked = () => { cleanup(); resolve(); };
    const onErr = () => { cleanup(); reject(new Error("seek failed")); };
    const cleanup = () => {
      video.removeEventListener("seeked", onSeeked);
      video.removeEventListener("error", onErr);
    };
    video.addEventListener("seeked", onSeeked);
    video.addEventListener("error", onErr);
    video.currentTime = Math.min(Math.max(t, 0), video.duration || t);
  });
}

// Sample `count` evenly-spaced still frames from a video File, fully in-browser.
// Returns JPEG data URLs. Never rejects: if the browser can't decode the format,
// resolves with frames:[] so the caller can fall back to a description + embed.
function extractVideoFrames(file, count = 4) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(file);
    const video = document.createElement("video");
    video.muted = true;
    video.preload = "metadata";
    video.src = url;
    const finish = (frames, meta) => {
      URL.revokeObjectURL(url);
      resolve({ frames, poster: frames[0] || "", ...meta });
    };
    const fail = () => finish([], { duration: 0, width: 0, height: 0 });
    video.onerror = fail;
    video.onloadedmetadata = async () => {
      const duration = video.duration, vw = video.videoWidth, vh = video.videoHeight;
      if (!duration || !isFinite(duration) || !vw || !vh) return fail();
      const scale = Math.min(1, 1024 / Math.max(vw, vh));
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(vw * scale);
      canvas.height = Math.round(vh * scale);
      const ctx = canvas.getContext("2d");
      const frames = [];
      try {
        for (let i = 1; i <= count; i++) {
          await seekTo(video, duration * i / (count + 1));
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          frames.push(canvas.toDataURL("image/jpeg", 0.8));
        }
      } catch (_) { /* keep whatever frames we captured */ }
      finish(frames, { duration, width: vw, height: vh });
    };
  });
}

// Decode a media file's audio, downmix to 16 kHz mono, return a 16-bit PCM WAV Blob.
// Caps at maxSeconds (truncating long clips) so the result stays under the API limit.
// Default (120s) keeps a 16kHz/16-bit mono WAV (~32 KB/s) under TRANSCRIBE_LIMIT with margin.
async function videoFileToWav16k(file, maxSeconds = 120) {
  const arrayBuf = await file.arrayBuffer();
  const Ctx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
  const tmp = new (window.AudioContext || window.webkitAudioContext)();
  let decoded;
  try { decoded = await tmp.decodeAudioData(arrayBuf.slice(0)); }
  finally { tmp.close && tmp.close(); }
  const srcRate = decoded.sampleRate, outRate = 16000;
  const wantSec = Math.min(decoded.duration, maxSeconds);
  const truncated = decoded.duration > maxSeconds + 0.5;
  const frames = Math.floor(wantSec * outRate);
  const off = new Ctx(1, frames, outRate);
  const buf = off.createBuffer(1, Math.floor(wantSec * srcRate), srcRate);
  // mono downmix
  const ch0 = decoded.getChannelData(0);
  const ch1 = decoded.numberOfChannels > 1 ? decoded.getChannelData(1) : null;
  const mono = buf.getChannelData(0);
  for (let i = 0; i < mono.length; i++) mono[i] = ch1 ? (ch0[i] + ch1[i]) / 2 : ch0[i];
  const node = off.createBufferSource(); node.buffer = buf; node.connect(off.destination); node.start();
  const rendered = await off.startRendering();
  const data = rendered.getChannelData(0);
  // PCM16 WAV
  const bytesPerSample = 2, blockAlign = bytesPerSample, byteRate = outRate * blockAlign;
  const ab = new ArrayBuffer(44 + data.length * 2), view = new DataView(ab);
  const wr = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
  wr(0, "RIFF"); view.setUint32(4, 36 + data.length * 2, true); wr(8, "WAVE"); wr(12, "fmt ");
  view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
  view.setUint32(24, outRate, true); view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true); view.setUint16(34, 16, true); wr(36, "data");
  view.setUint32(40, data.length * 2, true);
  let off2 = 44;
  for (let i = 0; i < data.length; i++) { let s = Math.max(-1, Math.min(1, data[i])); view.setInt16(off2, s < 0 ? s * 0x8000 : s * 0x7fff, true); off2 += 2; }
  return { blob: new Blob([ab], { type: "audio/wav" }), truncated };
}

function readFileAsDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// Build a QR code data URL synchronously. Never throws — returns "" if the
// library is missing or generation fails, so a QR problem can't blank the app.
function makeQrDataUrl(text) {
  try {
    if (typeof qrcode !== "function" || !text) return "";
    const qr = qrcode(0, "M"); // type 0 = auto-size, medium error correction
    qr.addData(String(text));
    qr.make();
    return qr.createDataURL(6, 8); // cellSize, margin -> GIF data URL
  } catch (_) {
    return "";
  }
}

// Strip site chrome (nav, images, link URLs, related-article footers) out of the
// markdown a reader service returns, leaving mostly the article body.
function cleanArticleMarkdown(md) {
  let t = String(md || "");
  // Cut everything from the first end-of-article / footer marker onward.
  const markers = ["Explore more on these topics", "\n### Most viewed", "\n## Most viewed", "\nReuse this content", "\n## More from"];
  let cut = t.length;
  for (const m of markers) { const i = t.indexOf(m); if (i !== -1 && i < cut) cut = i; }
  t = t.slice(0, cut);
  t = t.replace(/!\[[^\]]*\]\([^)]*\)/g, "");          // drop images
  t = t.replace(/\[([^\]]*)\]\([^)]*\)/g, "$1");        // links -> plain label
  t = t.replace(/^\s*-\s*\[[ xX]\]\s*$/gm, "");         // checkbox artefacts
  const drop = /^(Skip to|Search input|Show more|Hide expanded|Close dialogue|Support the Guardian|Fund independent|US edition|UK edition|Australia edition|Europe edition|International edition|Sign in|Print subscriptions|Download the app|View image|Prefer the Guardian|Toggle caption|Next image|Previous image|google-search)/i;
  t = t.split("\n").filter(l => !drop.test(l.trim())).join("\n");
  t = t.replace(/\n{3,}/g, "\n\n").trim();
  return t;
}

// Find the first real content image URL in reader markdown (skip logos/icons/sprites).
function extractLeadImage(md) {
  const re = /!\[[^\]]*\]\((https?:\/\/[^)\s]+)\)/g;
  let m;
  while ((m = re.exec(String(md || "")))) {
    const u = m[1];
    if (/logo|icon|sprite|avatar|placeholder|1x1|pixel|\.svg(\?|$)/i.test(u)) continue;
    if (/\.(jpe?g|png|webp|gif)(\?|$)/i.test(u) || /\/img\/|\/media\/|\/images?\//i.test(u)) return u;
  }
  return "";
}

// Fetch a (possibly cross-origin) image and return a base64 data URL, routed through
// the wsrv.nl image proxy so CORS never blocks embedding it in the .pptx. "" on failure.
async function urlToDataUrl(url) {
  if (!url) return "";
  const proxied = "https://images.weserv.nl/?url=" + encodeURIComponent(url.replace(/^https?:\/\//, "")) + "&output=jpg";
  try {
    const resp = await fetch(proxied);
    if (!resp.ok) throw new Error("proxy " + resp.status);
    const blob = await resp.blob();
    return await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(blob); });
  } catch (_) { return ""; }
}

// Find one relevant, free (CC-licensed) image for a topic via the Wikimedia
// Commons API (keyless, CORS-enabled with origin=*). Returns a raster image URL,
// or "" on any failure — so a missing image never breaks the flow.
async function findRelevantImage(query) {
  const q = String(query || "").replace(/[^a-zA-Z0-9 ]/g, " ").replace(/\s+/g, " ").trim();
  if (!q) return "";
  try {
    const api = "https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrnamespace=6&gsrlimit=6&gsrsearch="
      + encodeURIComponent(q) + "&prop=imageinfo&iiprop=url&iiurlwidth=1000&format=json&origin=*";
    const resp = await fetch(api);
    if (!resp.ok) return "";
    const data = await resp.json();
    const pages = (data.query && data.query.pages) ? Object.values(data.query.pages) : [];
    pages.sort((a, b) => (a.index || 0) - (b.index || 0)); // keep search relevance order
    for (const p of pages) {
      const info = p && p.imageinfo && p.imageinfo[0];
      const u = info && (info.thumburl || info.url);
      if (u && /\.(jpe?g|png|webp)(\?|$)/i.test(u)) return u; // raster only (skip svg/icons)
    }
    return "";
  } catch (_) { return ""; }
}

async function extractPdfText(file) {
  const buf = await file.arrayBuffer();
  await loadScript(PDFJS_SRC, PDFJS_SRI);
  const pdfjs = window.pdfjsLib;
  pdfjs.GlobalWorkerOptions.workerSrc = "pdf.worker.min.js"; // self-hosted, same-origin (workers can't carry SRI)
  const pdf = await pdfjs.getDocument({ data: buf }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(" ") + "\n";
  }
  return text.trim();
}

// Pull the first valid JSON object out of a string, defensively.
function parseJsonLoose(raw) {
  try { return JSON.parse(raw); } catch (_) {}
  const start = raw.indexOf("{");
  const end = raw.lastIndexOf("}");
  if (start !== -1 && end > start) {
    return JSON.parse(raw.slice(start, end + 1)); // may throw -> caller catches
  }
  throw new Error("No JSON object found in model output.");
}

// Strip stray markdown (bold/italic/code/heading markers) the model sometimes adds.
function stripMd(s) {
  return String(s == null ? "" : s)
    .replace(/\*\*(.*?)\*\*/g, "$1")
    .replace(/__(.*?)__/g, "$1")
    .replace(/\*(.*?)\*/g, "$1")
    .replace(/`([^`]*)`/g, "$1")
    .replace(/^#{1,6}\s+/gm, "")
    .trim();
}

// Normalise guiding questions to { q, responses } objects. Accepts the model's
// new object shape ({ question, responses }) or a plain string (legacy / fallback),
// so older saved content and either prompt shape still load cleanly.
function normGuiding(arr) {
  if (!Array.isArray(arr) || !arr.length) return [{ q: "", responses: "" }, { q: "", responses: "" }, { q: "", responses: "" }];
  return arr.map(it => typeof it === "string"
    ? { q: stripMd(it), responses: "" }
    : { q: stripMd((it && (it.question || it.q)) || ""), responses: stripMd((it && it.responses) || "") });
}

// Shape a parsed model reply into the editable Springboard deck object. Pure (uses
// only stripMd), validating/defaulting the 4-part IGNITE / THINK / LAUNCH / REFLECT
// schema that the preview edits and Tasks 12-14 (export) consume. Arrays are trimmed
// to their limits; missing fields default to empty strings/arrays; think.routine is
// forced to the teacher's picked routineName so it always matches an exact ROUTINES name.
function shapeDeck(parsed, { routineName }) {
  const p = parsed && typeof parsed === "object" ? parsed : {};
  const str = v => stripMd(v == null ? "" : String(v));
  const arr = (v, max) => (Array.isArray(v) ? v.map(str).filter(Boolean).slice(0, max) : []);
  const obj = v => (v && typeof v === "object" ? v : {});
  const ig = obj(p.ignite), th = obj(p.think), la = obj(p.launch), re = obj(p.reflect), no = obj(p.notes), ad = obj(p.advisory);
  return {
    title: str(p.title),
    keywords: arr(p.keywords, 6),
    ignite:  { question: str(ig.question) },
    think:   { routine: str(routineName) || str(th.routine), steps: arr(th.steps, 4), structure: str(th.structure) },
    launch:  { connection: str(la.connection), bridge: str(la.bridge), question: str(la.question) },
    reflect: { revisit: str(re.revisit), prompts: arr(re.prompts, 4) },
    notes:   { ignite: str(no.ignite), think: str(no.think), launch: str(no.launch), reflect: str(no.reflect) },
    advisory:{ flag: !!ad.flag, reason: str(ad.reason) },
  };
}

// Strip characters that are illegal in Windows/macOS filenames (keeps the en-dash
// separators and everyday punctuation), collapse whitespace, and cap the length.
function sanitizeFilename(s) {
  return String(s == null ? "" : s)
    .replace(/[\\/:*?"<>|\x00-\x1f]/g, "")
    .replace(/\s+/g, " ")
    .trim()
    .slice(0, 150) || "Springboard";
}

const TRANSCRIBE_LIMIT = 4 * 1024 * 1024; // Vercel serverless function request-body limit is ~4.5 MB; stay under it

// Turn a failed backend response into a plain, teacher-facing message. 401 means
// the passcode is wrong; anything else surfaces the server's own error text.
async function backendErrorMessage(resp) {
  if (resp.status === 401) return "Passcode incorrect — check with the Digital Learning team.";
  let detail = "";
  try { const j = await resp.json(); detail = j && j.error ? String(j.error) : ""; }
  catch (_) { detail = await resp.text().catch(() => ""); }
  return `Server error (${resp.status}).${detail ? " " + detail : ""}`;
}

// Transcribe a video/audio File via the backend. Always downsamples to a 16 kHz
// mono WAV first (the backend only accepts raw WAV bytes), truncating very long
// clips so the upload stays under the size cap.
async function transcribeMedia({ passcode, file }) {
  let { blob: wavBlob, truncated } = await videoFileToWav16k(file);
  if (wavBlob.size > TRANSCRIBE_LIMIT) {
    const { blob: b2, truncated: t2 } = await videoFileToWav16k(file, 90);
    wavBlob = b2; truncated = t2 || truncated;
  }
  const resp = await fetch(API_BASE + "/api/transcribe", {
    method: "POST",
    headers: { "x-sb-passcode": passcode, "x-sb-filename": file.name.replace(/\.[^.]+$/, "") + ".wav", "Content-Type": "application/octet-stream" },
    body: wavBlob,
  });
  if (!resp.ok) throw new Error(await backendErrorMessage(resp));
  const data = await resp.json();
  const text = (data.text || "").trim();
  return { text, truncated };
}

// End-of-lesson reflection routines a teacher can pin from the REFLECT card dropdown
// ("" = let the model vary the choice each lesson, the default). Each carries the
// routine's real Harvard PZ prompt stems, injected into the generate prompt so
// reflect.prompts stay true to the routine while adapting to the stimulus.
const REFLECT_ROUTINES = [
  { name: "I Used to Think… / Now I Think…", stems: "I used to think… ; Now I think… ; (say what changed your thinking and why)" },
  { name: "Connect–Extend–Challenge", stems: "one new connection to what you already knew ; one way today extended or pushed your thinking ; one challenge or question still puzzling you" },
  { name: "3-2-1 Bridge", stems: "3 thoughts you now have ; 2 questions still on your mind ; 1 analogy for today's core idea" },
  { name: "Headlines", stems: "a one-line headline that captures the core idea of today's learning" },
  { name: "Reflect–Connect–Project", stems: "reflect on what stood out and why it matters ; connect it to earlier learning ; project forward to how you'll use it next time" },
  { name: "Compass Points", stems: "Excited — what excites you about today's idea? ; Worrisome — what worries or puzzles you? ; Need to know — what do you still need to find out? ; Stance/Step — your current stance or next step" },
  { name: "Color, Symbol, Image", stems: "Color — a colour for today's core idea, and why ; Symbol — a symbol for it, and why ; Image — an image for it, and why" },
];

/* --------------------------- Backend call --------------------------- */

async function generateSpringboard({ passcode, mode, media = [], sourceText = "", classInfo, routineName, reflectRoutine = "", scope = "all", current = null }) {
  const routine = ROUTINES.find(r => r.name === routineName) || ROUTINES[0];
  const hasGuide = !!vceStudyGuide(classInfo);
  const outcomeLine = hasGuide
    ? `A VCE study-design extract for ${classInfo.subject} is provided below. ALIGN the launch slide's curriculum connection to THAT extract (its areas of study and outcomes)${classInfo.outcome.trim() ? `, narrowed to this outcome/topic: "${classInfo.outcome.trim()}"` : ""}. Quote real phrases from the extract; never invent codes.`
    : classInfo.outcome.trim()
      ? `ALIGN the launch slide to this exact outcome/topic, quoting its key phrases: "${classInfo.outcome.trim()}". Do not invent curriculum codes.`
      : `Write the curriculum connection in plain language for ${classInfo.curriculum} ${classInfo.subject}, year ${classInfo.yearLevel}. Never invent official curriculum codes or identifiers.`;
  const tone = { younger: "concrete, playful, inquiry-led (ages 5-12)",
                 middle: "analytical, real-world (ages 12-15)",
                 senior: "critical, ethical, conceptual (ages 15-18)" }[bandOf(classInfo.yearLevel)];
  let sys = `You create a 4-part lesson launch ("Springboard") from a teacher's stimulus.
Audience tone: ${tone}. Slides carry MINIMAL text — every field respects its word limit.
Thinking routine to scaffold the THINK part: "${routine.name}" — ${routine.gist} (${routine.url}).
${outcomeLine}
Each notes field is a teacher script with EXACTLY these labelled sections, each 1-3 sentences:
FACILITATION: … TIMING: … DIFFERENTIATION: … CURRICULUM LINKS: … EXTENSIONS: …
Set advisory.flag true only for sensitive themes (grief, violence, body image, etc.) with a one-line reason.
Return STRICT JSON with keys: title, keywords, ignite{question}, think{routine, steps, structure}, launch{connection, bridge, question}, reflect{revisit, prompts}, notes{ignite, think, launch, reflect}, advisory{flag, reason}.`;

  // Single-slide regenerate: rebuild only the scoped slide + its notes, copying the rest verbatim.
  if (scope !== "all") {
    sys += `\nRegenerate ONLY the "${scope}" and "notes.${scope}" fields; copy every other field verbatim from: ${JSON.stringify(current)}`;
  }

  // Teacher pinned a specific end-of-lesson reflection routine from the REFLECT dropdown:
  // override the "vary the choice" instruction below and lock reflect.prompts to it.
  const pinnedReflect = REFLECT_ROUTINES.find(r => r.name === reflectRoutine);
  if (pinnedReflect) {
    sys += `\nFor the REFLECT part, the teacher has CHOSEN the "${pinnedReflect.name}" reflection routine — use exactly that one (ignore any instruction to vary or pick a different reflection routine). Its real prompt stems are: ${pinnedReflect.stems}. Set reflect.prompts to THOSE stems, lightly tailored to this lesson (<=4 short stems), keeping the routine's real moves and their order.`;
  }

  // Field word-limits, kept beside the schema keys so the model honours them.
  const limits = [
    `title: <=8 words.`,
    `keywords: 3-6 short search terms a teacher might type to find this lesson later.`,
    `ignite.question: ONE provocative question.`,
    `think.routine MUST be exactly "${routine.name}". This routine's real moves are: ${(routine.steps || []).map((s, i) => `${i + 1}) ${s}`).join(" ")}. think.steps: take THOSE actual moves and lightly tailor the wording to THIS stimulus — keep the routine's real moves and their order, do NOT invent different ones; <=4 short student-facing prompts. think.structure: "${routine.structure || "Think-pair-share, 3 min"}".`,
    `launch.connection: <=25 words curriculum connection; launch.bridge: <=20 words from the stimulus to today's lesson; launch.question: the lesson launch question.`,
    `reflect.revisit: <=15 words revisiting the ignite question. For reflect.prompts, CHOOSE the end-of-lesson reflection routine that best fits THIS lesson, and VARY the choice across lessons (do NOT always use the same one). Pick from: (a) I Used to Think… / Now I Think…; (b) Connect–Extend–Challenge — one new connection, one way it extends thinking, one lingering challenge or question; (c) 3-2-1 Bridge — 3 thoughts, 2 questions, 1 analogy; (d) Headlines — a one-line headline capturing today's core idea; (e) Reflect–Connect–Project — reflect on it, connect to prior learning, project forward. Use THAT routine's real prompt stems as reflect.prompts (<=4 short stems).`,
  ].join("\n");
  const instruction = `Create the Springboard now. Respect every word limit:\n${limits}\nReturn STRICT JSON only — no markdown, no code fences, plain text in every field.`;

  const userContent = [];
  const mediaItems = Array.isArray(media) ? media : [];

  if (mode === "media" && mediaItems.length) {
    const imgs = mediaItems.filter(m => m.kind === "image").length;
    const vids = mediaItems.filter(m => m.kind === "video").length;
    let mt = `The stimulus is a reel of ${mediaItems.length} item(s) shown in order` +
      `${imgs ? ` — ${imgs} image(s)` : ""}${vids ? `${imgs ? " and" : " —"} ${vids} video(s) (still frames attached per clip)` : ""}. ` +
      `Treat them as ONE stimulus in sequence; item 1 is the primary stimulus. Build the whole Springboard from what you genuinely see/read across them.`;
    const clipText = mediaItems
      .map((m, i) => (m.kind === "video" && m.text && m.text.trim()) ? `Video at position ${i + 1} — ${m.text.trim().slice(0, 4000)}` : "")
      .filter(Boolean);
    if (clipText.length) mt += `\nClip notes:\n${clipText.join("\n")}`;
    userContent.push({ type: "text", text: instruction + "\n\n" + mt });
    mediaItems.forEach(m => {
      if (m.kind === "image") userContent.push({ type: "image_url", image_url: { url: m.dataUrl } });
      else (m.frames || []).forEach(fr => userContent.push({ type: "image_url", image_url: { url: fr } }));
    });
  } else {
    const trimmed = (sourceText || "").slice(0, 12000).replace(/"{3,}/g, "“”");
    userContent.push({ type: "text", text: instruction + `\n\nThe stimulus is the following article text. Build the Springboard from its real content:\n\n"""\n${trimmed}\n"""` });
  }

  const studyGuide = vceStudyGuide(classInfo);
  const resp = await fetch(API_BASE + "/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-sb-passcode": passcode },
    body: JSON.stringify({
      messages: [
        { role: "system", content: sys },
        { role: "user", content: userContent },
      ],
      response_format: { type: "json_object" },
      max_completion_tokens: 4000,
      stickiness: true,
      ...(studyGuide ? { studyGuide } : {}),
    }),
  });

  if (!resp.ok) throw new Error(await backendErrorMessage(resp));

  const data = await resp.json();
  const raw = data?.choices?.[0]?.message?.content || "";
  if (!raw.trim()) throw new Error("The model returned an empty response.");
  try {
    return { parsed: parseJsonLoose(raw), raw };
  } catch (perr) {
    const e = new Error("Could not parse the model's JSON: " + perr.message);
    e._raw = raw;
    throw e;
  }
}

/* ----------------------- Analyse stimulus (the new step before Generate) -----------------------
   Reads the stimulus and recommends 3 thinking routines (band-filtered from ROUTINES), so the
   teacher picks a routine before Generate runs. Media-parts packaging mirrors generateSpringboard
   above. */
async function analyseStimulus({ passcode, mode, media = [], sourceText = "", classInfo }) {
  const band = bandOf(classInfo.yearLevel); // "younger" | "middle" | "senior"
  const bandRoutines = ROUTINES.filter(r => r.bands.includes(band));
  const routineMenu = bandRoutines.map(r => `- ${r.name}: ${r.gist}`).join("\n");
  const sys = `You help a ${classInfo.curriculum} teacher of ${classInfo.subject}, year ${classInfo.yearLevel}, launch student thinking from a stimulus.
Return STRICT JSON only: {"summary": string (<=40 words, what the stimulus shows),
"routines": [{"name": string, "why": string (<=20 words, why it fits THIS stimulus and age group)} x3]}
Routine names MUST be copied exactly from this menu:\n${routineMenu}`;

  const userContent = [];
  const mediaItems = Array.isArray(media) ? media : [];
  if (mode === "media" && mediaItems.length) {
    userContent.push({ type: "text", text: "Analyse this stimulus and recommend routines per the system instructions." });
    mediaItems.forEach(m => {
      if (m.kind === "image") userContent.push({ type: "image_url", image_url: { url: m.dataUrl } });
      else (m.frames || []).forEach(fr => userContent.push({ type: "image_url", image_url: { url: fr } }));
    });
  } else {
    const trimmed = (sourceText || "").slice(0, 12000).replace(/"{3,}/g, "“”");
    userContent.push({ type: "text", text: `Analyse this article text and recommend routines per the system instructions:\n\n"""\n${trimmed}\n"""` });
  }

  const resp = await fetch(API_BASE + "/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-sb-passcode": passcode },
    body: JSON.stringify({
      messages: [
        { role: "system", content: sys },
        { role: "user", content: userContent },
      ],
      response_format: { type: "json_object" },
      max_completion_tokens: 700,
    }),
  });
  if (!resp.ok) throw new Error(await backendErrorMessage(resp));

  const data = await resp.json();
  const raw = data?.choices?.[0]?.message?.content || "";
  if (!raw.trim()) throw new Error("The model returned an empty response.");
  const parsed = parseJsonLoose(raw);

  // Canonicalise routine names against ROUTINES (case-insensitive), dropping anything the
  // model invents; top up to 3 from the band-filtered list so the UI never shows fewer than
  // 3 real, linkable routines even on a flaky/partial reply.
  const byLower = new Map(bandRoutines.map(r => [r.name.toLowerCase(), r.name]));
  const seen = new Set();
  const routines = [];
  (Array.isArray(parsed.routines) ? parsed.routines : []).forEach(r => {
    const nameRaw = stripMd(r && r.name);
    const canon = byLower.get(String(nameRaw).toLowerCase().trim());
    if (canon && !seen.has(canon)) {
      seen.add(canon);
      routines.push({ name: canon, why: stripMd((r && r.why) || "") });
    }
  });
  for (const r of bandRoutines) {
    if (routines.length >= 3) break;
    if (!seen.has(r.name)) { seen.add(r.name); routines.push({ name: r.name, why: r.gist }); }
  }

  return { summary: stripMd(parsed.summary || ""), routines: routines.slice(0, 3) };
}

/* Merge a scoped regenerate's parsed reply back into the deck: only the scoped slide
   (ignite | think | launch | reflect) and its teacher notes are replaced, so edits to the
   other three slides survive. think.routine stays the teacher's pick. Full-scope callers
   use shapeDeck directly; a scope of "all" (or an unknown scope) falls back to a full shape. */
function mergeScopedFields(deck, scope, parsed) {
  const shaped = shapeDeck(parsed, { routineName: deck.think.routine });
  const SLICES = ["ignite", "think", "launch", "reflect"];
  if (!SLICES.includes(scope)) return shaped; // "all" or anything unexpected → full shape
  return {
    ...deck,
    [scope]: shaped[scope],
    notes: { ...deck.notes, [scope]: shaped.notes[scope] },
  };
}

// Determinate circular progress ring (white, for use on the primary button).
const ProgressRing = ({ value, size = 18 }) => {
  const r = (size - 3) / 2, c = 2 * Math.PI * r;
  const off = c * (1 - Math.max(0, Math.min(100, value)) / 100);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: "rotate(-90deg)" }} aria-hidden="true" focusable="false">
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(255,255,255,.35)" strokeWidth="2.5" />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"
        strokeDasharray={c} strokeDashoffset={off} style={{ transition: "stroke-dashoffset .25s linear" }} />
    </svg>
  );
};
