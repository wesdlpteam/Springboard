// Human-readable byte size, e.g. 26214400 -> "25.0 MB".
function formatBytes(n) {
  if (n == null || isNaN(n)) return "";
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return Math.round(n / 1024) + " KB";
  return (n / (1024 * 1024)).toFixed(1) + " MB";
}

// Resolve once the video has finished seeking to time t (seconds).
function seekTo(video, t) {
  return new Promise((resolve, reject) => {
    const onSeeked = () => { cleanup(); resolve(); };
    const onErr = () => { cleanup(); reject(new Error("seek failed")); };
    const cleanup = () => {
      video.removeEventListener("seeked", onSeeked);
      video.removeEventListener("error", onErr);
    };
    video.addEventListener("seeked", onSeeked);
    video.addEventListener("error", onErr);
    video.currentTime = Math.min(Math.max(t, 0), video.duration || t);
  });
}

// Sample `count` evenly-spaced still frames from a video File, fully in-browser.
// Returns JPEG data URLs. Never rejects: if the browser can't decode the format,
// resolves with frames:[] so the caller can fall back to a description + embed.
function extractVideoFrames(file, count = 4) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(file);
    const video = document.createElement("video");
    video.muted = true;
    video.preload = "metadata";
    video.src = url;
    const finish = (frames, meta) => {
      URL.revokeObjectURL(url);
      resolve({ frames, poster: frames[0] || "", ...meta });
    };
    const fail = () => finish([], { duration: 0, width: 0, height: 0 });
    video.onerror = fail;
    video.onloadedmetadata = async () => {
      const duration = video.duration, vw = video.videoWidth, vh = video.videoHeight;
      if (!duration || !isFinite(duration) || !vw || !vh) return fail();
      const scale = Math.min(1, 1024 / Math.max(vw, vh));
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(vw * scale);
      canvas.height = Math.round(vh * scale);
      const ctx = canvas.getContext("2d");
      const frames = [];
      try {
        for (let i = 1; i <= count; i++) {
          await seekTo(video, duration * i / (count + 1));
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          frames.push(canvas.toDataURL("image/jpeg", 0.8));
        }
      } catch (_) { /* keep whatever frames we captured */ }
      finish(frames, { duration, width: vw, height: vh });
    };
  });
}

// Decode a media file's audio, downmix to 16 kHz mono, return a 16-bit PCM WAV Blob.
// Caps at maxSeconds (truncating long clips) so the result stays under the API limit.
// Default (120s) keeps a 16kHz/16-bit mono WAV (~32 KB/s) under TRANSCRIBE_LIMIT with margin.
async function videoFileToWav16k(file, maxSeconds = 120) {
  const arrayBuf = await file.arrayBuffer();
  const Ctx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
  const tmp = new (window.AudioContext || window.webkitAudioContext)();
  let decoded;
  try { decoded = await tmp.decodeAudioData(arrayBuf.slice(0)); }
  finally { tmp.close && tmp.close(); }
  const srcRate = decoded.sampleRate, outRate = 16000;
  const wantSec = Math.min(decoded.duration, maxSeconds);
  const truncated = decoded.duration > maxSeconds + 0.5;
  const frames = Math.floor(wantSec * outRate);
  const off = new Ctx(1, frames, outRate);
  const buf = off.createBuffer(1, Math.floor(wantSec * srcRate), srcRate);
  // mono downmix
  const ch0 = decoded.getChannelData(0);
  const ch1 = decoded.numberOfChannels > 1 ? decoded.getChannelData(1) : null;
  const mono = buf.getChannelData(0);
  for (let i = 0; i < mono.length; i++) mono[i] = ch1 ? (ch0[i] + ch1[i]) / 2 : ch0[i];
  const node = off.createBufferSource(); node.buffer = buf; node.connect(off.destination); node.start();
  const rendered = await off.startRendering();
  const data = rendered.getChannelData(0);
  // PCM16 WAV
  const bytesPerSample = 2, blockAlign = bytesPerSample, byteRate = outRate * blockAlign;
  const ab = new ArrayBuffer(44 + data.length * 2), view = new DataView(ab);
  const wr = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
  wr(0, "RIFF"); view.setUint32(4, 36 + data.length * 2, true); wr(8, "WAVE"); wr(12, "fmt ");
  view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
  view.setUint32(24, outRate, true); view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true); view.setUint16(34, 16, true); wr(36, "data");
  view.setUint32(40, data.length * 2, true);
  let off2 = 44;
  for (let i = 0; i < data.length; i++) { let s = Math.max(-1, Math.min(1, data[i])); view.setInt16(off2, s < 0 ? s * 0x8000 : s * 0x7fff, true); off2 += 2; }
  return { blob: new Blob([ab], { type: "audio/wav" }), truncated };
}

function readFileAsDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// Build a QR code data URL synchronously. Never throws — returns "" if the
// library is missing or generation fails, so a QR problem can't blank the app.
function makeQrDataUrl(text) {
  try {
    if (typeof qrcode !== "function" || !text) return "";
    const qr = qrcode(0, "M"); // type 0 = auto-size, medium error correction
    qr.addData(String(text));
    qr.make();
    return qr.createDataURL(6, 8); // cellSize, margin -> GIF data URL
  } catch (_) {
    return "";
  }
}

// Strip site chrome (nav, images, link URLs, related-article footers) out of the
// markdown a reader service returns, leaving mostly the article body.
function cleanArticleMarkdown(md) {
  let t = String(md || "");
  // Cut everything from the first end-of-article / footer marker onward.
  const markers = ["Explore more on these topics", "\n### Most viewed", "\n## Most viewed", "\nReuse this content", "\n## More from"];
  let cut = t.length;
  for (const m of markers) { const i = t.indexOf(m); if (i !== -1 && i < cut) cut = i; }
  t = t.slice(0, cut);
  t = t.replace(/!\[[^\]]*\]\([^)]*\)/g, "");          // drop images
  t = t.replace(/\[([^\]]*)\]\([^)]*\)/g, "$1");        // links -> plain label
  t = t.replace(/^\s*-\s*\[[ xX]\]\s*$/gm, "");         // checkbox artefacts
  const drop = /^(Skip to|Search input|Show more|Hide expanded|Close dialogue|Support the Guardian|Fund independent|US edition|UK edition|Australia edition|Europe edition|International edition|Sign in|Print subscriptions|Download the app|View image|Prefer the Guardian|Toggle caption|Next image|Previous image|google-search)/i;
  t = t.split("\n").filter(l => !drop.test(l.trim())).join("\n");
  t = t.replace(/\n{3,}/g, "\n\n").trim();
  return t;
}

// Find the first real content image URL in reader markdown (skip logos/icons/sprites).
function extractLeadImage(md) {
  const re = /!\[[^\]]*\]\((https?:\/\/[^)\s]+)\)/g;
  let m;
  while ((m = re.exec(String(md || "")))) {
    const u = m[1];
    if (/logo|icon|sprite|avatar|placeholder|1x1|pixel|\.svg(\?|$)/i.test(u)) continue;
    if (/\.(jpe?g|png|webp|gif)(\?|$)/i.test(u) || /\/img\/|\/media\/|\/images?\//i.test(u)) return u;
  }
  return "";
}

// Fetch a (possibly cross-origin) image and return a base64 data URL, routed through
// the wsrv.nl image proxy so CORS never blocks embedding it in the .pptx. "" on failure.
async function urlToDataUrl(url) {
  if (!url) return "";
  const proxied = "https://images.weserv.nl/?url=" + encodeURIComponent(url.replace(/^https?:\/\//, "")) + "&output=jpg";
  try {
    const resp = await fetch(proxied);
    if (!resp.ok) throw new Error("proxy " + resp.status);
    const blob = await resp.blob();
    return await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(blob); });
  } catch (_) { return ""; }
}

// Find one relevant, free (CC-licensed) image for a topic via the Wikimedia
// Commons API (keyless, CORS-enabled with origin=*). Returns a raster image URL,
// or "" on any failure — so a missing image never breaks the flow.
async function findRelevantImage(query) {
  const q = String(query || "").replace(/[^a-zA-Z0-9 ]/g, " ").replace(/\s+/g, " ").trim();
  if (!q) return "";
  try {
    const api = "https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrnamespace=6&gsrlimit=6&gsrsearch="
      + encodeURIComponent(q) + "&prop=imageinfo&iiprop=url&iiurlwidth=1000&format=json&origin=*";
    const resp = await fetch(api);
    if (!resp.ok) return "";
    const data = await resp.json();
    const pages = (data.query && data.query.pages) ? Object.values(data.query.pages) : [];
    pages.sort((a, b) => (a.index || 0) - (b.index || 0)); // keep search relevance order
    for (const p of pages) {
      const info = p && p.imageinfo && p.imageinfo[0];
      const u = info && (info.thumburl || info.url);
      if (u && /\.(jpe?g|png|webp)(\?|$)/i.test(u)) return u; // raster only (skip svg/icons)
    }
    return "";
  } catch (_) { return ""; }
}

async function extractPdfText(file) {
  const buf = await file.arrayBuffer();
  await loadScript(PDFJS_SRC, PDFJS_SRI);
  const pdfjs = window.pdfjsLib;
  pdfjs.GlobalWorkerOptions.workerSrc = "pdf.worker.min.js"; // self-hosted, same-origin (workers can't carry SRI)
  const pdf = await pdfjs.getDocument({ data: buf }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(" ") + "\n";
  }
  return text.trim();
}

// Pull the first valid JSON object out of a string, defensively.
function parseJsonLoose(raw) {
  try { return JSON.parse(raw); } catch (_) {}
  const start = raw.indexOf("{");
  const end = raw.lastIndexOf("}");
  if (start !== -1 && end > start) {
    return JSON.parse(raw.slice(start, end + 1)); // may throw -> caller catches
  }
  throw new Error("No JSON object found in model output.");
}

// Strip stray markdown (bold/italic/code/heading markers) the model sometimes adds.
function stripMd(s) {
  return String(s == null ? "" : s)
    .replace(/\*\*(.*?)\*\*/g, "$1")
    .replace(/__(.*?)__/g, "$1")
    .replace(/\*(.*?)\*/g, "$1")
    .replace(/`([^`]*)`/g, "$1")
    .replace(/^#{1,6}\s+/gm, "")
    .trim();
}

// Normalise guiding questions to { q, responses } objects. Accepts the model's
// new object shape ({ question, responses }) or a plain string (legacy / fallback),
// so older saved content and either prompt shape still load cleanly.
function normGuiding(arr) {
  if (!Array.isArray(arr) || !arr.length) return [{ q: "", responses: "" }, { q: "", responses: "" }, { q: "", responses: "" }];
  return arr.map(it => typeof it === "string"
    ? { q: stripMd(it), responses: "" }
    : { q: stripMd((it && (it.question || it.q)) || ""), responses: stripMd((it && it.responses) || "") });
}

// Shape a parsed model reply into the editable Springboard deck object. Pure (uses
// only stripMd), validating/defaulting the 4-part IGNITE / THINK / LAUNCH / REFLECT
// schema that the preview edits and Tasks 12-14 (export) consume. Arrays are trimmed
// to their limits; missing fields default to empty strings/arrays; think.routine is
// forced to the teacher's picked routineName so it always matches an exact ROUTINES name.
function shapeDeck(parsed, { routineName }) {
  const p = parsed && typeof parsed === "object" ? parsed : {};
  const str = v => stripMd(v == null ? "" : String(v));
  const arr = (v, max) => (Array.isArray(v) ? v.map(str).filter(Boolean).slice(0, max) : []);
  const obj = v => (v && typeof v === "object" ? v : {});
  const ig = obj(p.ignite), th = obj(p.think), la = obj(p.launch), re = obj(p.reflect), no = obj(p.notes), ad = obj(p.advisory);
  return {
    title: str(p.title),
    keywords: arr(p.keywords, 6),
    ignite:  { question: str(ig.question) },
    think:   { routine: str(routineName) || str(th.routine), steps: arr(th.steps, 4), structure: str(th.structure) },
    launch:  { connection: str(la.connection), bridge: str(la.bridge), question: str(la.question) },
    reflect: { revisit: str(re.revisit), prompts: arr(re.prompts, 4) },
    notes:   { ignite: str(no.ignite), think: str(no.think), launch: str(no.launch), reflect: str(no.reflect) },
    advisory:{ flag: !!ad.flag, reason: str(ad.reason) },
  };
}

// Strip characters that are illegal in Windows/macOS filenames (keeps the en-dash
// separators and everyday punctuation), collapse whitespace, and cap the length.
function sanitizeFilename(s) {
  return String(s == null ? "" : s)
    .replace(/[\\/:*?"<>|\x00-\x1f]/g, "")
    .replace(/\s+/g, " ")
    .trim()
    .slice(0, 150) || "Springboard";
}

const TRANSCRIBE_LIMIT = 4 * 1024 * 1024; // Vercel serverless function request-body limit is ~4.5 MB; stay under it

// Turn a failed backend response into a plain, teacher-facing message. 401 means
// the passcode is wrong; anything else surfaces the server's own error text.
async function backendErrorMessage(resp) {
  if (resp.status === 401) return "Passcode incorrect — check with the Digital Learning team.";
  let detail = "";
  try { const j = await resp.json(); detail = j && j.error ? String(j.error) : ""; }
  catch (_) { detail = await resp.text().catch(() => ""); }
  return `Server error (${resp.status}).${detail ? " " + detail : ""}`;
}

// Transcribe a video/audio File via the backend. Always downsamples to a 16 kHz
// mono WAV first (the backend only accepts raw WAV bytes), truncating very long
// clips so the upload stays under the size cap.
async function transcribeMedia({ passcode, file }) {
  let { blob: wavBlob, truncated } = await videoFileToWav16k(file);
  if (wavBlob.size > TRANSCRIBE_LIMIT) {
    const { blob: b2, truncated: t2 } = await videoFileToWav16k(file, 90);
    wavBlob = b2; truncated = t2 || truncated;
  }
  const resp = await fetch(API_BASE + "/api/transcribe", {
    method: "POST",
    headers: { "x-sb-passcode": passcode, "x-sb-filename": file.name.replace(/\.[^.]+$/, "") + ".wav", "Content-Type": "application/octet-stream" },
    body: wavBlob,
  });
  if (!resp.ok) throw new Error(await backendErrorMessage(resp));
  const data = await resp.json();
  const text = (data.text || "").trim();
  return { text, truncated };
}

// End-of-lesson reflection routines a teacher can pin from the REFLECT card dropdown
// ("" = let the model vary the choice each lesson, the default). Each carries the
// routine's real Harvard PZ prompt stems, injected into the generate prompt so
// reflect.prompts stay true to the routine while adapting to the stimulus.
const REFLECT_ROUTINES = [
  { name: "I Used to Think… / Now I Think…", stems: "I used to think… ; Now I think… ; (say what changed your thinking and why)" },
  { name: "Connect–Extend–Challenge", stems: "one new connection to what you already knew ; one way today extended or pushed your thinking ; one challenge or question still puzzling you" },
  { name: "3-2-1 Bridge", stems: "3 thoughts you now have ; 2 questions still on your mind ; 1 analogy for today's core idea" },
  { name: "Headlines", stems: "a one-line headline that captures the core idea of today's learning" },
  { name: "Reflect–Connect–Project", stems: "reflect on what stood out and why it matters ; connect it to earlier learning ; project forward to how you'll use it next time" },
  { name: "Compass Points", stems: "Excited — what excites you about today's idea? ; Worrisome — what worries or puzzles you? ; Need to know — what do you still need to find out? ; Stance/Step — your current stance or next step" },
  { name: "Color, Symbol, Image", stems: "Color — a colour for today's core idea, and why ; Symbol — a symbol for it, and why ; Image — an image for it, and why" },
];

/* --------------------------- Backend call --------------------------- */

async function generateSpringboard({ passcode, mode, media = [], sourceText = "", classInfo, routineName, reflectRoutine = "", scope = "all", current = null }) {
  const routine = ROUTINES.find(r => r.name === routineName) || ROUTINES[0];
  const vceGuide = vceStudyGuide(classInfo);
  const acGuide = acStudyGuide(classInfo);
  const outcomeLine = vceGuide
    ? `A VCE study-design extract for ${classInfo.subject} is provided below. ALIGN the launch slide's curriculum connection to THAT extract (its areas of study and outcomes)${classInfo.outcome.trim() ? `, narrowed to this outcome/topic: "${classInfo.outcome.trim()}"` : ""}. Quote real phrases from the extract; never invent codes.`
    : acGuide
    ? `An Australian Curriculum (v9) extract for ${classInfo.subject}, ${classInfo.yearLevel}, is provided below. ALIGN the launch slide's curriculum connection to THAT extract (its achievement standard and content descriptions)${classInfo.outcome.trim() ? `, narrowed to this outcome/topic: "${classInfo.outcome.trim()}"` : ""}. Quote real AC9 codes and phrases from the extract; never invent codes.`
    : classInfo.outcome.trim()
      ? `ALIGN the launch slide to this exact outcome/topic, quoting its key phrases: "${classInfo.outcome.trim()}". Do not invent curriculum codes.`
      : `Write the curriculum connection in plain language for ${classInfo.curriculum} ${classInfo.subject}, year ${classInfo.yearLevel}. Never invent official curriculum codes or identifiers.`;
  const tone = { younger: "concrete, playful, inquiry-led (ages 5-12)",
                 middle: "analytical, real-world (ages 12-15)",
                 senior: "critical, ethical, conceptual (ages 15-18)" }[bandOf(classInfo.yearLevel)];
  let sys = `You create a 4-part lesson launch ("Springboard") from a teacher's stimulus.
Audience tone: ${tone}. Slides carry MINIMAL text — every field respects its word limit.
Thinking routine to scaffold the THINK part: "${routine.name}" — ${routine.gist} (${routine.url}).
${outcomeLine}
Each notes field is a teacher script with EXACTLY these labelled sections, each 1-3 sentences:
FACILITATION: … TIMING: … DIFFERENTIATION: … CURRICULUM LINKS: … EXTENSIONS: …
Set advisory.flag true only for sensitive themes (grief, violence, body image, etc.) with a one-line reason.
Return STRICT JSON with keys: title, keywords, ignite{question}, think{routine, steps, structure}, launch{connection, bridge, question}, reflect{revisit, prompts}, notes{ignite, think, launch, reflect}, advisory{flag, reason}.`;

  // Single-slide regenerate: rebuild only the scoped slide + its notes, copying the rest verbatim.
  if (scope !== "all") {
    sys += `\nRegenerate ONLY the "${scope}" and "notes.${scope}" fields; copy every other field verbatim from: ${JSON.stringify(current)}`;
  }

  // Teacher pinned a specific end-of-lesson reflection routine from the REFLECT dropdown:
  // override the "vary the choice" instruction below and lock reflect.prompts to it.
  const pinnedReflect = REFLECT_ROUTINES.find(r => r.name === reflectRoutine);
  if (pinnedReflect) {
    sys += `\nFor the REFLECT part, the teacher has CHOSEN the "${pinnedReflect.name}" reflection routine — use exactly that one (ignore any instruction to vary or pick a different reflection routine). Its real prompt stems are: ${pinnedReflect.stems}. Set reflect.prompts to THOSE stems, lightly tailored to this lesson (<=4 short stems), keeping the routine's real moves and their order.`;
  }

  // Field word-limits, kept beside the schema keys so the model honours them.
  const limits = [
    `title: <=8 words.`,
    `keywords: 3-6 short search terms a teacher might type to find this lesson later.`,
    `ignite.question: ONE provocative question.`,
    `think.routine MUST be exactly "${routine.name}". This routine's real moves are: ${(routine.steps || []).map((s, i) => `${i + 1}) ${s}`).join(" ")}. think.steps: take THOSE actual moves and lightly tailor the wording to THIS stimulus — keep the routine's real moves and their order, do NOT invent different ones; <=4 short student-facing prompts. think.structure: "${routine.structure || "Think-pair-share, 3 min"}".`,
    `launch.connection: <=25 words curriculum connection; launch.bridge: <=20 words from the stimulus to today's lesson; launch.question: the lesson launch question.`,
    `reflect.revisit: <=15 words revisiting the ignite question. For reflect.prompts, CHOOSE the end-of-lesson reflection routine that best fits THIS lesson, and VARY the choice across lessons (do NOT always use the same one). Pick from: (a) I Used to Think… / Now I Think…; (b) Connect–Extend–Challenge — one new connection, one way it extends thinking, one lingering challenge or question; (c) 3-2-1 Bridge — 3 thoughts, 2 questions, 1 analogy; (d) Headlines — a one-line headline capturing today's core idea; (e) Reflect–Connect–Project — reflect on it, connect to prior learning, project forward. Use THAT routine's real prompt stems as reflect.prompts (<=4 short stems).`,
  ].join("\n");
  const instruction = `Create the Springboard now. Respect every word limit:\n${limits}\nReturn STRICT JSON only — no markdown, no code fences, plain text in every field.`;

  const userContent = [];
  const mediaItems = Array.isArray(media) ? media : [];

  if (mode === "media" && mediaItems.length) {
    const imgs = mediaItems.filter(m => m.kind === "image").length;
    const vids = mediaItems.filter(m => m.kind === "video").length;
    let mt = `The stimulus is a reel of ${mediaItems.length} item(s) shown in order` +
      `${imgs ? ` — ${imgs} image(s)` : ""}${vids ? `${imgs ? " and" : " —"} ${vids} video(s) (still frames attached per clip)` : ""}. ` +
      `Treat them as ONE stimulus in sequence; item 1 is the primary stimulus. Build the whole Springboard from what you genuinely see/read across them.`;
    const clipText = mediaItems
      .map((m, i) => ((m.kind === "video" || m.kind === "youtube") && m.text && m.text.trim()) ? `${m.kind === "youtube" ? "YouTube clip" : "Video"} at position ${i + 1} — ${m.text.trim().slice(0, 4000)}` : "")
      .filter(Boolean);
    if (clipText.length) mt += `\nClip notes:\n${clipText.join("\n")}`;
    userContent.push({ type: "text", text: instruction + "\n\n" + mt });
    mediaItems.forEach(m => {
      if (m.kind === "image") userContent.push({ type: "image_url", image_url: { url: m.dataUrl } });
      else if (m.kind === "youtube") { const y = m.thumb || m.poster; if (y) userContent.push({ type: "image_url", image_url: { url: y } }); }
      else (m.frames || []).forEach(fr => userContent.push({ type: "image_url", image_url: { url: fr } }));
    });
  } else {
    const trimmed = (sourceText || "").slice(0, 12000).replace(/"{3,}/g, "“”");
    userContent.push({ type: "text", text: instruction + `\n\nThe stimulus is the following article text. Build the Springboard from its real content:\n\n"""\n${trimmed}\n"""` });
  }

  const studyGuide = vceGuide || acGuide;
  const resp = await fetch(API_BASE + "/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-sb-passcode": passcode },
    body: JSON.stringify({
      messages: [
        { role: "system", content: sys },
        { role: "user", content: userContent },
      ],
      response_format: { type: "json_object" },
      max_completion_tokens: 4000,
      stickiness: true,
      ...(studyGuide ? { studyGuide } : {}),
    }),
  });

  if (!resp.ok) throw new Error(await backendErrorMessage(resp));

  const data = await resp.json();
  const raw = data?.choices?.[0]?.message?.content || "";
  if (!raw.trim()) throw new Error("The model returned an empty response.");
  try {
    return { parsed: parseJsonLoose(raw), raw };
  } catch (perr) {
    const e = new Error("Could not parse the model's JSON: " + perr.message);
    e._raw = raw;
    throw e;
  }
}

/* ----------------------- Analyse stimulus (the new step before Generate) -----------------------
   Reads the stimulus and recommends 3 thinking routines (band-filtered from ROUTINES), so the
   teacher picks a routine before Generate runs. Media-parts packaging mirrors generateSpringboard
   above. */
async function analyseStimulus({ passcode, mode, media = [], sourceText = "", classInfo, move = null }) {
  const band = bandOf(classInfo.yearLevel); // "younger" | "middle" | "senior"
  // Candidate routines are scoped to the chosen Thinking Move (band-filtered, topped
  // up by moveRoutineList); fall back to the full band list only if no move was passed.
  const bandRoutines = move ? moveRoutineList(move, band) : ROUTINES.filter(r => r.bands.includes(band));
  const routineMenu = bandRoutines.map(r => `- ${r.name}: ${r.gist}`).join("\n");
  const moveLine = move ? `The teacher has chosen the Thinking Move "${move.name}" (${move.question}). Rank the routines from the menu that best serve THAT move for this stimulus and age group.\n` : "";
  const sys = `You help a ${classInfo.curriculum} teacher of ${classInfo.subject}, year ${classInfo.yearLevel}, launch student thinking from a stimulus.
${moveLine}Return STRICT JSON only: {"summary": string (<=40 words, what the stimulus shows),
"routines": [{"name": string, "why": string (<=20 words, why it fits THIS stimulus and age group)} x3]}
Routine names MUST be copied exactly from this menu:\n${routineMenu}`;

  const userContent = [];
  const mediaItems = Array.isArray(media) ? media : [];
  if (mode === "media" && mediaItems.length) {
    userContent.push({ type: "text", text: "Analyse this stimulus and recommend routines per the system instructions." });
    mediaItems.forEach(m => {
      if (m.kind === "image") userContent.push({ type: "image_url", image_url: { url: m.dataUrl } });
      else if (m.kind === "youtube") { const y = m.thumb || m.poster; if (y) userContent.push({ type: "image_url", image_url: { url: y } }); }
      else (m.frames || []).forEach(fr => userContent.push({ type: "image_url", image_url: { url: fr } }));
    });
  } else {
    const trimmed = (sourceText || "").slice(0, 12000).replace(/"{3,}/g, "“”");
    userContent.push({ type: "text", text: `Analyse this article text and recommend routines per the system instructions:\n\n"""\n${trimmed}\n"""` });
  }

  const resp = await fetch(API_BASE + "/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-sb-passcode": passcode },
    body: JSON.stringify({
      messages: [
        { role: "system", content: sys },
        { role: "user", content: userContent },
      ],
      response_format: { type: "json_object" },
      max_completion_tokens: 700,
    }),
  });
  if (!resp.ok) throw new Error(await backendErrorMessage(resp));

  const data = await resp.json();
  const raw = data?.choices?.[0]?.message?.content || "";
  if (!raw.trim()) throw new Error("The model returned an empty response.");
  const parsed = parseJsonLoose(raw);

  // Canonicalise routine names against ROUTINES (case-insensitive), dropping anything the
  // model invents; top up to 3 from the band-filtered list so the UI never shows fewer than
  // 3 real, linkable routines even on a flaky/partial reply.
  const byLower = new Map(bandRoutines.map(r => [r.name.toLowerCase(), r.name]));
  const seen = new Set();
  const routines = [];
  (Array.isArray(parsed.routines) ? parsed.routines : []).forEach(r => {
    const nameRaw = stripMd(r && r.name);
    const canon = byLower.get(String(nameRaw).toLowerCase().trim());
    if (canon && !seen.has(canon)) {
      seen.add(canon);
      routines.push({ name: canon, why: stripMd((r && r.why) || "") });
    }
  });
  for (const r of bandRoutines) {
    if (routines.length >= 3) break;
    if (!seen.has(r.name)) { seen.add(r.name); routines.push({ name: r.name, why: r.gist }); }
  }

  return { summary: stripMd(parsed.summary || ""), routines: routines.slice(0, 3) };
}

/* ----------------------- Suggest outcomes (AI option on the Outcome field) -----------------------
   Suggests 1-4 curriculum connections for the class, grounded in the stimulus when one exists.
   Media packaging mirrors analyseStimulus. VCE Y11/12 and AC F-10 pass studyGuide so the server
   injects the real curriculum extract — suggestions quote real phrases/codes, never invented. */
async function suggestOutcomes({ passcode, mode, media = [], sourceText = "", classInfo }) {
  const guide = vceStudyGuide(classInfo) || acStudyGuide(classInfo);
  const sys = `You help a ${classInfo.curriculum} teacher of ${classInfo.subject}, year ${classInfo.yearLevel}, connect a lesson stimulus to their curriculum.
Return STRICT JSON only: {"suggestions": [{"outcome": string (<=30 words, one curriculum connection/outcome this lesson could target), "why": string (<=18 words, why it fits this stimulus and class)} x4]}
${guide ? "A curriculum extract is appended below. Ground every suggestion in THAT extract (its outcomes, achievement standards or content descriptions), quoting its real phrases and codes; never invent codes." : "Use plain language. Never invent official curriculum codes or identifiers."}`;

  const userContent = [];
  const mediaItems = Array.isArray(media) ? media : [];
  if (mode === "media" && mediaItems.length) {
    userContent.push({ type: "text", text: "Suggest curriculum connections for this stimulus per the system instructions." });
    mediaItems.forEach(m => {
      if (m.kind === "image") userContent.push({ type: "image_url", image_url: { url: m.dataUrl } });
      else if (m.kind === "youtube") { const y = m.thumb || m.poster; if (y) userContent.push({ type: "image_url", image_url: { url: y } }); }
      else (m.frames || []).forEach(fr => userContent.push({ type: "image_url", image_url: { url: fr } }));
    });
  } else if ((sourceText || "").trim()) {
    const trimmed = sourceText.slice(0, 12000).replace(/"{3,}/g, "“”");
    userContent.push({ type: "text", text: `Suggest curriculum connections for this article per the system instructions:\n\n"""\n${trimmed}\n"""` });
  } else {
    userContent.push({ type: "text", text: "No stimulus added yet. Suggest curriculum connections a teacher of this class could build a lesson around, per the system instructions." });
  }

  const resp = await fetch(API_BASE + "/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-sb-passcode": passcode },
    body: JSON.stringify({
      messages: [
        { role: "system", content: sys },
        { role: "user", content: userContent },
      ],
      response_format: { type: "json_object" },
      max_completion_tokens: 800,
      ...(guide ? { studyGuide: guide } : {}),
    }),
  });
  if (!resp.ok) throw new Error(await backendErrorMessage(resp));

  const data = await resp.json();
  const raw = data?.choices?.[0]?.message?.content || "";
  if (!raw.trim()) throw new Error("The model returned an empty response.");
  const parsed = parseJsonLoose(raw);
  const out = (Array.isArray(parsed.suggestions) ? parsed.suggestions : [])
    .map(s => ({ outcome: stripMd(s && s.outcome), why: stripMd((s && s.why) || "") }))
    .filter(s => s.outcome);
  if (!out.length) throw new Error("No suggestions came back — try again.");
  return out.slice(0, 4);
}

/* Merge a scoped regenerate's parsed reply back into the deck: only the scoped slide
   (ignite | think | launch | reflect) and its teacher notes are replaced, so edits to the
   other three slides survive. think.routine stays the teacher's pick. Full-scope callers
   use shapeDeck directly; a scope of "all" (or an unknown scope) falls back to a full shape. */
function mergeScopedFields(deck, scope, parsed) {
  const shaped = shapeDeck(parsed, { routineName: deck.think.routine });
  const SLICES = ["ignite", "think", "launch", "reflect"];
  if (!SLICES.includes(scope)) return shaped; // "all" or anything unexpected → full shape
  return {
    ...deck,
    [scope]: shaped[scope],
    notes: { ...deck.notes, [scope]: shaped.notes[scope] },
  };
}

// Determinate circular progress ring (white, for use on the primary button).
const ProgressRing = ({ value, size = 18 }) => {

// Confetti burst in Wesley colours on successful download. No-op under reduced motion.
function fireConfetti() {
  if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const c = document.createElement("canvas");
  c.width = window.innerWidth; c.height = window.innerHeight;
  c.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:120";
  document.body.appendChild(c);
  const ctx = c.getContext("2d");
  const COLS = ["#4F2759", "#C59F40", "#FFD157", "#7CA3FF", "#FFA245", "#86C791", "#FDAFBD"];
  const ps = Array.from({ length: 140 }, () => ({
    x: c.width / 2 + (Math.random() - .5) * c.width * .5,
    y: c.height * .35 + (Math.random() - .5) * 60,
    vx: (Math.random() - .5) * 9,
    vy: -(4 + Math.random() * 9),
    s: 5 + Math.random() * 6,
    r: Math.random() * Math.PI,
    vr: (Math.random() - .5) * .3,
    col: COLS[(Math.random() * COLS.length) | 0],
  }));
  const t0 = performance.now();
  (function tick(t) {
    const el = (t - t0) / 1000;
    ctx.clearRect(0, 0, c.width, c.height);
    ps.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += .25; p.r += p.vr;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r);
      ctx.fillStyle = p.col; ctx.globalAlpha = Math.max(0, 1 - el / 1.8);
      ctx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * .6); ctx.restore();
    });
    if (el < 1.8) requestAnimationFrame(tick); else c.remove();
  })(t0);
}

function MediaCarousel({ items, index, setIndex }) {
  const n = items.length;
  const clamp = (i) => (i + n) % n;
  const go = (d) => setIndex(i => clamp(i + d));
  const drag = React.useRef(null);
  if (!n) return null;
  const it = items[Math.min(index, n - 1)];
  return (
    <div className="reel" tabIndex={0} role="group" aria-label={`Stimulus ${index + 1} of ${n}`}
      onKeyDown={e => { if (e.key === "ArrowLeft") { e.preventDefault(); go(-1); } if (e.key === "ArrowRight") { e.preventDefault(); go(1); } }}
      onPointerDown={e => { drag.current = e.clientX; }}
      onPointerUp={e => { if (drag.current != null) { const dx = e.clientX - drag.current; if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1); } drag.current = null; }}>
      <div className="reel-frame">
        {it.kind === "image"
          ? <img src={it.dataUrl} alt={"Stimulus " + (index + 1) + ": " + it.name} />
          : it.kind === "youtube"
            ? <iframe src={"https://www.youtube.com/embed/" + it.youtubeId} title={it.name}
                style={{ width: "100%", height: "100%", border: 0 }}
                allow="encrypted-media; picture-in-picture" allowFullScreen />
            : <video src={it.dataUrl || undefined} poster={it.poster} controls playsInline />}
        {n > 1 && <React.Fragment>
          <button type="button" className="reel-arrow left" aria-label="Previous item" onClick={() => go(-1)}>‹</button>
          <button type="button" className="reel-arrow right" aria-label="Next item" onClick={() => go(1)}>›</button>
        </React.Fragment>}
      </div>
      {n > 1 && <div className="reel-dots">
        {items.map((m, i) => <button key={m.id} type="button" className={"dot" + (i === index ? " on" : "")} aria-label={"Go to " + ((m.kind === "video" || m.kind === "youtube") ? "video " : "image ") + (i + 1)} aria-current={i === index ? "true" : "false"} onClick={() => setIndex(i)} />)}
      </div>}
      {n > 1 && <div className="sr-only" aria-live="polite">{`Stimulus ${index + 1} of ${n}`}</div>}

// Admin-analytics password popup. Validates the password against the server before
// leaving Springboard, so a wrong password keeps the teacher on this page instead of
// bouncing to the stats gate. On success it stashes the password for stats.html (same
// sessionStorage key that page auto-loads from) and navigates there in the same tab.
function AdminGate({ onClose }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const inputRef = useRef(null);

  React.useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);
  React.useEffect(() => {
    function onKey(e) { if (e.key === "Escape") onClose(); }
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [onClose]);

  async function submit(e) {
    e.preventDefault();
    const p = pw.trim();
    if (!p) { setErr("Enter the admin password."); return; }
    setErr(""); setBusy(true);
    try {
      const res = await fetch(API_BASE + "/api/stats", { method: "POST", headers: { "x-sb-admin": p } });
      if (res.status === 401) { setErr("Wrong password."); setBusy(false); return; }
      if (!res.ok) { setErr("Couldn't reach the server. Try again."); setBusy(false); return; }
      try { sessionStorage.setItem("sb_admin", p); } catch (_) {}
      window.location.href = "stats.html";
    } catch (_) {
      setErr("Couldn't reach the server. Try again."); setBusy(false);
    }
  }

  return (
    <div className="modal-backdrop" onMouseDown={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" role="dialog" aria-modal="true" aria-labelledby="adminGateTitle">
        <div className="modal-head">
          <h2 id="adminGateTitle">Admin analytics</h2>
          <button type="button" className="iconbtn" aria-label="Close" onClick={onClose}><Icon d={I.close} size={14} stroke /></button>
        </div>
        <p className="modal-sub">Enter the admin password to view usage analytics.</p>
        <form onSubmit={submit}>
          <input ref={inputRef} type="password" autoComplete="current-password" value={pw}
            onChange={e => setPw(e.target.value)} placeholder="Admin password" aria-label="Admin password"
            aria-invalid={err ? "true" : undefined} />
          {err ? <p className="modal-err" role="alert">{err}</p> : null}
          <div className="modal-actions">
            <button type="button" className="btn ghost" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn primary" disabled={busy}>{busy ? "Checking…" : "Open analytics"}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ---- YouTube online-video post-processing ----
   Same marked-poster trick as SharePoint videos above, but simpler markup:
   current PowerPoint represents a YouTube clip as an ordinary poster pic whose
   nvPr carries <a:videoFile r:link> to an EXTERNAL video relationship targeting
   the youtube.com/embed/<id> URL, plus an interactive click-to-toggle timing
   block. No p14:media / p15:webVideoPr. Desktop AND web PowerPoint play it; the
   clip streams live from YouTube, so no download, no bot-block. Ground truth
   captured from PowerPoint's own AddMediaObjectFromEmbedTag output and verified
   on SharePoint web (docs/superpowers/notes/2026-07-17-youtube-ooxml-groundtruth.md).
   Click-to-play by design: interactive togglePause timing, NOT autoplay. */
const YT_MARK_PREFIX = "TSG-YT::";
// EXACT timing PowerPoint writes for an online video (click-to-toggle + media
// node). Copied verbatim from docs/superpowers/notes/yt-timing-template.xml —
// never hand-edit (one dropped tag hard-corrupts the file; spike lesson).
const YT_TIMING_TEMPLATE = `<p:timing><p:tnLst><p:par><p:cTn id="1" dur="indefinite" restart="never" nodeType="tmRoot"><p:childTnLst><p:seq concurrent="1" nextAc="seek"><p:cTn id="2" restart="whenNotActive" fill="hold" evtFilter="cancelBubble" nodeType="interactiveSeq"><p:stCondLst><p:cond evt="onClick" delay="0"><p:tgtEl><p:spTgt spid="SPID_PLACEHOLDER"/></p:tgtEl></p:cond></p:stCondLst><p:endSync evt="end" delay="0"><p:rtn val="all"/></p:endSync><p:childTnLst><p:par><p:cTn id="3" fill="hold"><p:stCondLst><p:cond delay="0"/></p:stCondLst><p:childTnLst><p:par><p:cTn id="4" fill="hold"><p:stCondLst><p:cond delay="0"/></p:stCondLst><p:childTnLst><p:par><p:cTn id="5" presetID="2" presetClass="mediacall" presetSubtype="0" fill="hold" nodeType="clickEffect"><p:stCondLst><p:cond delay="0"/></p:stCondLst><p:childTnLst><p:cmd type="call" cmd="togglePause"><p:cBhvr><p:cTn id="6" dur="1" fill="hold"/><p:tgtEl><p:spTgt spid="SPID_PLACEHOLDER"/></p:tgtEl></p:cBhvr></p:cmd></p:childTnLst></p:cTn></p:par></p:childTnLst></p:cTn></p:par></p:childTnLst></p:cTn></p:par></p:childTnLst></p:cTn><p:nextCondLst><p:cond evt="onClick" delay="0"><p:tgtEl><p:spTgt spid="SPID_PLACEHOLDER"/></p:tgtEl></p:cond></p:nextCondLst></p:seq><p:video><p:cMediaNode vol="80000"><p:cTn id="7" fill="hold" display="0"><p:stCondLst><p:cond delay="indefinite"/></p:stCondLst></p:cTn><p:tgtEl><p:spTgt spid="SPID_PLACEHOLDER"/></p:tgtEl></p:cMediaNode></p:video></p:childTnLst></p:cTn></p:par></p:tnLst></p:timing>`;
async function injectYouTubeVideos(blob, ytMarks) {
  if (!ytMarks.length || typeof JSZip === "undefined") return blob;
  const zip = await JSZip.loadAsync(blob);
  const slidePaths = Object.keys(zip.files).filter(p => /^ppt\/slides\/slide\d+\.xml$/.test(p));
  for (const sp of slidePaths) {
    let xml = await zip.file(sp).async("string");
    if (xml.indexOf(YT_MARK_PREFIX) === -1) continue;
    const relPath = sp.replace(/slides\/(slide\d+)\.xml$/, "slides/_rels/$1.xml.rels");
    let rels = await zip.file(relPath).async("string");
    let relSeq = 0;
    let lastYtSpid = null;
    xml = xml.replace(/<p:pic>[\s\S]*?<\/p:pic>/g, (pic) => {
      const m = pic.match(/descr="TSG-YT::([^"]+)"/);
      if (!m) return pic;
      const id = m[1];
      const idm = pic.match(/<p:cNvPr\s+id="(\d+)"/);
      if (idm) lastYtSpid = idm[1];
      const rid = "rIdYt" + (++relSeq);
      rels = rels.replace("</Relationships>",
        `<Relationship Id="${rid}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/video" Target="https://www.youtube.com/embed/${id}?feature=oembed" TargetMode="External"/></Relationships>`);
      let p = pic.replace(/\s*descr="TSG-YT::[^"]+"/, "");
      p = p.replace(/(<p:cNvPr\b[^>]*?)(\/>|>)/, (full, head, close) => {
        if (close === "/>") return head + '><a:hlinkClick r:id="" action="ppaction://media"/></p:cNvPr>';
        return head + '><a:hlinkClick r:id="" action="ppaction://media"/>';
      });
      const vf = `<a:videoFile r:link="${rid}"/>`;
      if (/<p:nvPr\s*\/>/.test(p)) p = p.replace(/<p:nvPr\s*\/>/, `<p:nvPr>${vf}</p:nvPr>`);
      else if (/<p:nvPr>[\s\S]*?<\/p:nvPr>/.test(p)) p = p.replace(/<\/p:nvPr>/, `${vf}</p:nvPr>`);
      else p = p.replace(/<\/p:nvPicPr>/, `<p:nvPr>${vf}</p:nvPr></p:nvPicPr>`);
      return p;
    });
    // Click-to-play wiring: interactive togglePause timing targeting the video pic.
    // (One reel item per slide, so a YouTube slide never also carries the
    // SharePoint autoplay timing injected by injectOnlineVideos above.)
    if (lastYtSpid) {
      const timing = YT_TIMING_TEMPLATE.replace(/SPID_PLACEHOLDER/g, lastYtSpid);
      xml = xml.replace(/<\/p:sld>/, timing + "</p:sld>");
    }
    zip.file(sp, xml);
    zip.file(relPath, rels);
  }
  return await zip.generateAsync({ type: "blob" });
}

// Client-side twin of api/youtube-meta.js's youtubeVideoId() — keep the two in sync.
// (index.html ships standalone to GitHub Pages, so it can't import server code.)
function youtubeIdFromLink(raw) {
  let u;
  try { u = new URL(String(raw || "").trim()); } catch (_) { return ""; }
  if (u.protocol !== "https:" && u.protocol !== "http:") return "";
  const host = u.hostname.toLowerCase().replace(/^(www|m|music)\./, "");
  const parts = u.pathname.split("/").filter(Boolean);
  let id = "";
  if (host === "youtu.be") id = parts[0] || "";
  else if (host === "youtube.com" || host === "youtube-nocookie.com") {
    if (parts[0] === "watch") id = u.searchParams.get("v") || "";
    else if (["shorts", "live", "embed", "v"].includes(parts[0])) id = parts[1] || "";
  }
  return /^[A-Za-z0-9_-]{11}$/.test(id) ? id : "";
}

// Bake a play badge into a 16:9 cover-cropped copy of the thumbnail so the item
// never reads as "just a photo" — in the reel, on the slide, anywhere the poster
// shows. Empty/broken input -> dark placeholder with the badge alone.
async function addPlayBadge(dataUrl) {
  const W = 640, H = 360;
  const c = document.createElement("canvas"); c.width = W; c.height = H;
  const x = c.getContext("2d");
  x.fillStyle = "#111111"; x.fillRect(0, 0, W, H);
  if (dataUrl) {
    const im = await new Promise(res => { const i = new Image(); i.onload = () => res(i); i.onerror = () => res(null); i.src = dataUrl; });
    if (im && im.naturalWidth && im.naturalHeight) {
      const ar = im.naturalWidth / im.naturalHeight, box = W / H;
      let sw = im.naturalWidth, sh = im.naturalHeight, sx = 0, sy = 0;
      if (ar > box) { sw = sh * box; sx = (im.naturalWidth - sw) / 2; }
      else { sh = sw / box; sy = (im.naturalHeight - sh) / 2; }
      x.drawImage(im, sx, sy, sw, sh, 0, 0, W, H);
    }
  }
  x.fillStyle = "rgba(0,0,0,0.55)"; x.beginPath(); x.arc(W / 2, H / 2, 46, 0, Math.PI * 2); x.fill();
  x.strokeStyle = "rgba(255,255,255,0.9)"; x.lineWidth = 3; x.stroke();
  x.fillStyle = "#FFFFFF"; x.beginPath();
  x.moveTo(W / 2 - 14, H / 2 - 22); x.lineTo(W / 2 + 24, H / 2); x.lineTo(W / 2 - 14, H / 2 + 22);
  x.closePath(); x.fill();
  return c.toDataURL("image/jpeg", 0.9);
}
